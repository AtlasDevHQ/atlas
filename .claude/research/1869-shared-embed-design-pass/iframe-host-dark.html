<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Iframe host (dark) — embed visual harness</title>
    <style>
      :root {
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color-scheme: dark;
      }
      body {
        margin: 0;
        background: #09090b;
        color: #f4f4f5;
        min-height: 100vh;
      }
      .partner-shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 24px 64px;
      }
      .partner-nav {
        display: flex;
        gap: 24px;
        align-items: center;
        font-size: 14px;
        color: #a1a1aa;
        padding-bottom: 18px;
        border-bottom: 1px solid #27272a;
      }
      .partner-nav .logo {
        font-weight: 600;
        color: #fafafa;
      }
      .partner-headline {
        margin: 28px 0 6px;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .partner-sub {
        color: #a1a1aa;
        font-size: 14px;
        max-width: 60ch;
        margin: 0 0 28px;
      }
      .embed-card {
        background: #18181b;
        border: 1px solid #27272a;
        border-radius: 12px;
        overflow: hidden;
      }
      .embed-card iframe {
        display: block;
        border: 0;
        width: 100%;
        height: 640px;
        background: transparent;
      }
      .embed-caption {
        font-size: 12px;
        color: #71717a;
        padding: 8px 16px 12px;
        border-top: 1px solid #27272a;
        background: #0a0a0b;
      }
    </style>
  </head>
  <body>
    <div class="partner-shell">
      <div class="partner-nav">
        <span class="logo">Acme Analytics</span>
        <span>Dashboards</span>
        <span>Reports</span>
        <span style="margin-left: auto; color: #71717a">jamie@acme.com</span>
      </div>
      <h1 class="partner-headline">Q1 customer revenue review</h1>
      <p class="partner-sub">
        Embedded analysis pulled from Atlas — kept in line so the discussion
        stays with the data.
      </p>
      <div class="embed-card">
        <iframe
          src="http://localhost:3000/shared/demo-share-token-1868/embed?theme=dark"
          title="Atlas shared conversation embed"
        ></iframe>
        <div class="embed-caption">Embedded via Atlas · live snapshot</div>
      </div>
    </div>
  </body>
</html>
