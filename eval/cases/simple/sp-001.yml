id: "sp-001"
question: "How many companies are in each industry?"
schema: simple
difficulty: simple
category: aggregation
tags: [companies, count, group-by]
gold_sql: |
  SELECT industry, COUNT(*) AS company_count
  FROM companies
  GROUP BY industry
  ORDER BY company_count DESC
expected_rows: 9
notes: "Basic GROUP BY aggregation on the companies table"
