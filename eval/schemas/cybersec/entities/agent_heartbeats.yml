  - name: cpu_percent_bucket
    sql: |-
      CASE
        WHEN cpu_percent < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY cpu_percent) FROM agent_heartbeats) THEN 'Low'
        WHEN cpu_percent < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY cpu_percent) FROM agent_heartbeats) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: cpu percent bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: memory_percent_bucket
    sql: |-
      CASE
        WHEN memory_percent < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY memory_percent) FROM agent_heartbeats) THEN 'Low'
        WHEN memory_percent < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY memory_percent) FROM agent_heartbeats) THEN 'Medium'
        ELSE 'High'
