      - Thu Feb 05 2026 00:00:00 GMT-0500 (Eastern Standard Time)
      - Fri Feb 06 2026 00:00:00 GMT-0500 (Eastern Standard Time)
      - Sat Feb 07 2026 00:00:00 GMT-0500 (Eastern Standard Time)
      - Sun Feb 08 2026 00:00:00 GMT-0500 (Eastern Standard Time)
      - Mon Feb 09 2026 00:00:00 GMT-0500 (Eastern Standard Time)
      - Tue Feb 10 2026 00:00:00 GMT-0500 (Eastern Standard Time)
      - Wed Feb 11 2026 00:00:00 GMT-0500 (Eastern Standard Time)
  - name: completed_at
    sql: completed_at
    type: date
    unique_count: 3225
    null_count: 4775
    sample_values:
      - Fri Jan 02 2026 13:43:02 GMT-0500 (Eastern Standard Time)
      - Fri Jan 02 2026 15:47:13 GMT-0500 (Eastern Standard Time)
      - Fri Jan 02 2026 16:53:05 GMT-0500 (Eastern Standard Time)
      - Fri Jan 02 2026 17:15:34 GMT-0500 (Eastern Standard Time)
      - Fri Jan 02 2026 17:23:21 GMT-0500 (Eastern Standard Time)
      - Fri Jan 02 2026 17:35:14 GMT-0500 (Eastern Standard Time)
      - Fri Jan 02 2026 18:50:43 GMT-0500 (Eastern Standard Time)
      - Fri Jan 02 2026 19:08:10 GMT-0500 (Eastern Standard Time)
  - name: created_at
    sql: created_at
    type: date
    unique_count: 8000
    sample_values:
      - Tue Jan 05 2021 19:26:36 GMT-0500 (Eastern Standard Time)
      - Sat Jan 16 2021 22:59:31 GMT-0500 (Eastern Standard Time)
      - Fri Jan 22 2021 15:40:50 GMT-0500 (Eastern Standard Time)
      - Fri Jan 22 2021 17:40:55 GMT-0500 (Eastern Standard Time)
      - Tue Jan 26 2021 22:20:40 GMT-0500 (Eastern Standard Time)
      - Sat Jan 30 2021 15:43:03 GMT-0500 (Eastern Standard Time)
      - Thu Feb 04 2021 02:03:06 GMT-0500 (Eastern Standard Time)
      - Fri Feb 05 2021 20:53:32 GMT-0500 (Eastern Standard Time)
  - name: updated_at
    sql: updated_at
    type: date
    unique_count: 1
    sample_values:
      - Tue Mar 03 2026 13:38:31 GMT-0500 (Eastern Standard Time)
  - name: due_date_year
    sql: EXTRACT(YEAR FROM due_date)
    type: number
    description: Year extracted from due_date
    virtual: true
  - name: due_date_month
    sql: TO_CHAR(due_date, 'YYYY-MM')
    type: string
    description: Year-month extracted from due_date
    virtual: true
  - name: completed_at_year
    sql: EXTRACT(YEAR FROM completed_at)
    type: number
    description: Year extracted from completed_at
    virtual: true
  - name: completed_at_month
    sql: TO_CHAR(completed_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from completed_at
    virtual: true
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
  - name: updated_at_year
    sql: EXTRACT(YEAR FROM updated_at)
    type: number
    description: Year extracted from updated_at
    virtual: true
  - name: updated_at_month
    sql: TO_CHAR(updated_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from updated_at
    virtual: true
measures:
  - name: remediation_action_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Users
    relationship: many_to_one
    join_columns:
      from: assigned_to
      to: id
    description: Each remediation_action belongs to one user
  - target_entity: VulnerabilityInstances
    relationship: many_to_one
    join_columns:
      from: vulnerability_instance_id
      to: id
    description: Each remediation_action belongs to one vulnerability_instance
use_cases:
  - Use for segmentation analysis by status, priority
  - Use for time-series analysis using due_date, completed_at, created_at, updated_at
  - Join with users, vulnerability_instances for cross-entity analysis
query_patterns:
  - description: RemediationActions by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM remediation_actions
      GROUP BY status
      ORDER BY count DESC
  - description: RemediationActions by priority
    sql: |-
      SELECT priority, COUNT(*) as count
      FROM remediation_actions
      GROUP BY priority
      ORDER BY count DESC
