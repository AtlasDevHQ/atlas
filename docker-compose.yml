# Local dev: Postgres + sandbox sidecar.
#   atlas       — Atlas internal DB (auth, audit, settings)
#   atlas_demo  — Demo analytics datasource (disposable, re-seedable)
#   sandbox     — Isolated container for explore tool (shell + Python execution)
#
# .env should have:
#   DATABASE_URL=postgresql://atlas:atlas@localhost:5432/atlas
#   ATLAS_DATASOURCE_URL=postgresql://atlas:atlas@localhost:5432/atlas_demo
#   ATLAS_SANDBOX_URL=http://localhost:8080

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/cli/data/init-demo-db.sql:/docker-entrypoint-initdb.d/00-init.sql
      - ./packages/cli/data/ecommerce.sql:/data/ecommerce.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 5s
      retries: 5

  sandbox:
    build:
      context: .
      dockerfile: packages/sandbox-sidecar/Dockerfile
    ports:
      # Loopback only — the sidecar runs with auth disabled in local dev and
      # must never be reachable from other hosts on the network.
      - "127.0.0.1:8080:8080"
    volumes:
      - ./semantic:/semantic:ro
    environment:
      SEMANTIC_DIR: /semantic
      # Local dev runs without a token; the sidecar fails closed otherwise, so
      # the no-auth mode requires this explicit opt-out. Production deploys must
      # set SIDECAR_AUTH_TOKEN on both the API and sandbox services instead.
      SIDECAR_AUTH_DISABLE: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
