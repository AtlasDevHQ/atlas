name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.11"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check dependency versions (syncpack)
        run: bun x syncpack lint

      - name: Check Dockerfile bun version pins
        run: |
          EXPECTED="${{ env.BUN_VERSION }}"
          ERRORS=0
          for f in $(find . -name Dockerfile -not -path './.git/*' -not -path './node_modules/*'); do
            if ! grep -q 'oven/bun:' "$f"; then continue; fi
            ACTUAL=$(grep -o 'oven/bun:[0-9.]*' "$f" | head -1 | cut -d: -f2)
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error file=$f::Dockerfile pins bun $ACTUAL, expected $EXPECTED"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo "All Dockerfiles pin bun $EXPECTED"

      - name: Check Dockerfile workspace completeness
        run: bash scripts/check-dockerfile-workspace.sh

      - name: Check Railway watchPatterns coverage
        run: bash scripts/check-railway-watch.sh

      - name: Check template drift
        run: bash scripts/check-template-drift.sh

      - name: Check security-headers drift
        run: bash scripts/check-security-headers-drift.sh

      - name: Check Drizzle schema ↔ migration drift
        run: bash scripts/check-schema-drift.sh

      - name: Check vendored @atlas/oauth-helper ↔ canonical drift
        run: bash scripts/check-oauth-helper-drift.sh

      - name: Build SDK packages
        run: bun run --filter '@useatlas/types' build && bun run --filter '@useatlas/plugin-sdk' build && bun run --filter '@useatlas/sdk' build

      - name: Build widget bundle
        run: bun run --filter '@useatlas/react' build

      - name: Build
        run: bun run build

      - name: Check OpenAPI ↔ api-reference drift
        # Runs after SDK + widget + app builds so extract-openapi.ts can resolve
        # @useatlas/types and other built dependencies at import time.
        run: bash scripts/check-openapi-drift.sh

      - name: Type check
        run: bun run type

      - name: Type check (frontend packages)
        run: bun run --filter '@atlas/web' type

      - name: Lint
        run: bun run lint

      # @atlas/api tests run in the parallel api-tests job (sharded 4-way).
      # Other workspace test suites are small, stay serial here.
      - name: Test (non-api packages)
        run: bun run test:others

      # E2E integration tier — contract tests that pin protocol-level
      # invariants across packages (e.g. MCP multi-replica session
      # locality, #2069). Runs in-process via mock.module(), no Docker
      # services needed.
      - name: Test (e2e integration tier)
        run: bun run test:e2e:integration

  api-tests:
    name: api-tests (${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # @useatlas/types and @useatlas/plugin-sdk both resolve to their
      # `dist/` via their "exports" field, so api tests can't import them
      # until the packages have been built. plugin-sdk is required because
      # `description-rubric.test.ts` imports `@useatlas/yaml-context`,
      # which imports `@useatlas/plugin-sdk` for the plugin contract.
      - name: Build @useatlas/types + @useatlas/plugin-sdk
        run: bun run --filter '@useatlas/types' build && bun run --filter '@useatlas/plugin-sdk' build

      - name: Test @atlas/api (shard ${{ matrix.shard }}/4)
        working-directory: packages/api
        env:
          # Postgres service container exposed on localhost:5432 — the
          # migration smoke test (`migrate-pg.test.ts`) runs every
          # migration end-to-end against a real Postgres so SQL
          # semantic errors (the 0054 class) fail CI instead of prod
          # boot. Tests skip cleanly when this env var is unset, so
          # local-dev runs without `bun run db:up` are unaffected.
          TEST_DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas
        run: bun run scripts/test-isolated.ts --shard ${{ matrix.shard }}/4
    services:
      # Postgres for the migration smoke test. The other 3 shards see
      # the same service (matrix shares the `services` block), which is
      # fine — only one shard at a time runs the migrate-pg test, and
      # it scopes its writes to a per-test schema so concurrent shards
      # don't trample each other.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
