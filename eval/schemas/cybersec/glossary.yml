  agent_version:
    status: defined
    definition: 'Categorical field on agents. Possible values: v2.1.0, v2.2.0, v2.3.1, v2.4.0, v2.5.0, v3.0.0, v3.0.1, v3.1.0.'
  note:
    status: defined
    definition: >-
      Categorical field on alert_acknowledgments. Possible values: Escalated to team lead, False positive, Handled via
      playbook, Investigating, Known issue.
  condition_type:
    status: defined
    definition: 'Categorical field on alert_rules. Possible values: anomaly, correlation, pattern, threshold.'
  source:
    status: defined
    definition: 'Categorical field on alerts. Possible values: agent, cloud_trail, edr, firewall, ids, scanner, siem, user_report.'
  permissions:
    status: defined
    definition: 'Categorical field on api_keys. Possible values: admin, read, read:write.'
  method:
    status: defined
    definition: 'Categorical field on api_requests. Possible values: DELETE, GET, POST, PUT.'
  path:
    status: defined
    definition: >-
      Categorical field on api_requests. Possible values: /api/v1/alerts, /api/v1/assets, /api/v1/compliance,
      /api/v1/incidents, /api/v1/reports, /api/v1/scans, /api/v1/users, /api/v1/vulnerabilities.
  request_body:
    status: defined
    definition: 'Categorical field on api_requests. Possible values: .'
  key:
    status: defined
    definition: >-
      Categorical field on asset_tags. Possible values: backup_policy, compliance, cost_center, criticality, env, owner,
      project, region, team, tier.
  os:
    status: defined
    definition: >-
      Categorical field on assets. Possible values: Alpine, Amazon Linux, CentOS, Debian, RHEL, Ubuntu, Windows Server,
      macOS.
  os_version:
    status: defined
    definition: 'Categorical field on assets. Possible values: 12, 14, 20.04, 2019, 2022, 22.04, 3.18, 7, 8.'
  environment:
    status: defined
    definition: 'Categorical field on assets. Possible values: development, dmz, production, staging.'
  resource_type:
    status: defined
    definition: >-
      Categorical field on audit_log. Possible values: alert, api_key, asset, dashboard, incident, integration, report,
      scan, team, user.
  evidence:
    status: defined
    definition: >-
      Categorical field on compliance_findings. Possible values: Evidence collected from audit log and configuration
      review.
  notes:
    status: defined
    definition: 'Categorical field on compliance_findings. Possible values: Remediation required within 30 days.'
  widget_type:
    status: defined
    definition: >-
      Categorical field on dashboard_widgets. Possible values: chart, gauge, heatmap, list, map, metric, table,
      timeline.
  layout:
    status: defined
    definition: 'Categorical field on dashboards. Possible values: {"columns":12,"rows":"auto"}.'
  feature_name:
    status: defined
    definition: >-
      Categorical field on feature_usage. Possible values: alert_rules, api_access, asset_inventory,
      compliance_dashboard, executive_dashboard, incident_manager, integrations, report_builder, threat_intel,
      vulnerability_scanner.
  metadata:
    status: defined
    definition: 'Categorical field on feature_usage. Possible values: .'
  content:
    status: defined
    definition: >-
      Categorical field on incident_comments. Possible values: All affected credentials rotated., Confirmed malicious
      activity. Escalating to tier 2., Containment actions in progress. Affected systems isolated., Customer notified
      per SLA requirements., False positive — benign automation script., Forensic image captured for evidence
      preservation., IOCs extracted and shared with threat intel team., Monitoring for recurrence. Will close after 48h
      clear window., Playbook step 3 complete. Moving to eradication., Root cause identified: unpatched vulnerability
      CVE-2024-XXXX..
  ioc_type:
    status: defined
    definition: 'Categorical field on indicators_of_compromise. Possible values: domain, email, hash, ip, url.'
  direction:
    status: defined
    definition: 'Categorical field on integration_events. Possible values: inbound, outbound.'
  role_name:
    status: defined
    definition: 'Categorical field on invitations. Possible values: analyst, responder, viewer.'
  risk_category:
    status: defined
    definition: >-
      Categorical field on legacy_risk_scores. Possible values: compliance, financial, operational, threat,
      vulnerability.
  user_agent:
    status: defined
    definition: >-
      Categorical field on login_events. Possible values: Mozilla/5.0 (Macintosh; Intel Mac OS X) Safari/17, Mozilla/5.0
      (Windows NT 10.0; Win64; x64) Chrome/120, Mozilla/5.0 (X11; Linux x86_64) Firefox/121, Mozilla/5.0 (iPhone; CPU
      iPhone OS 17) Mobile, curl/8.4.0, python-requests/2.31.
  failure_reason:
    status: defined
    definition: 'Categorical field on login_events. Possible values: account_locked, expired_session, invalid_password, mfa_failed.'
  message:
    status: defined
    definition: 'Categorical field on notifications. Possible values: Please review and take appropriate action..'
  notification_type:
    status: defined
    definition: 'Categorical field on notifications_backup. Possible values: email, in_app, push, sms.'
  subject:
    status: defined
    definition: >-
      Categorical field on notifications_backup. Possible values: Account Activity, Action Required, Compliance
      Reminder, New Incident, Scan Complete, Security Alert, System Update, Weekly Report.
  body:
    status: defined
    definition: >-
      Categorical field on notifications_backup. Possible values: This is a legacy notification from the old
      notification system..
  scan_frequency:
