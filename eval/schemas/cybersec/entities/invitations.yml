name: Invitations
type: fact_table
table: invitations
grain: one row per invitation record
description: Auto-profiled schema for invitations (150 rows). Contains 8 columns, linked to users, organizations.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 150
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 99
    sample_values:
      - '5'
      - '8'
      - '11'
      - '12'
      - '13'
      - '15'
      - '16'
      - '17'
  - name: email
    sql: email
    type: string
    unique_count: 150
    sample_values:
      - invite100@example.com
      - invite101@example.com
      - invite102@example.com
      - invite103@example.com
      - invite104@example.com
      - invite105@example.com
      - invite106@example.com
      - invite107@example.com
  - name: role_name
    sql: role_name
    type: string
    unique_count: 3
    sample_values:
      - analyst
      - responder
      - viewer
  - name: invited_by
    sql: invited_by
    type: number
    description: Foreign key to users
    unique_count: 148
    sample_values:
      - '5'
      - '17'
      - '20'
      - '29'
      - '32'
      - '58'
      - '77'
      - '101'
  - name: status
    sql: status
    type: string
    unique_count: 3
    sample_values:
      - accepted
      - expired
      - pending
  - name: created_at
    sql: created_at
    type: date
    unique_count: 150
    sample_values:
      - Thu Dec 04 2025 02:03:06 GMT-0500 (Eastern Standard Time)
      - Thu Dec 04 2025 07:27:21 GMT-0500 (Eastern Standard Time)
      - Thu Dec 04 2025 15:21:13 GMT-0500 (Eastern Standard Time)
      - Thu Dec 04 2025 23:39:51 GMT-0500 (Eastern Standard Time)
      - Fri Dec 05 2025 13:05:56 GMT-0500 (Eastern Standard Time)
      - Fri Dec 05 2025 15:12:50 GMT-0500 (Eastern Standard Time)
      - Sat Dec 06 2025 09:29:16 GMT-0500 (Eastern Standard Time)
      - Sat Dec 06 2025 10:15:17 GMT-0500 (Eastern Standard Time)
  - name: expires_at
    sql: expires_at
    type: date
    unique_count: 150
    sample_values:
      - Sun Feb 01 2026 23:07:04 GMT-0500 (Eastern Standard Time)
      - Tue Feb 03 2026 00:25:01 GMT-0500 (Eastern Standard Time)
      - Wed Feb 04 2026 00:31:05 GMT-0500 (Eastern Standard Time)
      - Thu Feb 05 2026 07:40:28 GMT-0500 (Eastern Standard Time)
      - Fri Feb 06 2026 04:13:44 GMT-0500 (Eastern Standard Time)
      - Fri Feb 06 2026 05:31:00 GMT-0500 (Eastern Standard Time)
      - Fri Feb 06 2026 06:01:53 GMT-0500 (Eastern Standard Time)
      - Fri Feb 06 2026 09:19:51 GMT-0500 (Eastern Standard Time)
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
  - name: expires_at_year
    sql: EXTRACT(YEAR FROM expires_at)
    type: number
    description: Year extracted from expires_at
    virtual: true
  - name: expires_at_month
    sql: TO_CHAR(expires_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from expires_at
    virtual: true
measures:
  - name: invitation_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Users
    relationship: many_to_one
    join_columns:
      from: invited_by
      to: id
    description: Each invitation belongs to one user
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each invitation belongs to one organization
use_cases:
  - Use for segmentation analysis by role_name, status
  - Use for time-series analysis using created_at, expires_at
  - Join with users, organizations for cross-entity analysis
query_patterns:
  - description: Invitations by role_name
    sql: |-
      SELECT role_name, COUNT(*) as count
      FROM invitations
      GROUP BY role_name
      ORDER BY count DESC
  - description: Invitations by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM invitations
      GROUP BY status
      ORDER BY count DESC
