id: "cs-016"
question: "What is the revenue at risk from organizations with critical compliance findings?"
schema: cybersec
difficulty: complex
category: cte
tags: [compliance_findings, compliance_assessments, subscriptions, revenue-at-risk]
gold_sql: |
  WITH at_risk_orgs AS (
    SELECT DISTINCT ca.org_id
    FROM compliance_findings cf
    JOIN compliance_assessments ca ON cf.assessment_id = ca.id
    WHERE cf.severity = 'critical' AND cf.status != 'resolved'
  )
  SELECT
    o.name AS organization,
    SUM(s.mrr_cents) / 100.0 AS mrr_at_risk_dollars
  FROM at_risk_orgs aro
  JOIN organizations o ON aro.org_id = o.id
  JOIN subscriptions s ON s.org_id = o.id AND s.status = 'active'
  GROUP BY o.name
  ORDER BY mrr_at_risk_dollars DESC
expected_rows: null
notes: "Tests CTE to identify at-risk orgs, then JOINs to revenue data for business impact"
