query_patterns:
  - description: OrdersDenormalized by order_status
    sql: |-
      SELECT order_status, COUNT(*) as count
      FROM orders_denormalized
      GROUP BY order_status
      ORDER BY count DESC
  - description: OrdersDenormalized by shipping_state
