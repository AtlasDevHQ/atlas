measures:
  - name: seller_application_count
    sql: id
    type: count_distinct
use_cases:
  - Use for segmentation analysis by status, notes
  - Use for time-series analysis using applied_at, reviewed_at
query_patterns:
  - description: SellerApplications by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM seller_applications
      GROUP BY status
      ORDER BY count DESC
  - description: SellerApplications by notes
    sql: |-
      SELECT notes, COUNT(*) as count
      FROM seller_applications
      GROUP BY notes
      ORDER BY count DESC
