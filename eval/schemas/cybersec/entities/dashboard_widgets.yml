name: DashboardWidgets
type: fact_table
table: dashboard_widgets
grain: one row per dashboard widget record
description: Auto-profiled schema for dashboard_widgets (1,200 rows). Contains 9 columns, linked to dashboards.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 1200
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: dashboard_id
    sql: dashboard_id
    type: number
    description: Foreign key to dashboards
    unique_count: 295
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: widget_type
    sql: widget_type
    type: string
    unique_count: 8
    sample_values:
      - chart
      - gauge
      - heatmap
      - list
      - map
      - metric
      - table
      - timeline
  - name: title
    sql: title
    type: string
    unique_count: 10
    sample_values:
      - Agent Health
      - Alert Volume
      - Asset Count
      - Compliance Score
      - Critical Vulns
      - Mean Time to Remediate
      - Open Incidents
      - Risk Trend
      - Scan Coverage
      - Top CVEs
  - name: config
    sql: config
    type: string
    unique_count: 1
    sample_values:
      - '{"datasource":"auto","refresh":300}'
  - name: position_x
    sql: position_x
    type: number
    unique_count: 3
    sample_values:
      - '0'
      - '4'
      - '8'
  - name: position_y
    sql: position_y
    type: number
    unique_count: 4
    sample_values:
      - '0'
      - '3'
      - '6'
      - '9'
  - name: width
    sql: width
    type: number
    unique_count: 4
    sample_values:
      - '4'
      - '6'
      - '8'
      - '12'
  - name: height
    sql: height
    type: number
    unique_count: 4
    sample_values:
      - '2'
      - '3'
      - '4'
      - '6'
  - name: position_x_bucket
    sql: |-
      CASE
        WHEN position_x < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY position_x) FROM dashboard_widgets) THEN 'Low'
        WHEN position_x < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY position_x) FROM dashboard_widgets) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: position x bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: position_y_bucket
    sql: |-
      CASE
        WHEN position_y < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY position_y) FROM dashboard_widgets) THEN 'Low'
        WHEN position_y < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY position_y) FROM dashboard_widgets) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: position y bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: width_bucket
    sql: |-
      CASE
        WHEN width < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY width) FROM dashboard_widgets) THEN 'Low'
        WHEN width < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY width) FROM dashboard_widgets) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: width bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: height_bucket
    sql: |-
      CASE
        WHEN height < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY height) FROM dashboard_widgets) THEN 'Low'
        WHEN height < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY height) FROM dashboard_widgets) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: height bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
measures:
  - name: dashboard_widget_count
    sql: id
    type: count_distinct
  - name: total_position_x
    sql: position_x
    type: sum
    description: Sum of position x
  - name: avg_position_x
    sql: position_x
    type: avg
    description: Average position x
  - name: total_position_y
    sql: position_y
    type: sum
    description: Sum of position y
  - name: avg_position_y
    sql: position_y
    type: avg
    description: Average position y
  - name: total_width
    sql: width
    type: sum
    description: Sum of width
  - name: avg_width
    sql: width
    type: avg
    description: Average width
  - name: total_height
    sql: height
    type: sum
    description: Sum of height
  - name: avg_height
    sql: height
    type: avg
    description: Average height
joins:
  - target_entity: Dashboards
    relationship: many_to_one
    join_columns:
      from: dashboard_id
      to: id
    description: Each dashboard_widget belongs to one dashboard
use_cases:
  - Use for segmentation analysis by widget_type, title, config
  - Use for aggregation and trends on position_x, position_y, width, height
  - Join with dashboards for cross-entity analysis
query_patterns:
  - description: DashboardWidgets by widget_type
    sql: |-
      SELECT widget_type, COUNT(*) as count
      FROM dashboard_widgets
      GROUP BY widget_type
      ORDER BY count DESC
  - description: DashboardWidgets by title
    sql: |-
      SELECT title, COUNT(*) as count
      FROM dashboard_widgets
      GROUP BY title
      ORDER BY count DESC
  - description: Total position_x by widget_type
    sql: |-
      SELECT widget_type, SUM(position_x) as total_position_x, COUNT(*) as count
      FROM dashboard_widgets
      GROUP BY widget_type
      ORDER BY total_position_x DESC
