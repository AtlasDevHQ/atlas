metrics:
  - id: vulnerabilities_count
    label: Total Vulnerabilities
    description: Count of distinct vulnerabilities records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM vulnerabilities
    aggregation: count_distinct
  - id: total_cvss_score
    label: Total cvss score
    description: Sum of cvss_score across all vulnerabilities.
    type: atomic
    source:
      entity: Vulnerabilities
      measure: total_cvss_score
    sql: |-
      SELECT SUM(cvss_score) as total_cvss_score
      FROM vulnerabilities
    aggregation: sum
    objective: maximize
  - id: avg_cvss_score
    label: Average cvss score
    description: Average cvss_score per vulnerability.
    type: atomic
    sql: |-
      SELECT AVG(cvss_score) as avg_cvss_score
      FROM vulnerabilities
    aggregation: avg
  - id: cvss_score_by_severity
    label: cvss score by severity
    description: cvss_score broken down by severity.
    type: atomic
    sql: |-
      SELECT severity, SUM(cvss_score) as total_cvss_score, AVG(cvss_score) as avg_cvss_score, COUNT(*) as count
      FROM vulnerabilities
      GROUP BY severity
      ORDER BY total_cvss_score DESC
