    virtual: true
measures:
  - name: api_key_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each api_key belongs to one organization
  - target_entity: Users
    relationship: many_to_one
    join_columns:
      from: user_id
      to: id
    description: Each api_key belongs to one user
use_cases:
  - Use for segmentation analysis by name, permissions
  - Use for time-series analysis using last_used, created_at, expires_at
  - Join with organizations, users for cross-entity analysis
  - Avoid for row-level api_requests queries — use those entities directly
query_patterns:
  - description: ApiKeys by name
    sql: |-
      SELECT name, COUNT(*) as count
      FROM api_keys
      GROUP BY name
      ORDER BY count DESC
  - description: ApiKeys by permissions
    sql: |-
      SELECT permissions, COUNT(*) as count
      FROM api_keys
      GROUP BY permissions
      ORDER BY count DESC
