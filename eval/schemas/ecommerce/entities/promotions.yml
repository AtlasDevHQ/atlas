  - name: times_used_bucket
    sql: |-
      CASE
        WHEN times_used < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY times_used) FROM promotions) THEN 'Low'
        WHEN times_used < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY times_used) FROM promotions) THEN 'Medium'
        ELSE 'High'
