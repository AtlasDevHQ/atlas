    virtual: true
measures:
  - name: promotion_count
    sql: id
    type: count_distinct
  - name: total_value
    sql: value
    type: sum
    description: Sum of value
  - name: avg_value
    sql: value
    type: avg
    description: Average value
  - name: total_min_order_cents
    sql: min_order_cents
    type: sum
    description: Sum of min order cents
  - name: avg_min_order_cents
    sql: min_order_cents
    type: avg
    description: Average min order cents
  - name: total_max_uses
    sql: max_uses
    type: sum
    description: Sum of max uses
  - name: avg_max_uses
    sql: max_uses
    type: avg
    description: Average max uses
  - name: total_times_used
    sql: times_used
    type: sum
    description: Sum of times used
  - name: avg_times_used
    sql: times_used
    type: avg
    description: Average times used
use_cases:
  - Use for segmentation analysis by type
  - Use for aggregation and trends on value, min_order_cents, max_uses, times_used
  - Use for time-series analysis using starts_at, ends_at, created_at
  - Avoid for row-level orders/promotion_usages queries — use those entities directly
query_patterns:
  - description: Promotions by type
    sql: |-
      SELECT type, COUNT(*) as count
      FROM promotions
      GROUP BY type
      ORDER BY count DESC
  - description: Total value by type
    sql: |-
      SELECT type, SUM(value) as total_value, COUNT(*) as count
      FROM promotions
      GROUP BY type
      ORDER BY total_value DESC
