name: ComplianceControls
type: fact_table
table: compliance_controls
grain: one row per compliance control record
description: Auto-profiled schema for compliance_controls (200 rows). Contains 6 columns, linked to compliance_frameworks.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 200
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: framework_id
    sql: framework_id
    type: number
    description: Foreign key to compliance_frameworks
    unique_count: 5
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
  - name: control_id_code
    sql: control_id_code
    type: string
    unique_count: 200
    sample_values:
      - HIP-004
      - HIP-009
      - HIP-014
      - HIP-019
      - HIP-024
      - HIP-029
      - HIP-034
      - HIP-039
  - name: title
    sql: title
    type: string
    unique_count: 20
    sample_values:
      - 'Control: API security controls'
      - 'Control: Access control policy enforcement'
      - 'Control: Audit log retention'
      - 'Control: Backup verification'
      - 'Control: Change management process'
      - 'Control: Cloud security posture management'
      - 'Control: Data classification policy'
      - 'Control: Encryption at rest'
  - name: description
    sql: description
    type: string
    unique_count: 20
    sample_values:
      - Detailed requirements for access control policy enforcement
      - Detailed requirements for api security controls
      - Detailed requirements for audit log retention
      - Detailed requirements for backup verification
      - Detailed requirements for change management process
      - Detailed requirements for cloud security posture management
      - Detailed requirements for data classification policy
      - Detailed requirements for encryption at rest
  - name: category
    sql: category
    type: string
    unique_count: 10
    sample_values:
      - Access Control
      - Audit
      - Configuration Management
      - Data Protection
      - Incident Response
      - Network Security
      - Personnel Security
      - Physical Security
      - Risk Management
      - System Integrity
measures:
  - name: compliance_control_count
    sql: id
    type: count_distinct
joins:
  - target_entity: ComplianceFrameworks
    relationship: many_to_one
    join_columns:
      from: framework_id
      to: id
    description: Each compliance_control belongs to one compliance_framework
use_cases:
  - Use for segmentation analysis by category
  - Join with compliance_frameworks for cross-entity analysis
  - Avoid for row-level compliance_findings queries — use those entities directly
query_patterns:
  - description: ComplianceControls by category
    sql: |-
      SELECT category, COUNT(*) as count
      FROM compliance_controls
      GROUP BY category
      ORDER BY count DESC
