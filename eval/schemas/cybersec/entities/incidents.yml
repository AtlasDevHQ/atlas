  - name: resolved_at_month
    sql: TO_CHAR(resolved_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from resolved_at
    virtual: true
measures:
  - name: incident_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Users
    relationship: many_to_one
    join_columns:
      from: assigned_to
      to: id
    description: Each incident belongs to one user
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each incident belongs to one organization
use_cases:
  - Use for segmentation analysis by severity, status
  - Use for time-series analysis using created_at, updated_at, resolved_at
  - Join with users, organizations for cross-entity analysis
  - Avoid for row-level alerts/incident_comments/incident_events queries — use those entities directly
query_patterns:
  - description: Incidents by severity
    sql: |-
      SELECT severity, COUNT(*) as count
      FROM incidents
      GROUP BY severity
      ORDER BY count DESC
  - description: Incidents by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM incidents
      GROUP BY status
      ORDER BY count DESC
