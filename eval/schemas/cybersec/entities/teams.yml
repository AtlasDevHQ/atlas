name: Teams
type: fact_table
table: teams
grain: one row per team record
description: Auto-profiled schema for teams (400 rows). Contains 5 columns, linked to organizations.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 400
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 200
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: name
    sql: name
    type: string
    unique_count: 10
    sample_values:
      - Compliance
      - Detection Engineering
      - Incident Response
      - Platform Engineering
      - Red Team
      - Risk Assessment
      - Security Operations
      - Security Research
      - Threat Hunting
      - Vulnerability Management
  - name: description
    sql: description
    type: string
    unique_count: 10
    sample_values:
      - Team responsible for compliance
      - Team responsible for detection engineering
      - Team responsible for incident response
      - Team responsible for platform engineering
      - Team responsible for red team
      - Team responsible for risk assessment
      - Team responsible for security operations
      - Team responsible for security research
      - Team responsible for threat hunting
      - Team responsible for vulnerability management
  - name: created_at
    sql: created_at
    type: date
    unique_count: 400
    sample_values:
      - Tue Jan 21 2020 08:18:29 GMT-0500 (Eastern Standard Time)
      - Fri Jan 24 2020 11:26:17 GMT-0500 (Eastern Standard Time)
      - Fri Jan 24 2020 19:58:46 GMT-0500 (Eastern Standard Time)
      - Tue Jan 28 2020 23:01:16 GMT-0500 (Eastern Standard Time)
      - Sun Feb 02 2020 22:23:00 GMT-0500 (Eastern Standard Time)
      - Mon Feb 03 2020 04:52:52 GMT-0500 (Eastern Standard Time)
      - Tue Feb 04 2020 03:52:04 GMT-0500 (Eastern Standard Time)
      - Thu Feb 06 2020 09:52:47 GMT-0500 (Eastern Standard Time)
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: team_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each team belongs to one organization
use_cases:
  - Use for segmentation analysis by name, description
  - Use for time-series analysis using created_at
  - Join with organizations for cross-entity analysis
  - Avoid for row-level team_memberships queries — use those entities directly
query_patterns:
  - description: Teams by name
    sql: |-
      SELECT name, COUNT(*) as count
      FROM teams
      GROUP BY name
      ORDER BY count DESC
  - description: Teams by description
    sql: |-
      SELECT description, COUNT(*) as count
      FROM teams
      GROUP BY description
      ORDER BY count DESC
