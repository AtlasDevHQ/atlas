name: AlertRules
type: fact_table
table: alert_rules
grain: one row per alert rule record
description: Auto-profiled schema for alert_rules (200 rows). Contains 8 columns, linked to organizations.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 200
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 124
    sample_values:
      - '1'
      - '2'
      - '4'
      - '6'
      - '8'
      - '9'
      - '12'
      - '13'
  - name: name
    sql: name
    type: string
    unique_count: 200
    sample_values:
      - Brute force detection - Rule 1
      - Brute force detection - Rule 106
      - Brute force detection - Rule 117
      - Brute force detection - Rule 123
      - Brute force detection - Rule 132
      - Brute force detection - Rule 137
      - Brute force detection - Rule 138
      - Brute force detection - Rule 162
  - name: condition_type
    sql: condition_type
    type: string
    unique_count: 4
    sample_values:
      - anomaly
      - correlation
      - pattern
      - threshold
  - name: threshold
    sql: threshold
    type: number
    unique_count: 5
    sample_values:
      - '1'
      - '5'
      - '10'
      - '50'
      - '100'
  - name: severity
    sql: severity
    type: string
    unique_count: 4
    sample_values:
      - critical
      - high
      - low
      - medium
  - name: is_active
    sql: is_active
    type: boolean
    unique_count: 2
    sample_values:
      - 'false'
      - 'true'
  - name: created_at
    sql: created_at
    type: date
    unique_count: 200
    sample_values:
      - Thu Jan 23 2020 01:12:00 GMT-0500 (Eastern Standard Time)
      - Thu Jan 30 2020 23:04:08 GMT-0500 (Eastern Standard Time)
      - Sat Feb 01 2020 14:43:52 GMT-0500 (Eastern Standard Time)
      - Thu Apr 09 2020 05:21:55 GMT-0400 (Eastern Daylight Time)
      - Sat Apr 11 2020 18:13:16 GMT-0400 (Eastern Daylight Time)
      - Sat Apr 18 2020 16:02:05 GMT-0400 (Eastern Daylight Time)
      - Tue Apr 21 2020 05:43:29 GMT-0400 (Eastern Daylight Time)
      - Thu Apr 30 2020 16:38:46 GMT-0400 (Eastern Daylight Time)
  - name: threshold_bucket
    sql: |-
      CASE
        WHEN threshold < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY threshold) FROM alert_rules) THEN 'Low'
        WHEN threshold < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY threshold) FROM alert_rules) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: threshold bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: alert_rule_count
    sql: id
    type: count_distinct
  - name: total_threshold
    sql: threshold
    type: sum
    description: Sum of threshold
  - name: avg_threshold
    sql: threshold
    type: avg
    description: Average threshold
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each alert_rule belongs to one organization
use_cases:
  - Use for segmentation analysis by condition_type, severity
  - Use for aggregation and trends on threshold
  - Use for time-series analysis using created_at
  - Join with organizations for cross-entity analysis
  - Avoid for row-level alerts queries — use those entities directly
query_patterns:
  - description: AlertRules by condition_type
    sql: |-
      SELECT condition_type, COUNT(*) as count
      FROM alert_rules
      GROUP BY condition_type
      ORDER BY count DESC
  - description: AlertRules by severity
    sql: |-
      SELECT severity, COUNT(*) as count
      FROM alert_rules
      GROUP BY severity
      ORDER BY count DESC
  - description: Total threshold by condition_type
    sql: |-
      SELECT condition_type, SUM(threshold) as total_threshold, COUNT(*) as count
      FROM alert_rules
      GROUP BY condition_type
      ORDER BY total_threshold DESC
