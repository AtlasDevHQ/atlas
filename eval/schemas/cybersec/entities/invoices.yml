  - name: amount_cents_bucket
    sql: |-
      CASE
        WHEN amount_cents < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY amount_cents) FROM invoices) THEN 'Low'
        WHEN amount_cents < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY amount_cents) FROM invoices) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: amount cents bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: period_start_year
    sql: EXTRACT(YEAR FROM period_start)
    type: number
    description: Year extracted from period_start
    virtual: true
  - name: period_start_month
    sql: TO_CHAR(period_start, 'YYYY-MM')
    type: string
    description: Year-month extracted from period_start
    virtual: true
  - name: period_end_year
    sql: EXTRACT(YEAR FROM period_end)
    type: number
    description: Year extracted from period_end
    virtual: true
  - name: period_end_month
    sql: TO_CHAR(period_end, 'YYYY-MM')
    type: string
    description: Year-month extracted from period_end
    virtual: true
  - name: due_date_year
    sql: EXTRACT(YEAR FROM due_date)
    type: number
    description: Year extracted from due_date
    virtual: true
  - name: due_date_month
    sql: TO_CHAR(due_date, 'YYYY-MM')
    type: string
    description: Year-month extracted from due_date
    virtual: true
  - name: paid_at_year
    sql: EXTRACT(YEAR FROM paid_at)
    type: number
    description: Year extracted from paid_at
    virtual: true
  - name: paid_at_month
    sql: TO_CHAR(paid_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from paid_at
    virtual: true
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: invoice_count
    sql: id
    type: count_distinct
  - name: total_amount_cents
    sql: amount_cents
    type: sum
    description: Sum of amount cents
  - name: avg_amount_cents
    sql: amount_cents
    type: avg
    description: Average amount cents
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each invoice belongs to one organization
  - target_entity: Subscriptions
    relationship: many_to_one
    join_columns:
      from: subscription_id
      to: id
    description: Each invoice belongs to one subscription
use_cases:
  - Use for segmentation analysis by status
  - Use for aggregation and trends on amount_cents
  - Use for time-series analysis using period_start, period_end, due_date, paid_at, created_at
  - Join with organizations, subscriptions for cross-entity analysis
  - Avoid for row-level invoice_line_items queries — use those entities directly
query_patterns:
  - description: Invoices by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM invoices
      GROUP BY status
      ORDER BY count DESC
  - description: Total amount_cents by status
    sql: |-
      SELECT status, SUM(amount_cents) as total_amount_cents, COUNT(*) as count
      FROM invoices
      GROUP BY status
      ORDER BY total_amount_cents DESC
