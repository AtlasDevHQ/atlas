metrics:
  - id: organization_health_scores_count
    label: Total OrganizationHealthScores
    description: Count of distinct organization_health_scores records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM organization_health_scores
    aggregation: count_distinct
  - id: total_score
    label: Total score
    description: Sum of score across all organization_health_scores.
    type: atomic
    source:
      entity: OrganizationHealthScores
      measure: total_score
    sql: |-
      SELECT SUM(score) as total_score
      FROM organization_health_scores
    aggregation: sum
    objective: maximize
  - id: avg_score
    label: Average score
    description: Average score per organization_health_score.
    type: atomic
    sql: |-
      SELECT AVG(score) as avg_score
      FROM organization_health_scores
    aggregation: avg
  - id: total_vulnerability_score
    label: Total vulnerability score
    description: Sum of vulnerability_score across all organization_health_scores.
    type: atomic
    source:
      entity: OrganizationHealthScores
      measure: total_vulnerability_score
    sql: |-
      SELECT SUM(vulnerability_score) as total_vulnerability_score
      FROM organization_health_scores
    aggregation: sum
    objective: maximize
  - id: avg_vulnerability_score
    label: Average vulnerability score
    description: Average vulnerability_score per organization_health_score.
    type: atomic
    sql: |-
      SELECT AVG(vulnerability_score) as avg_vulnerability_score
      FROM organization_health_scores
    aggregation: avg
  - id: total_compliance_score
    label: Total compliance score
    description: Sum of compliance_score across all organization_health_scores.
    type: atomic
    source:
      entity: OrganizationHealthScores
      measure: total_compliance_score
    sql: |-
      SELECT SUM(compliance_score) as total_compliance_score
      FROM organization_health_scores
    aggregation: sum
    objective: maximize
  - id: avg_compliance_score
    label: Average compliance score
    description: Average compliance_score per organization_health_score.
    type: atomic
    sql: |-
      SELECT AVG(compliance_score) as avg_compliance_score
      FROM organization_health_scores
    aggregation: avg
  - id: total_asset_coverage_score
    label: Total asset coverage score
    description: Sum of asset_coverage_score across all organization_health_scores.
    type: atomic
    source:
      entity: OrganizationHealthScores
      measure: total_asset_coverage_score
    sql: |-
      SELECT SUM(asset_coverage_score) as total_asset_coverage_score
      FROM organization_health_scores
    aggregation: sum
    objective: maximize
  - id: avg_asset_coverage_score
    label: Average asset coverage score
    description: Average asset_coverage_score per organization_health_score.
    type: atomic
    sql: |-
      SELECT AVG(asset_coverage_score) as avg_asset_coverage_score
      FROM organization_health_scores
    aggregation: avg
