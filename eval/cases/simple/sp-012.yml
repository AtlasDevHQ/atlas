id: "sp-012"
question: "Which departments have an above-average number of senior and executive employees compared to the company-wide ratio?"
schema: simple
difficulty: complex
category: cte
tags: [people, seniority, department, ratio]
gold_sql: |
  WITH dept_stats AS (
    SELECT
      department,
      COUNT(*) AS total,
      COUNT(*) FILTER (WHERE seniority IN ('Senior', 'Executive')) AS senior_count
    FROM people
    GROUP BY department
  ),
  overall AS (
    SELECT
      COUNT(*) FILTER (WHERE seniority IN ('Senior', 'Executive'))::numeric / COUNT(*) AS senior_ratio
    FROM people
  )
  SELECT
    d.department,
    d.total,
    d.senior_count,
    ROUND(d.senior_count::numeric / d.total * 100, 1) AS senior_pct,
    ROUND(o.senior_ratio * 100, 1) AS company_avg_pct
  FROM dept_stats d
  CROSS JOIN overall o
  WHERE d.senior_count::numeric / d.total > o.senior_ratio
  ORDER BY senior_pct DESC
expected_rows: null
notes: "Tests multi-CTE pattern comparing per-group ratios against overall baseline"
