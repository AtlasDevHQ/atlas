  - name: exp_month_bucket
    sql: |-
      CASE
        WHEN exp_month < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY exp_month) FROM payment_methods_backup) THEN 'Low'
        WHEN exp_month < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY exp_month) FROM payment_methods_backup) THEN 'Medium'
        ELSE 'High'
      END
