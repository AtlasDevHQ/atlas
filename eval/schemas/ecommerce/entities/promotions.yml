    type: string
    description: times used bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: starts_at_year
    sql: EXTRACT(YEAR FROM starts_at)
    type: number
    description: Year extracted from starts_at
    virtual: true
  - name: starts_at_month
    sql: TO_CHAR(starts_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from starts_at
