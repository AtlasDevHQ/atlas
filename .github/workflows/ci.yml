name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.11"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check dependency versions (syncpack)
        run: bun x syncpack lint

      - name: Check Dockerfile bun version pins
        run: |
          EXPECTED="${{ env.BUN_VERSION }}"
          ERRORS=0
          for f in $(find . -name Dockerfile -not -path './.git/*' -not -path './node_modules/*'); do
            if ! grep -q 'oven/bun:' "$f"; then continue; fi
            ACTUAL=$(grep -o 'oven/bun:[0-9.]*' "$f" | head -1 | cut -d: -f2)
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error file=$f::Dockerfile pins bun $ACTUAL, expected $EXPECTED"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo "All Dockerfiles pin bun $EXPECTED"

      - name: Check Dockerfile workspace completeness
        run: bash scripts/check-dockerfile-workspace.sh

      - name: Check template drift
        run: bash scripts/check-template-drift.sh

      - name: Check Drizzle schema ↔ migration drift
        run: bash scripts/check-schema-drift.sh

      - name: Build SDK packages
        run: bun run --filter '@useatlas/types' build && bun run --filter '@useatlas/plugin-sdk' build && bun run --filter '@useatlas/sdk' build

      - name: Build widget bundle
        run: bun run --filter '@useatlas/react' build

      - name: Build
        run: bun run build

      - name: Type check
        run: bun run type

      - name: Type check (frontend packages)
        run: bun run --filter '@atlas/web' type

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

