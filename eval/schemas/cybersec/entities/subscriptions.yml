name: Subscriptions
type: fact_table
table: subscriptions
grain: one row per subscription record
description: Auto-profiled schema for subscriptions (250 rows). Contains 10 columns, linked to organizations, plans.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 250
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 143
    sample_values:
      - '1'
      - '2'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
      - '9'
  - name: plan_id
    sql: plan_id
    type: number
    description: Foreign key to plans
    unique_count: 5
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
  - name: plan_name
    sql: plan_name
    type: string
    unique_count: 11
    sample_values:
      - Enterprise
      - Professional
      - Starter Plan
      - custom
      - ent
      - enterprise
      - free
      - free_tier
      - pro
      - professional
      - starter
    profiler_notes:
      - >-
        Case-inconsistent enum values: [Enterprise, enterprise; Professional, professional]. Consider using LOWER() for
        grouping
  - name: status
    sql: status
    type: string
    unique_count: 4
    sample_values:
      - active
      - canceled
      - past_due
      - trialing
  - name: mrr_cents
    sql: mrr_cents
    type: number
    unique_count: 49
    sample_values:
      - '0'
      - '4900'
      - '14900'
      - '25638'
      - '26929'
      - '29021'
      - '29954'
      - '30327'
  - name: started_at
    sql: started_at
    type: date
    unique_count: 250
    sample_values:
      - Thu Jun 06 2019 15:03:03 GMT-0400 (Eastern Daylight Time)
      - Sun Jun 09 2019 11:20:21 GMT-0400 (Eastern Daylight Time)
      - Sun Jun 16 2019 18:39:29 GMT-0400 (Eastern Daylight Time)
      - Tue Jun 25 2019 02:02:39 GMT-0400 (Eastern Daylight Time)
      - Fri Jun 28 2019 05:16:33 GMT-0400 (Eastern Daylight Time)
      - Sun Jul 07 2019 02:23:59 GMT-0400 (Eastern Daylight Time)
      - Fri Jul 12 2019 19:31:25 GMT-0400 (Eastern Daylight Time)
      - Sat Jul 13 2019 01:05:12 GMT-0400 (Eastern Daylight Time)
  - name: current_period_end
    sql: current_period_end
    type: date
    unique_count: 250
    sample_values:
      - Tue Mar 03 2026 13:48:03 GMT-0500 (Eastern Standard Time)
      - Wed Mar 04 2026 08:43:44 GMT-0500 (Eastern Standard Time)
      - Wed Mar 04 2026 17:24:01 GMT-0500 (Eastern Standard Time)
      - Sat Mar 07 2026 01:59:24 GMT-0500 (Eastern Standard Time)
      - Sat Mar 07 2026 06:55:37 GMT-0500 (Eastern Standard Time)
      - Wed Mar 11 2026 05:47:17 GMT-0400 (Eastern Daylight Time)
      - Sat Mar 14 2026 01:17:54 GMT-0400 (Eastern Daylight Time)
      - Mon Mar 16 2026 18:14:04 GMT-0400 (Eastern Daylight Time)
  - name: created_at
    sql: created_at
    type: date
    unique_count: 250
    sample_values:
      - Sun Jun 16 2019 21:04:12 GMT-0400 (Eastern Daylight Time)
      - Thu Jun 20 2019 08:42:55 GMT-0400 (Eastern Daylight Time)
      - Wed Jun 26 2019 19:36:54 GMT-0400 (Eastern Daylight Time)
      - Wed Jul 03 2019 08:10:27 GMT-0400 (Eastern Daylight Time)
      - Thu Jul 04 2019 16:01:00 GMT-0400 (Eastern Daylight Time)
      - Fri Jul 05 2019 08:43:58 GMT-0400 (Eastern Daylight Time)
      - Sat Jul 06 2019 06:48:22 GMT-0400 (Eastern Daylight Time)
      - Sun Jul 28 2019 20:26:54 GMT-0400 (Eastern Daylight Time)
  - name: updated_at
    sql: updated_at
    type: date
    unique_count: 1
    sample_values:
      - Tue Mar 03 2026 13:38:31 GMT-0500 (Eastern Standard Time)
  - name: mrr_cents_bucket
    sql: |-
      CASE
        WHEN mrr_cents < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY mrr_cents) FROM subscriptions) THEN 'Low'
        WHEN mrr_cents < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY mrr_cents) FROM subscriptions) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: mrr cents bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: started_at_year
    sql: EXTRACT(YEAR FROM started_at)
    type: number
    description: Year extracted from started_at
    virtual: true
  - name: started_at_month
    sql: TO_CHAR(started_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from started_at
    virtual: true
  - name: current_period_end_year
    sql: EXTRACT(YEAR FROM current_period_end)
    type: number
    description: Year extracted from current_period_end
    virtual: true
  - name: current_period_end_month
    sql: TO_CHAR(current_period_end, 'YYYY-MM')
    type: string
    description: Year-month extracted from current_period_end
    virtual: true
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
  - name: updated_at_year
    sql: EXTRACT(YEAR FROM updated_at)
    type: number
    description: Year extracted from updated_at
    virtual: true
  - name: updated_at_month
    sql: TO_CHAR(updated_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from updated_at
    virtual: true
measures:
  - name: subscription_count
    sql: id
    type: count_distinct
  - name: total_mrr_cents
    sql: mrr_cents
    type: sum
    description: Sum of mrr cents
  - name: avg_mrr_cents
    sql: mrr_cents
    type: avg
    description: Average mrr cents
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each subscription belongs to one organization
  - target_entity: Plans
    relationship: many_to_one
    join_columns:
      from: plan_id
      to: id
    description: Each subscription belongs to one plan
use_cases:
  - Use for segmentation analysis by plan_name, status
  - Use for aggregation and trends on mrr_cents
  - Use for time-series analysis using started_at, current_period_end, created_at, updated_at
  - Join with organizations, plans for cross-entity analysis
  - Avoid for row-level invoice_line_items/invoices/subscription_events queries — use those entities directly
query_patterns:
  - description: Subscriptions by plan_name
    sql: |-
      SELECT plan_name, COUNT(*) as count
      FROM subscriptions
      GROUP BY plan_name
      ORDER BY count DESC
  - description: Subscriptions by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM subscriptions
      GROUP BY status
      ORDER BY count DESC
  - description: Total mrr_cents by plan_name
    sql: |-
      SELECT plan_name, SUM(mrr_cents) as total_mrr_cents, COUNT(*) as count
      FROM subscriptions
      GROUP BY plan_name
      ORDER BY total_mrr_cents DESC
