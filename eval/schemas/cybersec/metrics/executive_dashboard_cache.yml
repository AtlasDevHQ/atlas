metrics:
  - id: executive_dashboard_cache_count
    label: Total ExecutiveDashboardCache
    description: Count of distinct executive_dashboard_cache records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM executive_dashboard_cache
    aggregation: count_distinct
  - id: total_total_assets
    label: Total total assets
    description: Sum of total_assets across all executive_dashboard_cache.
    type: atomic
    source:
      entity: ExecutiveDashboardCache
      measure: total_total_assets
    sql: |-
      SELECT SUM(total_assets) as total_total_assets
      FROM executive_dashboard_cache
    aggregation: sum
    objective: maximize
  - id: avg_total_assets
    label: Average total assets
    description: Average total_assets per executive_dashboard_cache.
    type: atomic
    sql: |-
      SELECT AVG(total_assets) as avg_total_assets
      FROM executive_dashboard_cache
    aggregation: avg
