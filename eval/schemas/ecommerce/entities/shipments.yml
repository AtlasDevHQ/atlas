  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: shipment_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Orders
    relationship: many_to_one
    join_columns:
      from: order_id
      to: id
    description: Each shipment belongs to one order
  - target_entity: Warehouses
    relationship: many_to_one
    join_columns:
      from: warehouse_id
      to: id
    description: Each shipment belongs to one warehous
use_cases:
  - Use for segmentation analysis by carrier, status
  - Use for time-series analysis using shipped_at, delivered_at, created_at
  - Join with orders, warehouses for cross-entity analysis
  - Avoid for row-level shipment_items queries — use those entities directly
query_patterns:
  - description: Shipments by carrier
    sql: |-
      SELECT carrier, COUNT(*) as count
      FROM shipments
      GROUP BY carrier
      ORDER BY count DESC
  - description: Shipments by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM shipments
      GROUP BY status
      ORDER BY count DESC
