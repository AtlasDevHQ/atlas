id: "cs-006"
question: "How many assets does each organization have, broken down by asset type?"
schema: cybersec
difficulty: medium
category: aggregation
tags: [assets, organizations, asset_type]
gold_sql: |
  SELECT
    o.name AS organization,
    a.asset_type,
    COUNT(*) AS asset_count
  FROM assets a
  JOIN organizations o ON a.org_id = o.id
  WHERE a.is_active = true
  GROUP BY o.name, a.asset_type
  ORDER BY o.name, asset_count DESC
expected_rows: null
notes: "Tests multi-column GROUP BY with JOIN"
