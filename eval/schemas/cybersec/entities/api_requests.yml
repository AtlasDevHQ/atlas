name: ApiRequests
type: fact_table
table: api_requests
grain: one row per api request record
description: Auto-profiled schema for api_requests (20,000 rows). Contains 9 columns, linked to api_keys, users.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 20000
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: api_key_id
    sql: api_key_id
    type: number
    description: Foreign key to api_keys
    unique_count: 300
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: user_id
    sql: user_id
    type: number
    unique_count: 2000
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
    profiler_notes:
      - Likely FK to users.id (inferred from column name, no constraint exists)
  - name: method
    sql: method
    type: string
    unique_count: 4
    sample_values:
      - DELETE
      - GET
      - POST
      - PUT
  - name: path
    sql: path
    type: string
    unique_count: 8
    sample_values:
      - /api/v1/alerts
      - /api/v1/assets
      - /api/v1/compliance
      - /api/v1/incidents
      - /api/v1/reports
      - /api/v1/scans
      - /api/v1/users
      - /api/v1/vulnerabilities
  - name: status_code
    sql: status_code
    type: number
    unique_count: 7
    sample_values:
      - '200'
      - '201'
      - '400'
      - '401'
      - '403'
      - '404'
      - '500'
  - name: response_time_ms
    sql: response_time_ms
    type: number
    unique_count: 2000
    sample_values:
      - '10'
      - '11'
      - '12'
      - '13'
      - '14'
      - '15'
      - '16'
      - '17'
  - name: request_body
    sql: request_body
    type: string
    unique_count: 0
    null_count: 20000
  - name: created_at
    sql: created_at
    type: date
    unique_count: 20000
    sample_values:
      - Wed Dec 03 2025 13:41:30 GMT-0500 (Eastern Standard Time)
      - Wed Dec 03 2025 14:00:51 GMT-0500 (Eastern Standard Time)
      - Wed Dec 03 2025 14:00:58 GMT-0500 (Eastern Standard Time)
      - Wed Dec 03 2025 14:02:20 GMT-0500 (Eastern Standard Time)
      - Wed Dec 03 2025 14:16:22 GMT-0500 (Eastern Standard Time)
      - Wed Dec 03 2025 14:16:26 GMT-0500 (Eastern Standard Time)
      - Wed Dec 03 2025 14:23:56 GMT-0500 (Eastern Standard Time)
      - Wed Dec 03 2025 14:24:55 GMT-0500 (Eastern Standard Time)
  - name: status_code_bucket
    sql: |-
      CASE
        WHEN status_code < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY status_code) FROM api_requests) THEN 'Low'
        WHEN status_code < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY status_code) FROM api_requests) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: status code bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: response_time_ms_bucket
    sql: |-
      CASE
        WHEN response_time_ms < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY response_time_ms) FROM api_requests) THEN 'Low'
        WHEN response_time_ms < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY response_time_ms) FROM api_requests) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: response time ms bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: api_request_count
    sql: id
    type: count_distinct
  - name: total_status_code
    sql: status_code
    type: sum
    description: Sum of status code
  - name: avg_status_code
    sql: status_code
    type: avg
    description: Average status code
  - name: total_response_time_ms
    sql: response_time_ms
    type: sum
    description: Sum of response time ms
  - name: avg_response_time_ms
    sql: response_time_ms
    type: avg
    description: Average response time ms
joins:
  - target_entity: ApiKeys
    relationship: many_to_one
    join_columns:
      from: api_key_id
      to: id
    description: Each api_request belongs to one api_key
  - target_entity: Users
    relationship: many_to_one
    join_columns:
      from: user_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name user_id
    description: Each api_request likely belongs to one user
use_cases:
  - Use for segmentation analysis by method, path, request_body
  - Use for aggregation and trends on status_code, response_time_ms
  - Use for time-series analysis using created_at
  - Join with api_keys, users for cross-entity analysis
query_patterns:
  - description: ApiRequests by method
    sql: |-
      SELECT method, COUNT(*) as count
      FROM api_requests
      GROUP BY method
      ORDER BY count DESC
  - description: ApiRequests by path
    sql: |-
      SELECT path, COUNT(*) as count
      FROM api_requests
      GROUP BY path
      ORDER BY count DESC
  - description: Total status_code by method
    sql: |-
      SELECT method, SUM(status_code) as total_status_code, COUNT(*) as count
      FROM api_requests
      GROUP BY method
      ORDER BY total_status_code DESC
