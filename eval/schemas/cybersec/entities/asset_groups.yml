name: AssetGroups
type: fact_table
table: asset_groups
grain: one row per asset group record
description: Auto-profiled schema for asset_groups (600 rows). Contains 5 columns, linked to organizations.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 600
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 200
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: name
    sql: name
    type: string
    unique_count: 600
    sample_values:
      - DMZ - Org 1
      - DMZ - Org 10
      - DMZ - Org 100
      - DMZ - Org 101
      - DMZ - Org 102
      - DMZ - Org 103
      - DMZ - Org 104
      - DMZ - Org 105
  - name: description
    sql: description
    type: string
    unique_count: 3
    sample_values:
      - Asset group for dmz assets
      - Asset group for production servers assets
      - Asset group for staging environment assets
  - name: created_at
    sql: created_at
    type: date
    unique_count: 600
    sample_values:
      - Thu Jan 02 2020 16:30:39 GMT-0500 (Eastern Standard Time)
      - Mon Jan 06 2020 05:04:43 GMT-0500 (Eastern Standard Time)
      - Mon Jan 06 2020 18:45:02 GMT-0500 (Eastern Standard Time)
      - Wed Jan 08 2020 20:13:26 GMT-0500 (Eastern Standard Time)
      - Fri Jan 10 2020 15:26:33 GMT-0500 (Eastern Standard Time)
      - Fri Jan 10 2020 20:04:22 GMT-0500 (Eastern Standard Time)
      - Sat Jan 11 2020 13:51:46 GMT-0500 (Eastern Standard Time)
      - Sun Jan 12 2020 14:15:08 GMT-0500 (Eastern Standard Time)
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: asset_group_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each asset_group belongs to one organization
use_cases:
  - Use for segmentation analysis by description
  - Use for time-series analysis using created_at
  - Join with organizations for cross-entity analysis
  - Avoid for row-level asset_group_memberships queries — use those entities directly
query_patterns:
  - description: AssetGroups by description
    sql: |-
      SELECT description, COUNT(*) as count
      FROM asset_groups
      GROUP BY description
      ORDER BY count DESC
