metrics:
  - id: daily_scan_stats_count
    label: Total DailyScanStats
    description: Count of distinct daily_scan_stats records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM daily_scan_stats
    aggregation: count_distinct
  - id: total_total_scans
    label: Total total scans
    description: Sum of total_scans across all daily_scan_stats.
    type: atomic
    source:
      entity: DailyScanStats
      measure: total_total_scans
    sql: |-
      SELECT SUM(total_scans) as total_total_scans
      FROM daily_scan_stats
    aggregation: sum
    objective: maximize
  - id: avg_total_scans
    label: Average total scans
    description: Average total_scans per daily_scan_stat.
    type: atomic
    sql: |-
      SELECT AVG(total_scans) as avg_total_scans
      FROM daily_scan_stats
    aggregation: avg
