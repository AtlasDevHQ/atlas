  - name: severity
    sql: severity
    type: string
    unique_count: 4
    sample_values:
      - critical
      - high
      - low
      - medium
  - name: cvss_score
    sql: cvss_score
    type: number
    unique_count: 390
    null_count: 110
    sample_values:
      - '0.20396964'
      - '0.34709096'
      - '0.42566836'
      - '0.49984157'
      - '0.59202445'
      - '0.60337704'
      - '0.61524683'
      - '0.67787933'
  - name: category
    sql: category
    type: string
    unique_count: 10
    sample_values:
      - access_control
      - config
      - crypto
      - disclosure
      - dos
      - injection
      - overflow
      - privilege_escalation
      - rce
      - xss
  - name: published_at
    sql: published_at
    type: date
    unique_count: 462
    sample_values:
      - Mon Dec 31 2018 19:00:00 GMT-0500 (Eastern Standard Time)
      - Wed Jan 09 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Fri Jan 11 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Tue Jan 15 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Tue Jan 22 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Tue Feb 12 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Thu Feb 21 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Sat Feb 23 2019 19:00:00 GMT-0500 (Eastern Standard Time)
  - name: created_at
    sql: created_at
    type: date
    unique_count: 444
    sample_values:
      - Mon Jan 07 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Mon Jan 14 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Sat Jan 26 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Thu Jan 31 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Fri Feb 08 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Tue Feb 19 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Tue Feb 26 2019 19:00:00 GMT-0500 (Eastern Standard Time)
      - Sat Mar 16 2019 20:00:00 GMT-0400 (Eastern Daylight Time)
  - name: cvss_score_bucket
    sql: |-
      CASE
        WHEN cvss_score < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY cvss_score) FROM vulnerabilities) THEN 'Low'
        WHEN cvss_score < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY cvss_score) FROM vulnerabilities) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: cvss score bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: published_at_year
    sql: EXTRACT(YEAR FROM published_at)
    type: number
    description: Year extracted from published_at
    virtual: true
  - name: published_at_month
    sql: TO_CHAR(published_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from published_at
    virtual: true
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: vulnerability_count
    sql: id
    type: count_distinct
  - name: total_cvss_score
    sql: cvss_score
    type: sum
    description: Sum of cvss score
  - name: avg_cvss_score
    sql: cvss_score
    type: avg
    description: Average cvss score
use_cases:
  - Use for segmentation analysis by severity, category
  - Use for aggregation and trends on cvss_score
  - Use for time-series analysis using published_at, created_at
  - >-
    Avoid for row-level scan_results/scan_results_denormalized/vulnerability_exceptions/vulnerability_instances queries
    — use those entities directly
query_patterns:
  - description: Vulnerabilities by severity
    sql: |-
      SELECT severity, COUNT(*) as count
      FROM vulnerabilities
      GROUP BY severity
      ORDER BY count DESC
  - description: Vulnerabilities by category
    sql: |-
      SELECT category, COUNT(*) as count
      FROM vulnerabilities
      GROUP BY category
      ORDER BY count DESC
  - description: Total cvss_score by severity
    sql: |-
      SELECT severity, SUM(cvss_score) as total_cvss_score, COUNT(*) as count
      FROM vulnerabilities
      GROUP BY severity
      ORDER BY total_cvss_score DESC
