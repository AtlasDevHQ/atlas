metrics:
  - id: dashboard_widgets_count
    label: Total DashboardWidgets
    description: Count of distinct dashboard_widgets records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM dashboard_widgets
    aggregation: count_distinct
  - id: total_position_x
    label: Total position x
    description: Sum of position_x across all dashboard_widgets.
    type: atomic
    source:
      entity: DashboardWidgets
      measure: total_position_x
    sql: |-
      SELECT SUM(position_x) as total_position_x
      FROM dashboard_widgets
    aggregation: sum
    objective: maximize
  - id: avg_position_x
    label: Average position x
    description: Average position_x per dashboard_widget.
    type: atomic
    sql: |-
      SELECT AVG(position_x) as avg_position_x
      FROM dashboard_widgets
    aggregation: avg
  - id: position_x_by_widget_type
    label: position x by widget_type
    description: position_x broken down by widget_type.
    type: atomic
    sql: |-
      SELECT widget_type, SUM(position_x) as total_position_x, AVG(position_x) as avg_position_x, COUNT(*) as count
      FROM dashboard_widgets
      GROUP BY widget_type
      ORDER BY total_position_x DESC
