name: Plans
type: fact_table
table: plans
grain: one row per plan record
description: Auto-profiled schema for plans (5 rows). Contains 8 columns.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 5
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
  - name: name
    sql: name
    type: string
    unique_count: 5
    sample_values:
      - custom
      - enterprise
      - free
      - professional
      - starter
  - name: display_name
    sql: display_name
    type: string
    unique_count: 5
    sample_values:
      - Custom
      - Enterprise
      - Free
      - Professional
      - Starter
  - name: price_cents
    sql: price_cents
    type: number
    unique_count: 4
    sample_values:
      - '0'
      - '4900'
      - '14900'
      - '49900'
  - name: max_assets
    sql: max_assets
    type: number
    unique_count: 3
    null_count: 2
    sample_values:
      - '25'
      - '100'
      - '500'
  - name: max_users
    sql: max_users
    type: number
    unique_count: 3
    null_count: 2
    sample_values:
      - '3'
      - '10'
      - '50'
  - name: features
    sql: features
    type: string
    unique_count: 5
    sample_values:
      - '{"custom":true}'
      - '{"scans":"continuous","retention":365}'
      - '{"scans":"continuous","retention":730,"sso":true,"api":true}'
      - '{"scans":"daily","retention":90}'
      - '{"scans":"weekly","retention":30}'
  - name: is_active
    sql: is_active
    type: boolean
    unique_count: 1
    sample_values:
      - 'true'
  - name: price_cents_bucket
    sql: |-
      CASE
        WHEN price_cents < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY price_cents) FROM plans) THEN 'Low'
        WHEN price_cents < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY price_cents) FROM plans) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: price cents bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: max_assets_bucket
    sql: |-
      CASE
        WHEN max_assets < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY max_assets) FROM plans) THEN 'Low'
        WHEN max_assets < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY max_assets) FROM plans) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: max assets bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: max_users_bucket
    sql: |-
      CASE
        WHEN max_users < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY max_users) FROM plans) THEN 'Low'
        WHEN max_users < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY max_users) FROM plans) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: max users bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
measures:
  - name: plan_count
    sql: id
    type: count_distinct
  - name: total_price_cents
    sql: price_cents
    type: sum
    description: Sum of price cents
  - name: avg_price_cents
    sql: price_cents
    type: avg
    description: Average price cents
  - name: total_max_assets
    sql: max_assets
    type: sum
    description: Sum of max assets
  - name: avg_max_assets
    sql: max_assets
    type: avg
    description: Average max assets
  - name: total_max_users
    sql: max_users
    type: sum
    description: Sum of max users
  - name: avg_max_users
    sql: max_users
    type: avg
    description: Average max users
use_cases:
  - Use for aggregation and trends on price_cents, max_assets, max_users
  - Avoid for row-level subscription_events/subscriptions queries — use those entities directly
