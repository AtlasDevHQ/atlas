name: LoyaltyAccounts
type: fact_table
table: loyalty_accounts
grain: one row per loyalty account record
description: Auto-profiled schema for loyalty_accounts (5,500 rows). Contains 6 columns, linked to customers.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 5500
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: customer_id
    sql: customer_id
    type: number
    description: Foreign key to customers
    unique_count: 4007
    sample_values:
      - '2'
      - '6'
      - '8'
      - '11'
      - '13'
      - '17'
      - '22'
      - '25'
  - name: points
    sql: points
    type: number
    unique_count: 3330
    sample_values:
      - '1'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
      - '9'
  - name: tier
    sql: tier
    type: string
    unique_count: 8
    sample_values:
      - Bronze
      - GOLD
      - Gold
      - Platinum
      - SILVER
      - Silver
      - gold
      - silver
    profiler_notes:
      - 'Case-inconsistent enum values: [GOLD, Gold, gold; SILVER, Silver, silver]. Consider using LOWER() for grouping'
  - name: enrolled_at
    sql: enrolled_at
    type: date
    unique_count: 5500
    sample_values:
      - Sun May 31 2020 21:37:29 GMT-0400 (Eastern Daylight Time)
      - Mon Jun 01 2020 01:11:25 GMT-0400 (Eastern Daylight Time)
      - Mon Jun 01 2020 05:07:21 GMT-0400 (Eastern Daylight Time)
      - Mon Jun 01 2020 05:14:00 GMT-0400 (Eastern Daylight Time)
      - Mon Jun 01 2020 18:55:24 GMT-0400 (Eastern Daylight Time)
      - Tue Jun 02 2020 00:59:23 GMT-0400 (Eastern Daylight Time)
      - Tue Jun 02 2020 02:38:11 GMT-0400 (Eastern Daylight Time)
      - Tue Jun 02 2020 09:48:32 GMT-0400 (Eastern Daylight Time)
  - name: updated_at
    sql: updated_at
    type: date
    unique_count: 5500
    sample_values:
      - Mon Jun 08 2020 23:24:25 GMT-0400 (Eastern Daylight Time)
      - Sat Jun 27 2020 00:09:47 GMT-0400 (Eastern Daylight Time)
      - Sat Jun 27 2020 06:12:44 GMT-0400 (Eastern Daylight Time)
      - Wed Jul 01 2020 10:20:45 GMT-0400 (Eastern Daylight Time)
      - Wed Jul 01 2020 19:02:18 GMT-0400 (Eastern Daylight Time)
      - Sun Jul 05 2020 20:29:54 GMT-0400 (Eastern Daylight Time)
      - Mon Jul 06 2020 02:10:22 GMT-0400 (Eastern Daylight Time)
      - Tue Jul 07 2020 10:42:32 GMT-0400 (Eastern Daylight Time)
  - name: points_bucket
    sql: |-
      CASE
        WHEN points < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY points) FROM loyalty_accounts) THEN 'Low'
        WHEN points < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY points) FROM loyalty_accounts) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: points bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: enrolled_at_year
    sql: EXTRACT(YEAR FROM enrolled_at)
    type: number
    description: Year extracted from enrolled_at
    virtual: true
  - name: enrolled_at_month
    sql: TO_CHAR(enrolled_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from enrolled_at
    virtual: true
  - name: updated_at_year
    sql: EXTRACT(YEAR FROM updated_at)
    type: number
    description: Year extracted from updated_at
    virtual: true
  - name: updated_at_month
    sql: TO_CHAR(updated_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from updated_at
    virtual: true
measures:
  - name: loyalty_account_count
    sql: id
    type: count_distinct
  - name: total_points
    sql: points
    type: sum
    description: Sum of points
  - name: avg_points
    sql: points
    type: avg
    description: Average points
joins:
  - target_entity: Customers
    relationship: many_to_one
    join_columns:
      from: customer_id
      to: id
    description: Each loyalty_account belongs to one customer
use_cases:
  - Use for segmentation analysis by tier
  - Use for aggregation and trends on points
  - Use for time-series analysis using enrolled_at, updated_at
  - Join with customers for cross-entity analysis
  - Avoid for row-level loyalty_transactions queries — use those entities directly
query_patterns:
  - description: LoyaltyAccounts by tier
    sql: |-
      SELECT tier, COUNT(*) as count
      FROM loyalty_accounts
      GROUP BY tier
      ORDER BY count DESC
  - description: Total points by tier
    sql: |-
      SELECT tier, SUM(points) as total_points, COUNT(*) as count
      FROM loyalty_accounts
      GROUP BY tier
      ORDER BY total_points DESC
