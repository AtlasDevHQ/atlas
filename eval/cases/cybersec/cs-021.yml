id: "cs-021"
question: "Which organizations have the highest ratio of critical assets with unpatched vulnerabilities?"
schema: cybersec
difficulty: complex
category: cte
tags: [assets, vulnerability_instances, organizations, risk-score]
gold_sql: |
  WITH critical_assets AS (
    SELECT
      a.org_id,
      COUNT(DISTINCT a.id) AS total_critical_assets,
      COUNT(DISTINCT CASE WHEN vi.status = 'open' THEN a.id END) AS unpatched_critical_assets
    FROM assets a
    LEFT JOIN vulnerability_instances vi ON vi.asset_id = a.id
    WHERE a.criticality = 'critical' AND a.is_active = true
    GROUP BY a.org_id
  )
  SELECT
    o.name AS organization,
    ca.total_critical_assets,
    ca.unpatched_critical_assets,
    ROUND(ca.unpatched_critical_assets::numeric / NULLIF(ca.total_critical_assets, 0) * 100, 1) AS unpatched_pct
  FROM critical_assets ca
  JOIN organizations o ON ca.org_id = o.id
  WHERE ca.total_critical_assets > 0
  ORDER BY unpatched_pct DESC
expected_rows: null
notes: "Tests CTE with LEFT JOIN, CASE inside COUNT DISTINCT, and NULLIF for safe division"
