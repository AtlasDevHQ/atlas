  company:
    status: defined
    definition: Refers to the companies entity. Linked via accounts.company_id → companies.id.
  admin_user:
    status: defined
    definition: Refers to the admin_users entity. Linked via admin_audit_log.admin_user_id → admin_users.id.
  parent:
    status: defined
    definition: Refers to the categories entity. Linked via categories.parent_id → categories.id.
  customer:
    status: defined
    definition: Refers to the customers entity. Linked via customer_segment_assignments.customer_id → customers.id.
  segment:
    status: defined
    definition: Refers to the customer_segments entity. Linked via customer_segment_assignments.segment_id → customer_segments.id.
  campaign:
    status: defined
    definition: Refers to the email_campaigns entity. Linked via email_sends.campaign_id → email_campaigns.id.
  gift_card:
    status: defined
    definition: Refers to the gift_cards entity. Linked via gift_card_transactions.gift_card_id → gift_cards.id.
  issued_to:
    status: defined
    definition: Refers to the customers entity. Linked via gift_cards.issued_to → customers.id.
  warehouse:
    status: defined
    definition: Refers to the warehouses entity. Linked via inventory_levels.warehouse_id → warehouses.id.
  loyalty_account:
    status: defined
    definition: Refers to the loyalty_accounts entity. Linked via loyalty_transactions.loyalty_account_id → loyalty_accounts.id.
  order:
    status: defined
    definition: Refers to the orders entity. Linked via order_items.order_id → orders.id.
  product:
    status: defined
    definition: Refers to the products entity. Linked via product_images.product_id → products.id.
  category:
    status: defined
    definition: Refers to the categories entity. Linked via products.category_id → categories.id.
  payment:
    status: defined
    definition: Refers to the payments entity. Linked via refunds.payment_id → payments.id.
  return:
    status: defined
    definition: Refers to the returns entity. Linked via return_items.return_id → returns.id.
  review:
    status: defined
    definition: Refers to the product_reviews entity. Linked via review_responses.review_id → product_reviews.id.
  seller:
    status: defined
    definition: Refers to the sellers entity. Linked via seller_payouts.seller_id → sellers.id.
  plan:
    status: defined
    definition: 'Categorical field on accounts. Possible values: Enterprise, Free, Pro, Starter.'
  action:
    status: defined
    definition: >-
      Categorical field on admin_audit_log. Possible values: cancel_order, create_promotion, export_data, issue_refund,
      login, logout, manage_return, manage_seller, update_customer, update_order, update_product, update_settings,
      view_analytics, view_order, view_report.
  resource_type:
    status: defined
    definition: >-
      Categorical field on admin_audit_log. Possible values: customer, order, product, promotion, report, return,
      seller, settings.
  label:
    status: defined
    definition: 'Categorical field on customer_addresses. Possible values: home, other, work.'
  segment_name:
    status: defined
    definition: >-
      Categorical field on customer_segment_assignments. Possible values: At-Risk, Bargain, Churned, Dormant,
      High-Value, Loyal, Marketplace, New, Regular, VIP, VIP Customer, at-risk, bargain_hunter, high_value, new_user,
      regular_customer, vip.
  acquisition_source:
    status: defined
    definition: >-
      Categorical field on customers. Possible values: Direct, Email, Facebook, GOOGLE, Google, Instagram, ORGANIC,
      Organic, Referral, TikTok, direct, email, facebook, google, instagram, organic, referral, tiktok.
  event_name:
    status: defined
    definition: >-
      Categorical field on legacy_analytics_events. Possible values: add_to_cart, click, form_submit, login, page_view,
      purchase, remove_from_cart, scroll, search, signup.
  tier:
    status: defined
    definition: >-
      Categorical field on loyalty_accounts. Possible values: Bronze, GOLD, Gold, Platinum, SILVER, Silver, gold,
      silver.
  shipping_state:
    status: defined
    definition: >-
      Categorical field on orders_denormalized. Possible values: AZ, CA, CO, FL, IL, IN, NC, NV, NY, OH, OR, PA, TN, TX,
      WA.
