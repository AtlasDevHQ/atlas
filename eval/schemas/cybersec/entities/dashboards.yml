name: Dashboards
type: fact_table
table: dashboards
grain: one row per dashboard record
description: Auto-profiled schema for dashboards (300 rows). Contains 9 columns, linked to users, organizations.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 300
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 145
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '7'
      - '9'
      - '10'
      - '11'
  - name: created_by
    sql: created_by
    type: number
    description: Foreign key to users
    unique_count: 275
    sample_values:
      - '5'
      - '10'
      - '12'
      - '15'
      - '19'
      - '20'
      - '41'
      - '44'
  - name: name
    sql: name
    type: string
    unique_count: 300
    sample_values:
      - Asset Health - 10
      - Asset Health - 110
      - Asset Health - 115
      - Asset Health - 130
      - Asset Health - 167
      - Asset Health - 176
      - Asset Health - 18
      - Asset Health - 181
  - name: description
    sql: description
    type: string
    unique_count: 1
    sample_values:
      - Dashboard for monitoring security posture
  - name: is_default
    sql: is_default
    type: boolean
    unique_count: 2
    sample_values:
      - 'false'
      - 'true'
  - name: layout
    sql: layout
    type: string
    unique_count: 1
    sample_values:
      - '{"columns":12,"rows":"auto"}'
  - name: created_at
    sql: created_at
    type: date
    unique_count: 300
    sample_values:
      - Tue Jun 01 2021 18:13:01 GMT-0400 (Eastern Daylight Time)
      - Mon Jun 14 2021 17:33:37 GMT-0400 (Eastern Daylight Time)
      - Tue Jun 15 2021 17:56:19 GMT-0400 (Eastern Daylight Time)
      - Mon Jun 28 2021 11:15:11 GMT-0400 (Eastern Daylight Time)
      - Wed Jun 30 2021 15:15:06 GMT-0400 (Eastern Daylight Time)
      - Wed Jul 21 2021 17:10:58 GMT-0400 (Eastern Daylight Time)
      - Sat Jul 24 2021 14:33:56 GMT-0400 (Eastern Daylight Time)
      - Wed Aug 04 2021 10:46:15 GMT-0400 (Eastern Daylight Time)
  - name: updated_at
    sql: updated_at
    type: date
    unique_count: 1
    sample_values:
      - Tue Mar 03 2026 13:38:31 GMT-0500 (Eastern Standard Time)
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
  - name: updated_at_year
    sql: EXTRACT(YEAR FROM updated_at)
    type: number
    description: Year extracted from updated_at
    virtual: true
  - name: updated_at_month
    sql: TO_CHAR(updated_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from updated_at
    virtual: true
measures:
  - name: dashboard_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Users
    relationship: many_to_one
    join_columns:
      from: created_by
      to: id
    description: Each dashboard belongs to one user
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each dashboard belongs to one organization
use_cases:
  - Use for segmentation analysis by description, layout
  - Use for time-series analysis using created_at, updated_at
  - Join with users, organizations for cross-entity analysis
  - Avoid for row-level dashboard_widgets queries — use those entities directly
query_patterns:
  - description: Dashboards by description
    sql: |-
      SELECT description, COUNT(*) as count
      FROM dashboards
      GROUP BY description
      ORDER BY count DESC
  - description: Dashboards by layout
    sql: |-
      SELECT layout, COUNT(*) as count
      FROM dashboards
      GROUP BY layout
      ORDER BY count DESC
