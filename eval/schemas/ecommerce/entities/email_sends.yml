measures:
  - name: email_send_count
    sql: id
    type: count_distinct
joins:
  - target_entity: EmailCampaigns
    relationship: many_to_one
    join_columns:
      from: campaign_id
      to: id
    description: Each email_send belongs to one email_campaign
  - target_entity: Customers
    relationship: many_to_one
    join_columns:
      from: customer_id
      to: id
    description: Each email_send belongs to one customer
use_cases:
  - Use for segmentation analysis by status
  - Use for time-series analysis using opened_at, clicked_at, created_at
  - Join with email_campaigns, customers for cross-entity analysis
query_patterns:
  - description: EmailSends by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM email_sends
      GROUP BY status
      ORDER BY count DESC
