    sample_values:
      - Fri Mar 05 2021 01:00:29 GMT-0500 (Eastern Standard Time)
      - Tue Mar 09 2021 02:49:11 GMT-0500 (Eastern Standard Time)
      - Mon Apr 12 2021 12:17:18 GMT-0400 (Eastern Daylight Time)
      - Thu Apr 15 2021 16:15:10 GMT-0400 (Eastern Daylight Time)
