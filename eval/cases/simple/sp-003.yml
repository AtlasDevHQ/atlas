id: "sp-003"
question: "List all Enterprise accounts that are currently active"
schema: simple
difficulty: simple
category: filter
tags: [accounts, filter, plan]
gold_sql: |
  SELECT a.id, c.name AS company_name, a.plan, a.status, a.monthly_value
  FROM accounts a
  JOIN companies c ON a.company_id = c.id
  WHERE a.plan = 'Enterprise' AND a.status = 'Active'
  ORDER BY a.monthly_value DESC
expected_rows: null
notes: "Tests multi-condition filtering with a simple join"
