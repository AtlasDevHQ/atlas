measures:
  - name: customer_count
    sql: id
    type: count_distinct
use_cases:
  - Use for segmentation analysis by acquisition_source
  - Use for time-series analysis using created_at, updated_at
  - >-
    Avoid for row-level
    cart_events/customer_addresses/customer_ltv_cache/customer_segment_assignments/email_sends/gift_cards/loyalty_accounts/orders/orders_denormalized/page_views/product_reviews/promotion_usages/returns/review_helpfulness/search_queries/utm_tracking
    queries — use those entities directly
query_patterns:
  - description: Customers by acquisition_source
    sql: |-
      SELECT acquisition_source, COUNT(*) as count
      FROM customers
      GROUP BY acquisition_source
      ORDER BY count DESC
