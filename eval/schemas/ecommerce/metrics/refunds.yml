metrics:
  - id: refunds_count
    label: Total Refunds
    description: Count of distinct refunds records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM refunds
    aggregation: count_distinct
  - id: total_amount_cents
    label: Total amount cents
    description: Sum of amount_cents across all refunds.
    type: atomic
    source:
      entity: Refunds
      measure: total_amount_cents
    sql: |-
      SELECT SUM(amount_cents) as total_amount_cents
      FROM refunds
    aggregation: sum
    objective: maximize
  - id: avg_amount_cents
    label: Average amount cents
    description: Average amount_cents per refund.
    type: atomic
    sql: |-
      SELECT AVG(amount_cents) as avg_amount_cents
      FROM refunds
    aggregation: avg
  - id: amount_cents_by_reason
    label: amount cents by reason
    description: amount_cents broken down by reason.
    type: atomic
    sql: |-
      SELECT reason, SUM(amount_cents) as total_amount_cents, AVG(amount_cents) as avg_amount_cents, COUNT(*) as count
      FROM refunds
      GROUP BY reason
      ORDER BY total_amount_cents DESC
