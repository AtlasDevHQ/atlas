name: ComplianceFindings
type: fact_table
table: compliance_findings
grain: one row per compliance finding record
description: >-
  Auto-profiled schema for compliance_findings (5,000 rows). Contains 7 columns, linked to compliance_assessments,
  compliance_controls.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 5000
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: assessment_id
    sql: assessment_id
    type: number
    description: Foreign key to compliance_assessments
    unique_count: 600
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: control_id
    sql: control_id
    type: number
    description: Foreign key to compliance_controls
    unique_count: 200
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: status
    sql: status
    type: string
    unique_count: 8
    sample_values:
      - Fail
      - N/A
      - PASS
      - Pass
      - fail
      - not_applicable
      - partial
      - pass
    profiler_notes:
      - 'Case-inconsistent enum values: [Fail, fail; PASS, Pass, pass]. Consider using LOWER() for grouping'
  - name: evidence
    sql: evidence
    type: string
    unique_count: 1
    null_count: 2997
    sample_values:
      - Evidence collected from audit log and configuration review
  - name: notes
    sql: notes
    type: string
    unique_count: 1
    null_count: 4024
    sample_values:
      - Remediation required within 30 days
  - name: created_at
    sql: created_at
    type: date
    unique_count: 5000
    sample_values:
      - Mon Feb 08 2021 14:56:30 GMT-0500 (Eastern Standard Time)
      - Thu Feb 25 2021 11:03:47 GMT-0500 (Eastern Standard Time)
      - Sun Feb 28 2021 19:37:14 GMT-0500 (Eastern Standard Time)
      - Mon Mar 01 2021 22:38:39 GMT-0500 (Eastern Standard Time)
      - Fri Mar 05 2021 15:55:26 GMT-0500 (Eastern Standard Time)
      - Sat Mar 06 2021 23:17:19 GMT-0500 (Eastern Standard Time)
      - Wed Mar 10 2021 06:50:52 GMT-0500 (Eastern Standard Time)
      - Sun Mar 14 2021 16:20:32 GMT-0400 (Eastern Daylight Time)
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: compliance_finding_count
    sql: id
    type: count_distinct
joins:
  - target_entity: ComplianceAssessments
    relationship: many_to_one
    join_columns:
      from: assessment_id
      to: id
    description: Each compliance_finding belongs to one compliance_assessment
  - target_entity: ComplianceControls
    relationship: many_to_one
    join_columns:
      from: control_id
      to: id
    description: Each compliance_finding belongs to one compliance_control
use_cases:
  - Use for segmentation analysis by status, evidence, notes
  - Use for time-series analysis using created_at
  - Join with compliance_assessments, compliance_controls for cross-entity analysis
query_patterns:
  - description: ComplianceFindings by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM compliance_findings
      GROUP BY status
      ORDER BY count DESC
  - description: ComplianceFindings by evidence
    sql: |-
      SELECT evidence, COUNT(*) as count
      FROM compliance_findings
      GROUP BY evidence
      ORDER BY count DESC
