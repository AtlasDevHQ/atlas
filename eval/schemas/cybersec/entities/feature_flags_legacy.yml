query_patterns:
  - description: FeatureFlagsLegacy by description
    sql: |-
      SELECT description, COUNT(*) as count
      FROM feature_flags_legacy
      GROUP BY description
      ORDER BY count DESC
  - description: Total rollout_percentage by description
    sql: |-
      SELECT description, SUM(rollout_percentage) as total_rollout_percentage, COUNT(*) as count
      FROM feature_flags_legacy
      GROUP BY description
      ORDER BY total_rollout_percentage DESC
