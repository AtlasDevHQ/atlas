  - name: reported_at_year
    sql: EXTRACT(YEAR FROM reported_at)
    type: number
    description: Year extracted from reported_at
    virtual: true
  - name: reported_at_month
    sql: TO_CHAR(reported_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from reported_at
    virtual: true
