name: IncidentComments
type: fact_table
table: incident_comments
grain: one row per incident comment record
description: Auto-profiled schema for incident_comments (3,500 rows). Contains 5 columns, linked to incidents, users.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 3500
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: incident_id
    sql: incident_id
    type: number
    description: Foreign key to incidents
    unique_count: 1354
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '8'
      - '9'
  - name: user_id
    sql: user_id
    type: number
    description: Foreign key to users
    unique_count: 1671
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '9'
      - '10'
      - '11'
  - name: content
    sql: content
    type: string
    unique_count: 10
    sample_values:
      - All affected credentials rotated.
      - Confirmed malicious activity. Escalating to tier 2.
      - Containment actions in progress. Affected systems isolated.
      - Customer notified per SLA requirements.
      - False positive — benign automation script.
      - Forensic image captured for evidence preservation.
      - IOCs extracted and shared with threat intel team.
      - Monitoring for recurrence. Will close after 48h clear window.
      - Playbook step 3 complete. Moving to eradication.
      - 'Root cause identified: unpatched vulnerability CVE-2024-XXXX.'
  - name: created_at
    sql: created_at
    type: date
    unique_count: 3500
    sample_values:
      - Sun Aug 09 2020 01:15:42 GMT-0400 (Eastern Daylight Time)
      - Wed Sep 09 2020 10:18:21 GMT-0400 (Eastern Daylight Time)
      - Fri Sep 11 2020 14:43:01 GMT-0400 (Eastern Daylight Time)
      - Wed Sep 16 2020 07:18:11 GMT-0400 (Eastern Daylight Time)
      - Tue Sep 29 2020 21:33:02 GMT-0400 (Eastern Daylight Time)
      - Thu Oct 29 2020 11:23:32 GMT-0400 (Eastern Daylight Time)
      - Tue Nov 03 2020 22:43:28 GMT-0500 (Eastern Standard Time)
      - Wed Nov 04 2020 07:38:44 GMT-0500 (Eastern Standard Time)
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: incident_comment_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Incidents
    relationship: many_to_one
    join_columns:
      from: incident_id
      to: id
    description: Each incident_comment belongs to one incident
  - target_entity: Users
    relationship: many_to_one
    join_columns:
      from: user_id
      to: id
    description: Each incident_comment belongs to one user
use_cases:
  - Use for segmentation analysis by content
  - Use for time-series analysis using created_at
  - Join with incidents, users for cross-entity analysis
query_patterns:
  - description: IncidentComments by content
    sql: |-
      SELECT content, COUNT(*) as count
      FROM incident_comments
      GROUP BY content
      ORDER BY count DESC
