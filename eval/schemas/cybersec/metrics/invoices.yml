metrics:
  - id: invoices_count
    label: Total Invoices
    description: Count of distinct invoices records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM invoices
    aggregation: count_distinct
  - id: total_amount_cents
    label: Total amount cents
    description: Sum of amount_cents across all invoices.
    type: atomic
    source:
      entity: Invoices
      measure: total_amount_cents
    sql: |-
      SELECT SUM(amount_cents) as total_amount_cents
      FROM invoices
    aggregation: sum
    objective: maximize
  - id: avg_amount_cents
    label: Average amount cents
    description: Average amount_cents per invoice.
    type: atomic
    sql: |-
      SELECT AVG(amount_cents) as avg_amount_cents
      FROM invoices
    aggregation: avg
  - id: amount_cents_by_status
    label: amount cents by status
    description: amount_cents broken down by status.
    type: atomic
    sql: |-
      SELECT status, SUM(amount_cents) as total_amount_cents, AVG(amount_cents) as avg_amount_cents, COUNT(*) as count
      FROM invoices
      GROUP BY status
      ORDER BY total_amount_cents DESC
