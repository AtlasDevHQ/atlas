    virtual: true
measures:
  - name: asset_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each asset belongs to one organization
use_cases:
  - Use for segmentation analysis by asset_type, os, os_version, environment
  - Use for time-series analysis using first_seen, last_seen, created_at
  - Join with organizations for cross-entity analysis
  - >-
    Avoid for row-level
    agents/asset_group_memberships/asset_tags/scan_results/scan_results_denormalized/vulnerability_instances queries —
    use those entities directly
query_patterns:
  - description: Assets by asset_type
    sql: |-
      SELECT asset_type, COUNT(*) as count
      FROM assets
      GROUP BY asset_type
      ORDER BY count DESC
  - description: Assets by os
    sql: |-
      SELECT os, COUNT(*) as count
      FROM assets
      GROUP BY os
      ORDER BY count DESC
