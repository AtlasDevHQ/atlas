name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.11"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check dependency versions (syncpack)
        run: bun x syncpack lint

      - name: Check Dockerfile bun version pins
        run: |
          EXPECTED="${{ env.BUN_VERSION }}"
          ERRORS=0
          for f in $(find . -name Dockerfile -not -path './.git/*' -not -path './node_modules/*'); do
            if ! grep -q 'oven/bun:' "$f"; then continue; fi
            ACTUAL=$(grep -o 'oven/bun:[0-9.]*' "$f" | head -1 | cut -d: -f2)
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error file=$f::Dockerfile pins bun $ACTUAL, expected $EXPECTED"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo "All Dockerfiles pin bun $EXPECTED"

      - name: Check Dockerfile workspace completeness
        run: bash scripts/check-dockerfile-workspace.sh

      - name: Check Railway watchPatterns coverage
        run: bash scripts/check-railway-watch.sh

      - name: Check template drift
        run: bash scripts/check-template-drift.sh

      - name: Check Drizzle schema ↔ migration drift
        run: bash scripts/check-schema-drift.sh

      - name: Build SDK packages
        run: bun run --filter '@useatlas/types' build && bun run --filter '@useatlas/plugin-sdk' build && bun run --filter '@useatlas/sdk' build

      - name: Build widget bundle
        run: bun run --filter '@useatlas/react' build

      - name: Build
        run: bun run build

      - name: Check OpenAPI ↔ api-reference drift
        # Runs after SDK + widget + app builds so extract-openapi.ts can resolve
        # @useatlas/types and other built dependencies at import time.
        run: bash scripts/check-openapi-drift.sh

      - name: Type check
        run: bun run type

      - name: Type check (frontend packages)
        run: bun run --filter '@atlas/web' type

      - name: Lint
        run: bun run lint

      # @atlas/api tests run in the parallel api-tests job (sharded 4-way).
      # Other workspace test suites are small, stay serial here.
      - name: Test (non-api packages)
        run: bun run test:others

  api-tests:
    name: api-tests (${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # @useatlas/types resolves to packages/types/dist via its "exports" field,
      # so api tests can't import it until the package has been built.
      - name: Build @useatlas/types
        run: bun run --filter '@useatlas/types' build

      - name: Test @atlas/api (shard ${{ matrix.shard }}/4)
        working-directory: packages/api
        run: bun run scripts/test-isolated.ts --shard ${{ matrix.shard }}/4
