      SELECT SUM(max_uses) as total_max_uses
      FROM promotions
    aggregation: sum
    objective: maximize
  - id: avg_max_uses
    label: Average max uses
    description: Average max_uses per promotion.
    type: atomic
    sql: |-
      SELECT AVG(max_uses) as avg_max_uses
      FROM promotions
    aggregation: avg
  - id: max_uses_by_type
    label: max uses by type
    description: max_uses broken down by type.
    type: atomic
    sql: |-
      SELECT type, SUM(max_uses) as total_max_uses, AVG(max_uses) as avg_max_uses, COUNT(*) as count
      FROM promotions
      GROUP BY type
      ORDER BY total_max_uses DESC
  - id: total_times_used
    label: Total times used
    description: Sum of times_used across all promotions.
    type: atomic
    source:
      entity: Promotions
      measure: total_times_used
    sql: |-
