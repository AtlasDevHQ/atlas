name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.10"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check dependency versions (syncpack)
        run: bun x syncpack lint

      - name: Check Dockerfile bun version pins
        run: |
          EXPECTED="${{ env.BUN_VERSION }}"
          ERRORS=0
          for f in $(find . -name Dockerfile -not -path './.git/*' -not -path './node_modules/*'); do
            if ! grep -q 'oven/bun:' "$f"; then continue; fi
            ACTUAL=$(grep -o 'oven/bun:[0-9.]*' "$f" | head -1 | cut -d: -f2)
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error file=$f::Dockerfile pins bun $ACTUAL, expected $EXPECTED"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo "All Dockerfiles pin bun $EXPECTED"

      - name: Type check
        run: bun run type

      - name: Type check (frontend packages)
        run: bun run --filter '@atlas/web' type

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  smoke:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.ANTHROPIC_API_KEY != ''
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_demo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ATLAS_DATASOURCE_URL: postgresql://atlas:atlas@localhost:5432/atlas_demo
      ATLAS_API_KEY: smoke-ci-key
      ATLAS_PROVIDER: anthropic
      PORT: "3099"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Seed demo data
        run: bun run atlas -- init --demo

      - name: Start API server
        run: |
          ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
          bun packages/api/src/api/server.ts &
          echo "API_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3099/api/health > /dev/null 2>&1; then
              echo "API ready"
              break
            fi
            sleep 1
          done

      - name: Run smoke tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          bun run atlas -- smoke \
            --target http://localhost:3099 \
            --api-key smoke-ci-key \
            --verbose

      - name: Stop API server
        if: always()
        run: kill $API_PID 2>/dev/null || true

  e2e-core:
    runs-on: ubuntu-latest
    needs: ci
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: atlas_e2e
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Seed Postgres
        run: PGPASSWORD=atlas psql -h localhost -p 5433 -U atlas -d atlas_e2e -f e2e/seeds/pg-seed.sql

      - name: Run core E2E tests
        run: bash e2e/scripts/run.sh --tier core --no-docker

  e2e-scaffold:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run scaffold E2E tests
        run: bun run test:e2e:scaffold

  e2e-query:
    runs-on: ubuntu-latest
    needs: ci
    # Main push only — query tests consume LLM API credits.
    # Skipped on PRs and when ANTHROPIC_API_KEY is not configured.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.ANTHROPIC_API_KEY != ''
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: atlas_e2e
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    env:
      ATLAS_DATASOURCE_URL: postgresql://atlas:atlas@localhost:5433/atlas_e2e
      ATLAS_PROVIDER: anthropic
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Seed Postgres
        run: PGPASSWORD=atlas psql -h localhost -p 5433 -U atlas -d atlas_e2e -f e2e/seeds/pg-seed.sql

      - name: Run query E2E tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash e2e/scripts/run.sh --tier query --no-docker

  eval:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.ANTHROPIC_API_KEY != ''
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_demo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ATLAS_DATASOURCE_URL: postgresql://atlas:atlas@localhost:5432/atlas_demo
      ATLAS_PROVIDER: anthropic
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          BASELINE="eval/baselines/anthropic-claude-opus-4-6.jsonl"
          if [ -f "$BASELINE" ]; then
            bun run atlas -- eval --compare "$BASELINE"
          else
            echo "No baseline found — running eval without regression check"
            bun run atlas -- eval
          fi

      - name: Upload eval results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results-*.jsonl
