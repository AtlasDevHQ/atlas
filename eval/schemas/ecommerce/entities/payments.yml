  - name: updated_at
    sql: updated_at
    type: date
    unique_count: 1
    sample_values:
      - Tue Mar 03 2026 13:37:39 GMT-0500 (Eastern Standard Time)
  - name: amount_cents_bucket
    sql: |-
      CASE
        WHEN amount_cents < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY amount_cents) FROM payments) THEN 'Low'
        WHEN amount_cents < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY amount_cents) FROM payments) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: amount cents bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
  - name: updated_at_year
    sql: EXTRACT(YEAR FROM updated_at)
    type: number
    description: Year extracted from updated_at
    virtual: true
  - name: updated_at_month
    sql: TO_CHAR(updated_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from updated_at
    virtual: true
measures:
  - name: payment_count
    sql: id
    type: count_distinct
  - name: total_amount_cents
    sql: amount_cents
    type: sum
    description: Sum of amount cents
  - name: avg_amount_cents
    sql: amount_cents
    type: avg
    description: Average amount cents
joins:
  - target_entity: Orders
    relationship: many_to_one
    join_columns:
      from: order_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name order_id
    description: Each payment likely belongs to one order
use_cases:
  - Use for segmentation analysis by method, status
  - Use for aggregation and trends on amount_cents
  - Use for time-series analysis using created_at, updated_at
  - Join with orders for cross-entity analysis
  - Avoid for row-level refunds queries — use those entities directly
query_patterns:
  - description: Payments by method
    sql: |-
      SELECT method, COUNT(*) as count
      FROM payments
      GROUP BY method
      ORDER BY count DESC
  - description: Payments by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM payments
      GROUP BY status
      ORDER BY count DESC
  - description: Total amount_cents by method
    sql: |-
      SELECT method, SUM(amount_cents) as total_amount_cents, COUNT(*) as count
      FROM payments
      GROUP BY method
      ORDER BY total_amount_cents DESC
