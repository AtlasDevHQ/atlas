name: Canonical Eval

# Canonical-question eval harness for the consolidated NovaMart demo
# dataset (#2025). Proves the semantic layer (metrics, query_patterns,
# glossary disambiguation, virtual dimensions) returns correct answers to
# a curated set of ~20 questions.
#
# Policy:
#   - Pull requests: informational only. The job is allowed to fail without
#     blocking the PR; the signal is the `X/N passing` line in the run log.
#     This matches the `lighthouse.yml` first-month policy.
#   - Release tags (v*.*.*): blocking. A canonical-question regression
#     should never ship in a tagged release. Tag pushes drop the
#     `continue-on-error` and a single fail trips the workflow red.
#
# Modes:
#   - canonical-eval (existing): typed semantic-layer reads + direct SQL
#     execution against seeded Postgres. Validates SQL correctness.
#   - canonical-mcp-eval (new, #2074): every canonical question dispatched
#     through the real `createHostedMcpRouter()` mounted on `Bun.serve`.
#     Validates the MCP **protocol** layer end-to-end — transport, tool
#     dispatch, error envelopes, prompts/list shape, concurrent sessions.
#     `verifyAccessToken` is mocked (Phase 1); #2119 replaces the mock
#     with a real DCR + PKCE flow for full JWT-path coverage.
#   The optional `--llm` mode for canonical-eval exists for local
#   exploration; we don't run it in CI to keep the gate stable.
#
# Workflow-injection notes:
#   - No untrusted PR/issue/commit fields are spliced into `run:` strings.
#   - Bun + Postgres versions templated into `run:` come from the workflow's
#     own `env:` block — repo-controlled, not attacker-controlled.

on:
  pull_request:
    branches: [main]
    paths:
      - "eval/canonical-questions/**"
      - "packages/cli/bin/canonical-eval*.ts"
      - "packages/cli/bin/atlas.ts"
      - "packages/cli/lib/help.ts"
      - "packages/cli/data/seeds/ecommerce/**"
      - "packages/api/src/lib/semantic/**"
      # MCP-path eval (#2074): trigger on changes to the MCP route, the
      # tools the eval dispatches, the prompts/resources surfaces it
      # asserts shape on, the auth surface that issues / verifies
      # bearers, and the eval helpers themselves. `canonical-mcp-*.ts`
      # already matches `canonical-mcp-eval.evalspec.ts` since the
      # extension still ends in `.ts`.
      - "packages/mcp/src/__tests__/canonical-mcp-*.ts"
      # Phase 2 part B (#2119) — eval helpers lifted from __tests__/ to
      # src/eval/ as a public-ish surface, plus the new LLM-driven CLI
      # binary that consumes them. Re-trigger on any of these so the
      # eval-mcp-llm CI job catches a regression in the helpers it imports.
      - "packages/mcp/src/eval/**"
      - "packages/cli/bin/canonical-eval-mcp-llm.ts"
      - "eval/canonical-questions/mcp-llm-baseline.json"
      - "packages/mcp/src/hosted.ts"
      - "packages/mcp/src/server.ts"
      - "packages/mcp/src/actor.ts"
      - "packages/mcp/src/tools.ts"
      - "packages/mcp/src/semantic-tools.ts"
      - "packages/mcp/src/prompts.ts"
      - "packages/mcp/src/resources.ts"
      - "packages/mcp/src/error-envelope.ts"
      - "packages/mcp/package.json"
      - "packages/api/src/lib/auth/server.ts"
      - "packages/api/src/lib/auth/oauth-claims.ts"
      # Phase 2 (#2119) — the in-process OAuth helper + the published
      # @useatlas/mcp/init flow it drives. A drift in either trips the
      # auth-helper smoke test in the same job, so the trigger paths
      # cover both even though only the eval job depends on them.
      - "plugins/mcp/src/init/hosted.ts"
      - "plugins/mcp/src/init/index.ts"
      - ".github/workflows/eval.yml"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.11"

jobs:
  canonical-eval:
    name: canonical-eval
    runs-on: ubuntu-latest
    # PR runs are informational; tag pushes are blocking. The release-tag
    # branch flips this off so a regression actually trips the workflow red.
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U atlas"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @useatlas/types (resolves api imports)
        run: bun run --filter '@useatlas/types' build

      # `seedDemoPostgres` expects an existing target database; we provision
      # `atlas_demo` here so the harness can drop/recreate the seed schema
      # against a clean DB without polluting `atlas` (the internal DB).
      - name: Provision atlas_demo database
        env:
          PGPASSWORD: atlas
        run: |
          bun x wait-on tcp:127.0.0.1:5432 --timeout 60000
          psql -h 127.0.0.1 -U atlas -d atlas -c "CREATE DATABASE atlas_demo;"

      - name: Run canonical eval (deterministic)
        env:
          ATLAS_DATASOURCE_URL: postgres://atlas:atlas@127.0.0.1:5432/atlas_demo
          DATABASE_URL: postgres://atlas:atlas@127.0.0.1:5432/atlas
        run: bun packages/cli/bin/atlas.ts canonical-eval

  # MCP-path eval (#2074, Phase 1; #2119, Phase 2 part A). Runs every
  # canonical question through the real `createHostedMcpRouter` mounted
  # on `Bun.serve`, exercising transport / dispatch / envelope / prompts
  # shape / concurrent sessions / session-cap enforcement. Phase 2 part A
  # (#2119) replaces the `verifyAccessToken` mock with a real OAuth 2.1
  # round-trip against an in-process Better Auth instance — the issued
  # JWT goes through real signature verification + JWKS resolution, so a
  # regression in the JWT-path now fails this gate. The auth-helper
  # smoke test (`canonical-mcp-auth.test.ts`) runs first so a regression
  # in the helper trips before the full evalspec.
  #
  # No Postgres needed: the eval mocks `executeSQL` so SQL correctness is
  # owned by the deterministic job above. This job is purely the MCP
  # **protocol + JWT** gate.
  canonical-mcp-eval-deterministic:
    name: canonical-mcp-eval (deterministic)
    runs-on: ubuntu-latest
    # Same policy as the deterministic job: PRs informational, tag pushes
    # blocking. A protocol-shape regression must not ship in a tag.
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @useatlas/types (resolves api imports)
        run: bun run --filter '@useatlas/types' build

      - name: Run MCP auth helper smoke test (#2119)
        run: bun test ./packages/mcp/src/__tests__/canonical-mcp-auth.test.ts

      - name: Run MCP-path canonical eval
        run: bun test ./packages/mcp/src/__tests__/canonical-mcp-eval.evalspec.ts

  # LLM-driven MCP eval (#2119 Part B). Runs every canonical question
  # through the real hosted MCP route via an LLM (Vercel AI SDK
  # `streamText` + tools bound to MCP `tools/call`) and grades the
  # tool-call sequence per question.
  #
  # Catches regressions the typed evals cannot:
  #   - `tool_selection`: misleading tool descriptions route the LLM to
  #     the wrong tool for a known question.
  #   - `recovery`: the LLM ignores `unknown_*` / `ambiguous_term`
  #     envelopes instead of self-correcting.
  #   - `latency`: dispatch fan-out grows past the committed baseline
  #     by >25% (early-warning signal; baseline lives at
  #     `eval/canonical-questions/mcp-llm-baseline.json`).
  #
  # Needs a real datasource (the LLM may pick `executeSQL`) and an LLM
  # API key. The provider defaults to Anthropic; override via
  # `ATLAS_PROVIDER` / `ATLAS_MODEL` if a future cost target shifts.
  # Cheap model + small question set keeps a typical run under $0.05.
  #
  # ANTHROPIC_API_KEY must be added as a repo secret by an org owner.
  # Until then the job no-ops on PRs (continue-on-error: true) and
  # surfaces a "skipped" message in the log on tag pushes.
  eval-mcp-llm:
    name: eval-mcp-llm (#2119 Part B)
    runs-on: ubuntu-latest
    # Same policy as the deterministic + JWT-path jobs — PRs informational,
    # tag pushes blocking. A drop below the 18/20 acceptance floor must
    # not ship in a tag.
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U atlas"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @useatlas/types (resolves api imports)
        run: bun run --filter '@useatlas/types' build

      - name: Provision atlas_demo database
        env:
          PGPASSWORD: atlas
        run: |
          bun x wait-on tcp:127.0.0.1:5432 --timeout 60000
          psql -h 127.0.0.1 -U atlas -d atlas -c "CREATE DATABASE atlas_demo;"

      - name: Skip when ANTHROPIC_API_KEY is not set
        # `secrets.<name>` evaluates to the empty string when unset, so
        # this gate works for both forks (which never see secrets) and
        # repos where the org owner has not yet wired the key. The skip
        # keeps the job from going red on tag pushes just because the
        # secret is missing — once the secret lands the gate flips to
        # blocking automatically.
        if: ${{ secrets.ANTHROPIC_API_KEY == '' }}
        run: |
          echo "::warning::ANTHROPIC_API_KEY not configured — skipping LLM eval. Add the repo secret to enable."
          echo "ATLAS_LLM_EVAL_SKIPPED=1" >> "$GITHUB_ENV"

      - name: Run LLM-driven MCP canonical eval
        if: ${{ env.ATLAS_LLM_EVAL_SKIPPED != '1' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Cheap-and-fast default: Haiku for the eval. Operators can
          # override at the workflow-dispatch level by setting these
          # at the job env: layer above.
          ATLAS_PROVIDER: anthropic
          ATLAS_MODEL: claude-haiku-4-5-20251001
          ATLAS_DATASOURCE_URL: postgres://atlas:atlas@127.0.0.1:5432/atlas_demo
          # DATABASE_URL deliberately unset — the in-process auth fixture
          # short-circuits audit writes via `hasInternalDB() === false`.
        run: bun packages/cli/bin/atlas.ts canonical-eval --mcp-llm
