    sample_values:
      - Sat Feb 29 2020 20:39:24 GMT-0500 (Eastern Standard Time)
      - Sat Feb 29 2020 22:18:49 GMT-0500 (Eastern Standard Time)
      - Sat Feb 29 2020 23:58:14 GMT-0500 (Eastern Standard Time)
      - Sun Mar 01 2020 01:37:39 GMT-0500 (Eastern Standard Time)
      - Sun Mar 01 2020 03:17:04 GMT-0500 (Eastern Standard Time)
      - Sun Mar 01 2020 04:56:29 GMT-0500 (Eastern Standard Time)
