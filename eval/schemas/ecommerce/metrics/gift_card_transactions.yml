metrics:
  - id: gift_card_transactions_count
    label: Total GiftCardTransactions
    description: Count of distinct gift_card_transactions records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM gift_card_transactions
    aggregation: count_distinct
  - id: total_amount_cents
    label: Total amount cents
    description: Sum of amount_cents across all gift_card_transactions.
    type: atomic
    source:
      entity: GiftCardTransactions
      measure: total_amount_cents
    sql: |-
      SELECT SUM(amount_cents) as total_amount_cents
      FROM gift_card_transactions
    aggregation: sum
    objective: maximize
  - id: avg_amount_cents
    label: Average amount cents
    description: Average amount_cents per gift_card_transaction.
    type: atomic
    sql: |-
      SELECT AVG(amount_cents) as avg_amount_cents
      FROM gift_card_transactions
    aggregation: avg
  - id: amount_cents_by_type
    label: amount cents by type
    description: amount_cents broken down by type.
    type: atomic
    sql: |-
      SELECT type, SUM(amount_cents) as total_amount_cents, AVG(amount_cents) as avg_amount_cents, COUNT(*) as count
      FROM gift_card_transactions
      GROUP BY type
      ORDER BY total_amount_cents DESC
