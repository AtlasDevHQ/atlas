use_cases:
  - 'WARNING: This table appears to be abandoned/legacy. Verify with the user before querying'
  - Use for segmentation analysis by order_status
  - Use for aggregation and trends on order_total
  - Use for time-series analysis using placed_date, shipped_date
query_patterns:
  - description: OldOrdersV1 by order_status
    sql: |-
      SELECT order_status, COUNT(*) as count
      FROM old_orders_v1
      GROUP BY order_status
      ORDER BY count DESC
  - description: Total order_total by order_status
    sql: |-
      SELECT order_status, SUM(order_total) as total_order_total, COUNT(*) as count
      FROM old_orders_v1
      GROUP BY order_status
      ORDER BY total_order_total DESC
