name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.11"

# The historic `ci` job was a single linear pipeline (install → drift → build
# → type → lint → test:others → test:e2e:integration) that took ~3m30s end-
# to-end. Most of those steps are independent. Splitting them into parallel
# jobs drops the critical path to ~1m30s on warm cache. The umbrella `ci`
# job at the bottom (`needs: [...]`, `if: always()`) keeps the single `ci`
# context that branch protection on `main` requires — mirrors the
# `Deploy Validation` umbrella pattern in deploy-validation.yml.
#
# Every job that runs `bun install` shares an `actions/cache@v4` step keyed
# on `bun.lock`'s hash. Cold runs (new lockfile) install in full; warm runs
# (lockfile unchanged) reuse extracted packages and drop install time from
# ~10s to ~1-2s. The cache is also shared with api-tests below.

jobs:
  drift:
    name: drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check dependency versions (syncpack)
        run: bun x syncpack lint

      - name: Check Dockerfile bun version pins
        run: |
          EXPECTED="${{ env.BUN_VERSION }}"
          ERRORS=0
          for f in $(find . -name Dockerfile -not -path './.git/*' -not -path './node_modules/*'); do
            if ! grep -q 'oven/bun:' "$f"; then continue; fi
            ACTUAL=$(grep -o 'oven/bun:[0-9.]*' "$f" | head -1 | cut -d: -f2)
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error file=$f::Dockerfile pins bun $ACTUAL, expected $EXPECTED"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo "All Dockerfiles pin bun $EXPECTED"

      - name: Check Dockerfile workspace completeness
        run: bash scripts/check-dockerfile-workspace.sh

      - name: Check Railway watchPatterns coverage
        run: bash scripts/check-railway-watch.sh

      - name: Check template drift
        run: bash scripts/check-template-drift.sh

      - name: Check security-headers drift
        run: bash scripts/check-security-headers-drift.sh

      - name: Check Drizzle schema ↔ migration drift
        run: bash scripts/check-schema-drift.sh

      - name: Check vendored @atlas/oauth-helper ↔ canonical drift
        run: bash scripts/check-oauth-helper-drift.sh

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  type:
    name: type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `bun run type` builds the SDK packages it needs internally
      # (@useatlas/types, plugin-sdk, sdk, react), runs tsgo --noEmit, and
      # finishes with `@atlas/web type` — self-contained, no pre-build.
      - name: Type check
        run: bun run type

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK packages
        run: bun run --filter '@useatlas/types' build && bun run --filter '@useatlas/plugin-sdk' build && bun run --filter '@useatlas/sdk' build

      - name: Build widget bundle
        run: bun run --filter '@useatlas/react' build

      - name: Build
        run: bun run build

      - name: Check OpenAPI ↔ api-reference drift
        # Runs after SDK + widget + app builds so extract-openapi.ts can
        # resolve @useatlas/types and other built dependencies at import time.
        run: bash scripts/check-openapi-drift.sh

  test-others:
    name: test-others
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # @useatlas/types and @useatlas/plugin-sdk both resolve to their
      # `dist/` via their "exports" field, so non-api workspace tests
      # can't import them until the packages have been built. Matches
      # the api-tests pre-build below.
      - name: Build @useatlas/types + @useatlas/plugin-sdk
        run: bun run --filter '@useatlas/types' build && bun run --filter '@useatlas/plugin-sdk' build

      - name: Test (non-api packages)
        run: bun run test:others

  test-e2e-integration:
    name: test-e2e-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # E2E integration tier — contract tests that pin protocol-level
      # invariants across packages (e.g. MCP multi-replica session
      # locality, #2069). Runs in-process via mock.module(), no Docker
      # services needed. Cross-package imports require built SDK dists.
      - name: Build @useatlas/types + @useatlas/plugin-sdk
        run: bun run --filter '@useatlas/types' build && bun run --filter '@useatlas/plugin-sdk' build

      - name: Test (e2e integration tier)
        run: bun run test:e2e:integration

  # Umbrella required-check for branch protection.
  #
  # Branch protection on `main` requires a single context named `ci`. The
  # umbrella `needs:` every parallel sub-job above and asserts each one
  # completed `success` — so the protection still catches every failure
  # the historic monolithic `ci` job did, just with a parallel underbelly.
  # `if: always()` so the check is present even when a dependent job fails.
  ci:
    name: ci
    needs: [drift, lint, type, build, test-others, test-e2e-integration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all dependent jobs succeeded
        env:
          DRIFT_RESULT: ${{ needs.drift.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPE_RESULT: ${{ needs.type.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          TEST_OTHERS_RESULT: ${{ needs.test-others.result }}
          TEST_E2E_RESULT: ${{ needs.test-e2e-integration.result }}
        run: |
          set -euo pipefail
          fail=0
          for pair in "drift=$DRIFT_RESULT" "lint=$LINT_RESULT" "type=$TYPE_RESULT" "build=$BUILD_RESULT" "test-others=$TEST_OTHERS_RESULT" "test-e2e-integration=$TEST_E2E_RESULT"; do
            name=${pair%%=*}
            result=${pair#*=}
            if [ "$result" != "success" ]; then
              echo "::error::$name job result was '$result' (expected 'success')"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All CI gates passed."

  api-tests:
    name: api-tests (${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # @useatlas/types and @useatlas/plugin-sdk both resolve to their
      # `dist/` via their "exports" field, so api tests can't import them
      # until the packages have been built. plugin-sdk is required because
      # `description-rubric.test.ts` imports `@useatlas/yaml-context`,
      # which imports `@useatlas/plugin-sdk` for the plugin contract.
      - name: Build @useatlas/types + @useatlas/plugin-sdk
        run: bun run --filter '@useatlas/types' build && bun run --filter '@useatlas/plugin-sdk' build

      - name: Test @atlas/api (shard ${{ matrix.shard }}/4)
        working-directory: packages/api
        env:
          # Postgres service container exposed on localhost:5432 — the
          # migration smoke test (`migrate-pg.test.ts`) runs every
          # migration end-to-end against a real Postgres so SQL
          # semantic errors (the 0054 class) fail CI instead of prod
          # boot. Tests skip cleanly when this env var is unset, so
          # local-dev runs without `bun run db:up` are unaffected.
          TEST_DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas
        run: bun run scripts/test-isolated.ts --shard ${{ matrix.shard }}/4
    services:
      # Postgres for the migration smoke test. The other 3 shards see
      # the same service (matrix shares the `services` block), which is
      # fine — only one shard at a time runs the migrate-pg test, and
      # it scopes its writes to a per-test schema so concurrent shards
      # don't trample each other.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
