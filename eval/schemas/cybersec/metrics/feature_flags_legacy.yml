metrics:
  - id: feature_flags_legacy_count
    label: Total FeatureFlagsLegacy
    description: Count of distinct feature_flags_legacy records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM feature_flags_legacy
    aggregation: count_distinct
  - id: total_rollout_percentage
    label: Total rollout percentage
    description: Sum of rollout_percentage across all feature_flags_legacy.
    type: atomic
    source:
      entity: FeatureFlagsLegacy
      measure: total_rollout_percentage
    sql: |-
      SELECT SUM(rollout_percentage) as total_rollout_percentage
      FROM feature_flags_legacy
    aggregation: sum
    objective: maximize
  - id: avg_rollout_percentage
    label: Average rollout percentage
    description: Average rollout_percentage per feature_flags_legacy.
    type: atomic
    sql: |-
      SELECT AVG(rollout_percentage) as avg_rollout_percentage
      FROM feature_flags_legacy
    aggregation: avg
  - id: rollout_percentage_by_description
    label: rollout percentage by description
    description: rollout_percentage broken down by description.
    type: atomic
    sql: >-
      SELECT description, SUM(rollout_percentage) as total_rollout_percentage, AVG(rollout_percentage) as
      avg_rollout_percentage, COUNT(*) as count

      FROM feature_flags_legacy

      GROUP BY description

      ORDER BY total_rollout_percentage DESC
