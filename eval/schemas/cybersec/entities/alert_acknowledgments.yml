name: AlertAcknowledgments
type: fact_table
table: alert_acknowledgments
grain: one row per alert acknowledgment record
description: Auto-profiled schema for alert_acknowledgments (8,000 rows). Contains 5 columns, linked to alerts, users.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 8000
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: alert_id
    sql: alert_id
    type: number
    description: Foreign key to alerts
    unique_count: 5874
    sample_values:
      - '5'
      - '10'
      - '11'
      - '13'
      - '14'
      - '15'
      - '20'
      - '25'
  - name: user_id
    sql: user_id
    type: number
    description: Foreign key to users
    unique_count: 1967
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '8'
      - '9'
  - name: acknowledged_at
    sql: acknowledged_at
    type: date
    unique_count: 8000
    sample_values:
      - Sun Jul 12 2020 13:49:45 GMT-0400 (Eastern Daylight Time)
      - Mon Aug 03 2020 00:22:17 GMT-0400 (Eastern Daylight Time)
      - Tue Aug 11 2020 07:00:48 GMT-0400 (Eastern Daylight Time)
      - Tue Aug 11 2020 21:59:22 GMT-0400 (Eastern Daylight Time)
      - Sun Aug 30 2020 00:14:12 GMT-0400 (Eastern Daylight Time)
      - Wed Sep 09 2020 18:11:20 GMT-0400 (Eastern Daylight Time)
      - Sun Sep 13 2020 05:29:37 GMT-0400 (Eastern Daylight Time)
      - Wed Sep 16 2020 10:53:04 GMT-0400 (Eastern Daylight Time)
  - name: note
    sql: note
    type: string
    unique_count: 5
    null_count: 5609
    sample_values:
      - Escalated to team lead
      - False positive
      - Handled via playbook
      - Investigating
      - Known issue
  - name: acknowledged_at_year
    sql: EXTRACT(YEAR FROM acknowledged_at)
    type: number
    description: Year extracted from acknowledged_at
    virtual: true
  - name: acknowledged_at_month
    sql: TO_CHAR(acknowledged_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from acknowledged_at
    virtual: true
measures:
  - name: alert_acknowledgment_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Alerts
    relationship: many_to_one
    join_columns:
      from: alert_id
      to: id
    description: Each alert_acknowledgment belongs to one alert
  - target_entity: Users
    relationship: many_to_one
    join_columns:
      from: user_id
      to: id
    description: Each alert_acknowledgment belongs to one user
use_cases:
  - Use for segmentation analysis by note
  - Use for time-series analysis using acknowledged_at
  - Join with alerts, users for cross-entity analysis
query_patterns:
  - description: AlertAcknowledgments by note
    sql: |-
      SELECT note, COUNT(*) as count
      FROM alert_acknowledgments
      GROUP BY note
      ORDER BY count DESC
