name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `bun run dev`
        2. Ask the agent "..."
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or screenshots if applicable.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 15.2, Ubuntu 24.04, Windows 11"
    validations:
      required: false

  - type: input
    id: bun-version
    attributes:
      label: bun version
      placeholder: "e.g. 1.3.10"
    validations:
      required: false

  - type: dropdown
    id: provider
    attributes:
      label: LLM Provider
      options:
        - anthropic
        - openai
        - bedrock
        - ollama
        - gateway
    validations:
      required: false

  - type: dropdown
    id: deploy-target
    attributes:
      label: Deploy Target
      options:
        - Local (bun run dev)
        - Docker
        - Vercel
        - Railway
        - Other
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem (logs, config, etc.).
    validations:
      required: false
