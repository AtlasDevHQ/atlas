metrics:
  - id: monthly_revenue_summary_count
    label: Total MonthlyRevenueSummary
    description: Count of distinct monthly_revenue_summary records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM monthly_revenue_summary
    aggregation: count_distinct
  - id: total_revenue_cents
    label: Total revenue cents
    description: Sum of revenue_cents across all monthly_revenue_summary.
    type: atomic
    source:
      entity: MonthlyRevenueSummary
      measure: total_revenue_cents
    sql: |-
      SELECT SUM(revenue_cents) as total_revenue_cents
      FROM monthly_revenue_summary
    aggregation: sum
    objective: maximize
  - id: avg_revenue_cents
    label: Average revenue cents
    description: Average revenue_cents per monthly_revenue_summary.
    type: atomic
    sql: |-
      SELECT AVG(revenue_cents) as avg_revenue_cents
      FROM monthly_revenue_summary
    aggregation: avg
