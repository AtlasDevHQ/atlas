id: "sp-005"
question: "What is the total monthly revenue by account plan?"
schema: simple
difficulty: simple
category: aggregation
tags: [accounts, revenue, plan]
gold_sql: |
  SELECT plan, SUM(monthly_value) AS total_monthly_value, COUNT(*) AS account_count
  FROM accounts
  WHERE status = 'Active'
  GROUP BY plan
  ORDER BY total_monthly_value DESC
expected_rows: null
notes: "Aggregation with GROUP BY on plan types, filtered to active accounts"
