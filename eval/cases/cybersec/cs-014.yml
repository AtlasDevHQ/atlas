id: "cs-014"
question: "What is the net vulnerability trend month over month — new vs resolved?"
schema: cybersec
difficulty: medium
category: timeseries
tags: [monthly_vulnerability_summary, trend, net-change]
gold_sql: |
  SELECT
    month,
    new_vulns,
    resolved_vulns,
    new_vulns - resolved_vulns AS net_change,
    open_vulns AS running_open_total
  FROM monthly_vulnerability_summary
  ORDER BY month
expected_rows: null
notes: "Tests simple arithmetic on pre-aggregated monthly summary table"
