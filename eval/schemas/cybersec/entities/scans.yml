name: Scans
type: fact_table
table: scans
grain: one row per scan record
description: Auto-profiled schema for scans (5,000 rows). Contains 10 columns, linked to organizations, scan_configurations.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 5000
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 200
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: scan_configuration_id
    sql: scan_configuration_id
    type: number
    description: Foreign key to scan_configurations
    unique_count: 100
    null_count: 1527
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: scan_type
    sql: scan_type
    type: string
    unique_count: 4
    sample_values:
      - compliance
      - full
      - quick
      - targeted
  - name: status
    sql: status
    type: string
    unique_count: 4
    sample_values:
      - completed
      - failed
      - queued
      - running
  - name: started_at
    sql: started_at
    type: date
    unique_count: 5000
    sample_values:
      - Tue Mar 17 2020 22:03:12 GMT-0400 (Eastern Daylight Time)
      - Sat Apr 11 2020 08:12:32 GMT-0400 (Eastern Daylight Time)
      - Mon Apr 20 2020 14:43:37 GMT-0400 (Eastern Daylight Time)
      - Thu Apr 30 2020 20:32:36 GMT-0400 (Eastern Daylight Time)
      - Fri May 08 2020 13:46:40 GMT-0400 (Eastern Daylight Time)
      - Sun May 10 2020 00:44:13 GMT-0400 (Eastern Daylight Time)
      - Wed May 20 2020 12:05:41 GMT-0400 (Eastern Daylight Time)
      - Tue May 26 2020 19:55:15 GMT-0400 (Eastern Daylight Time)
  - name: completed_at
    sql: completed_at
    type: date
    unique_count: 4272
    null_count: 728
    sample_values:
      - Wed Mar 18 2020 01:00:13 GMT-0400 (Eastern Daylight Time)
      - Sat Apr 11 2020 09:18:34 GMT-0400 (Eastern Daylight Time)
      - Mon Apr 20 2020 16:50:35 GMT-0400 (Eastern Daylight Time)
      - Thu Apr 30 2020 22:13:22 GMT-0400 (Eastern Daylight Time)
      - Fri May 08 2020 16:45:07 GMT-0400 (Eastern Daylight Time)
      - Sun May 10 2020 03:51:36 GMT-0400 (Eastern Daylight Time)
      - Wed May 20 2020 13:49:06 GMT-0400 (Eastern Daylight Time)
      - Tue May 26 2020 20:53:57 GMT-0400 (Eastern Daylight Time)
  - name: assets_scanned
    sql: assets_scanned
    type: number
    unique_count: 500
    sample_values:
      - '10'
      - '11'
      - '12'
      - '13'
      - '14'
      - '15'
      - '16'
      - '17'
  - name: findings_count
    sql: findings_count
    type: number
    unique_count: 200
    sample_values:
      - '0'
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
  - name: created_at
    sql: created_at
    type: date
    unique_count: 5000
    sample_values:
      - Tue Mar 17 2020 22:03:12 GMT-0400 (Eastern Daylight Time)
      - Sat Apr 11 2020 08:12:32 GMT-0400 (Eastern Daylight Time)
      - Mon Apr 20 2020 14:43:37 GMT-0400 (Eastern Daylight Time)
      - Thu Apr 30 2020 20:32:36 GMT-0400 (Eastern Daylight Time)
      - Fri May 08 2020 13:46:40 GMT-0400 (Eastern Daylight Time)
      - Sun May 10 2020 00:44:13 GMT-0400 (Eastern Daylight Time)
      - Wed May 20 2020 12:05:41 GMT-0400 (Eastern Daylight Time)
      - Tue May 26 2020 19:55:15 GMT-0400 (Eastern Daylight Time)
  - name: started_at_year
    sql: EXTRACT(YEAR FROM started_at)
    type: number
    description: Year extracted from started_at
    virtual: true
  - name: started_at_month
    sql: TO_CHAR(started_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from started_at
    virtual: true
  - name: completed_at_year
    sql: EXTRACT(YEAR FROM completed_at)
    type: number
    description: Year extracted from completed_at
    virtual: true
  - name: completed_at_month
    sql: TO_CHAR(completed_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from completed_at
    virtual: true
  - name: assets_scanned_bucket
    sql: |-
      CASE
        WHEN assets_scanned < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY assets_scanned) FROM scans) THEN 'Low'
        WHEN assets_scanned < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY assets_scanned) FROM scans) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: assets scanned bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: findings_count_bucket
    sql: |-
      CASE
        WHEN findings_count < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY findings_count) FROM scans) THEN 'Low'
        WHEN findings_count < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY findings_count) FROM scans) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: findings count bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: scan_count
    sql: id
    type: count_distinct
  - name: total_assets_scanned
    sql: assets_scanned
    type: sum
    description: Sum of assets scanned
  - name: avg_assets_scanned
    sql: assets_scanned
    type: avg
    description: Average assets scanned
  - name: total_findings_count
    sql: findings_count
    type: sum
    description: Sum of findings count
  - name: avg_findings_count
    sql: findings_count
    type: avg
    description: Average findings count
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each scan belongs to one organization
  - target_entity: ScanConfigurations
    relationship: many_to_one
    join_columns:
      from: scan_configuration_id
      to: id
    description: Each scan belongs to one scan_configuration
use_cases:
  - Use for segmentation analysis by scan_type, status
  - Use for aggregation and trends on assets_scanned, findings_count
  - Use for time-series analysis using started_at, completed_at, created_at
  - Join with organizations, scan_configurations for cross-entity analysis
  - Avoid for row-level scan_results/scan_results_denormalized queries — use those entities directly
query_patterns:
  - description: Scans by scan_type
    sql: |-
      SELECT scan_type, COUNT(*) as count
      FROM scans
      GROUP BY scan_type
      ORDER BY count DESC
  - description: Scans by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM scans
      GROUP BY status
      ORDER BY count DESC
  - description: Total assets_scanned by scan_type
    sql: |-
      SELECT scan_type, SUM(assets_scanned) as total_assets_scanned, COUNT(*) as count
      FROM scans
      GROUP BY scan_type
      ORDER BY total_assets_scanned DESC
