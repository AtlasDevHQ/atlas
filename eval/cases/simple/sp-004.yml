id: "sp-004"
question: "Which companies have the most employees in Engineering?"
schema: simple
difficulty: medium
category: join
tags: [people, companies, engineering, count]
gold_sql: |
  SELECT c.name AS company_name, COUNT(*) AS engineering_headcount
  FROM people p
  JOIN companies c ON p.company_id = c.id
  WHERE p.department = 'Engineering'
  GROUP BY c.name
  ORDER BY engineering_headcount DESC
expected_rows: null
notes: "Tests JOIN with GROUP BY and filtering on department"
