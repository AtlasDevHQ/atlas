metrics:
  - id: orders_count
    label: Total Orders
    description: Count of distinct orders records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM orders
    aggregation: count_distinct
  - id: total_subtotal_cents
    label: Total subtotal cents
    description: Sum of subtotal_cents across all orders.
    type: atomic
    source:
      entity: Orders
      measure: total_subtotal_cents
    sql: |-
      SELECT SUM(subtotal_cents) as total_subtotal_cents
      FROM orders
    aggregation: sum
    objective: maximize
  - id: avg_subtotal_cents
    label: Average subtotal cents
    description: Average subtotal_cents per order.
    type: atomic
    sql: |-
      SELECT AVG(subtotal_cents) as avg_subtotal_cents
      FROM orders
    aggregation: avg
  - id: subtotal_cents_by_status
    label: subtotal cents by status
    description: subtotal_cents broken down by status.
    type: atomic
    sql: >-
      SELECT status, SUM(subtotal_cents) as total_subtotal_cents, AVG(subtotal_cents) as avg_subtotal_cents, COUNT(*) as
      count

      FROM orders

      GROUP BY status

      ORDER BY total_subtotal_cents DESC
