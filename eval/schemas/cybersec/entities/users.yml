  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: user_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each user belongs to one organization
use_cases:
  - Use for segmentation analysis by role
  - Use for time-series analysis using last_login, created_at
  - Join with organizations for cross-entity analysis
  - >-
    Avoid for row-level
    alert_acknowledgments/api_keys/api_requests/audit_log/dashboards/feature_usage/incident_comments/incident_events/incidents/invitations/login_events/notifications/remediation_actions/reports/team_memberships/vulnerability_exceptions
    queries — use those entities directly
query_patterns:
  - description: Users by role
    sql: |-
      SELECT role, COUNT(*) as count
      FROM users
      GROUP BY role
      ORDER BY count DESC
