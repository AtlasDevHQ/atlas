name: Deploy Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.11"

jobs:
  # Detect whether scaffold-relevant paths changed so the expensive jobs
  # (npm install from the registry + full Next.js / Docker builds) can skip
  # when a PR doesn't touch templates, examples, or the workflow itself.
  #
  # GitHub treats *skipped* (job-level if: false) jobs as passing for
  # required-check purposes, BUT this only works for non-matrix jobs. When
  # an entire matrix job is skipped, GitHub emits a single check with the
  # un-substituted template name (e.g. `Scaffold (${{ matrix.platform }})`)
  # instead of the per-matrix names (`Scaffold (docker)`, `Scaffold (vercel)`).
  # That mismatch breaks branch protection that requires the substituted
  # names. The `deploy-validation-required` job below sidesteps this by
  # collapsing all dependent jobs into one always-running umbrella check.
  changes:
    name: Detect scaffold-relevant changes
    runs-on: ubuntu-latest
    outputs:
      scaffolds: ${{ steps.filter.outputs.scaffolds }}
      boot-smoke: ${{ steps.filter.outputs.boot-smoke }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so $BASE_SHA is reachable from a PR fork point.
          # Trade-off: slightly longer clone for a reliable diff range.
          fetch-depth: 0
      - id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            RANGE="$BASE_SHA...$HEAD_SHA"
          else
            RANGE="HEAD~1...HEAD"
          fi

          # Compute the diff on a separate line so `git` failures fail the step
          # instead of piping an empty result to grep. Fail-safe default: if we
          # can't determine what changed, run every gated job (better to burn
          # CI minutes than to silently skip critical validation).
          if ! CHANGED=$(git diff --name-only "$RANGE" 2>&1); then
            echo "::warning::git diff $RANGE failed: $CHANGED — defaulting all gates to true"
            echo "scaffolds=true" >> "$GITHUB_OUTPUT"
            echo "boot-smoke=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Keep the list short and explicit — if a PR touches any of these,
          # the scaffold + standalone jobs run. Otherwise they're skipped.
          if echo "$CHANGED" | grep -qE '^(create-atlas/|examples/|packages/api/src/|packages/web/src/|packages/types/src/|packages/cli/bin/|packages/cli/data/|scripts/(prepare-templates|check-template-drift)\.sh|\.github/workflows/deploy-validation\.yml)'; then
            echo "scaffolds=true" >> "$GITHUB_OUTPUT"
            echo "Scaffold-relevant paths changed — running scaffold jobs"
          else
            echo "scaffolds=false" >> "$GITHUB_OUTPUT"
            echo "No scaffold-relevant paths changed — skipping scaffold jobs"
          fi

          # Boot Smoke runs the production Dockerfile + /api/health probe + SaaS
          # env contract. Only worth the ~15min spend when the PR could plausibly
          # affect container shape, runtime, or boot-time guards. Dockerfile-shape
          # regressions on non-runtime PRs are still caught by the unconditional
          # boot-build job below.
          if echo "$CHANGED" | grep -qE '^(packages/(api|web|types|schemas|plugin-sdk|sandbox-sidecar)/|plugins/|ee/|deploy/api/|scripts/saas-env-fixture\.ts|bun\.lock$|package\.json$|\.github/workflows/deploy-validation\.yml$)'; then
            echo "boot-smoke=true" >> "$GITHUB_OUTPUT"
            echo "Runtime-relevant paths changed — running boot-smoke"
          else
            echo "boot-smoke=false" >> "$GITHUB_OUTPUT"
            echo "No runtime-relevant paths changed — skipping boot-smoke (boot-build still runs)"
          fi

  # Scaffold a project via create-atlas, install deps, and build.
  # Validates the full end-to-end scaffolding pipeline for each platform.
  scaffold-smoke:
    name: Scaffold (${{ matrix.platform }})
    needs: changes
    if: needs.changes.outputs.scaffolds == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [docker, vercel]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install create-atlas dependencies
        run: cd create-atlas && bun install --frozen-lockfile

      - name: Run scaffold smoke test
        run: bash create-atlas/smoke-test.sh ${{ matrix.platform }}
        env:
          SKIP_SYNCPACK: "1"

  # Build the nextjs-standalone example from the monorepo workspace.
  # Catches Next.js build failures from API/web source changes.
  standalone-build:
    name: Standalone Example Build
    needs: changes
    if: needs.changes.outputs.scaffolds == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK packages
        run: bun run --filter '@useatlas/types' build && bun run --filter '@useatlas/plugin-sdk' build && bun run --filter '@useatlas/sdk' build

      - name: Build widget bundle
        run: bun run --filter '@useatlas/react' build

      - name: Build nextjs-standalone example
        run: bun run --filter '@atlas/nextjs-standalone' build

  # Fast, unconditional pre-check: build the Dockerfile up to the `builder`
  # stage. Catches the classes of Dockerfile breakage that don't depend on
  # which files the PR touches — missing COPY when a top-level dir is added
  # or renamed, bad base-image pin, Dockerfile syntax errors, lockfile-drift
  # install failures. Reuses the `boot-smoke` gha cache so warm builds land
  # in ~30s; cold builds (no shared layers) cost ~3-4min.
  #
  # Why this runs on every PR, including docs-only: the Dockerfile reads
  # the whole tree. A repo-shape change (new package, renamed app dir) can
  # break the build without touching any path in the boot-smoke gate. The
  # cheap unconditional gate ensures Railway never sees a broken image
  # post-merge regardless of which paths the PR touched.
  boot-build:
    name: Boot Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - name: Build deploy/api image up to builder stage
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          context: .
          file: deploy/api/Dockerfile
          target: builder
          # No --load: we don't need the image, just the build to succeed.
          push: false
          # Share cache with boot-smoke so the slow gate benefits when both
          # run on the same PR, and so the fast gate stays fast on PRs that
          # only touched non-runtime paths.
          cache-from: type=gha,scope=boot-smoke
          cache-to: type=gha,scope=boot-smoke,mode=max

  # Build the production deploy/api/Dockerfile, run it under the SaaS env
  # contract (#2226), and probe /api/health. Catches everything the
  # `migrate-pg` smoke (#2225) catches plus serverExternalPackages drift,
  # Dockerfile COPY drift (#2206 sibling), start.sh regressions, healthcheck
  # path drift, boot-time SaaS guard regressions, and prod-mode bundling
  # errors that don't surface in unit tests.
  #
  # Env contract: scripts/saas-env-fixture.ts emits every value from the
  # single source of truth in packages/api/src/lib/effect/saas-env.ts.
  # Adding a new SaaS guard means adding a field to that fixture — the
  # workflow auto-picks it up with no edits here.
  #
  # Path-gated: only runs when the PR touches paths that could change
  # container shape, runtime behavior, or boot guards. Non-runtime PRs
  # skip this job; the unconditional `boot-build` above still validates
  # Dockerfile shape on every PR.
  boot-smoke:
    name: Boot Smoke
    needs: changes
    if: needs.changes.outputs.boot-smoke == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Generate SaaS env fixture
        run: |
          bun run scripts/saas-env-fixture.ts \
            --database-url "postgresql://atlas:atlas@127.0.0.1:5432/atlas" \
            > /tmp/saas.env
          # Echo only the keys (not values) for runner-log review. Fixture
          # values are non-secret CI defaults but the convention is to keep
          # env-file contents off stdout.
          echo "Fixture keys:"
          cut -d= -f1 /tmp/saas.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1

      - name: Build deploy/api image
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          context: .
          file: deploy/api/Dockerfile
          load: true
          tags: atlas-api:boot-smoke
          # cache-from reads intermediate layers populated by `boot-build`
          # (which writes mode=max to the same scope). Boot Smoke writes
          # mode=min so it only exports the final-image (runner-stage)
          # layers — uploading intermediates here just duplicates what
          # boot-build already pushed and was costing ~7 min per run on
          # GHA cache writes (single layers taking ~60s each). Warm runs
          # land in ~4-5 min — dominated by `load: true` tarball export
          # (~2 min) and the runner-stage layer write (~1-2 min).
          cache-from: type=gha,scope=boot-smoke
          cache-to: type=gha,scope=boot-smoke,mode=min

      - name: Run API container
        run: |
          # --network=host gives the container access to the postgres
          # service on 127.0.0.1:5432 (the same address the runner uses).
          # Linux-only but GH Actions ubuntu-latest is Linux.
          docker run -d \
            --name atlas-api \
            --network=host \
            --env-file /tmp/saas.env \
            atlas-api:boot-smoke

      - name: Probe /api/health (90s budget)
        run: |
          # The probe verifies the SaaS boot guards passed AND the
          # health route still resolves at /api/health — NOT that
          # downstream dependencies (LLM API key, populated DB) are
          # healthy. /api/health returns:
          #   - 200 for status="ok"|"degraded" (boot succeeded; some
          #     non-essential components may be down)
          #   - 503 for status="error" (boot succeeded but a critical
          #     component is unreachable — expected in CI because the
          #     fixture lacks an LLM provider key, so provider is "down")
          # Any other status (404 path drift, 405 verb mismatch, 502
          # proxy-but-app-dead) means the listener bound but health
          # routing or the runtime has regressed — the exact class of
          # boot-time bug this gate catches. Connection-refused / curl
          # error means the SaaS guards failed and the process exited
          # before HTTP started — the other class.
          set +e
          for i in $(seq 1 45); do
            status=$(curl -sS -o /tmp/health-body.json -w "%{http_code}" \
              --max-time 5 http://127.0.0.1:3001/api/health 2>/dev/null)
            if [ "$status" = "200" ] || [ "$status" = "503" ]; then
              echo "Boot smoke passed on attempt $i (~$(( i * 2 ))s) — HTTP $status"
              echo "──── /api/health response body ────"
              cat /tmp/health-body.json 2>/dev/null || echo "(empty)"
              exit 0
            fi
            if [ -n "$status" ] && [ "$status" != "000" ]; then
              # Listener is up but returning an unexpected status — fail
              # immediately. This is a boot-time regression (route drift,
              # method mismatch, runtime crash behind a proxy).
              echo "::error::Unexpected HTTP $status from /api/health — listener is up but health route regressed"
              echo "──── /api/health response body ────"
              cat /tmp/health-body.json 2>/dev/null || echo "(empty)"
              exit 1
            fi
            sleep 2
          done
          echo "::error::API never bound to port 3001 within 90s (boot guard failure?)"
          exit 1

      - name: Dump container logs
        if: always()
        run: |
          echo "──── docker logs atlas-api ────"
          docker logs atlas-api 2>&1 || echo "(container not running)"
          echo "──── docker inspect (state) ────"
          docker inspect --format='{{json .State}}' atlas-api 2>&1 || true

      - name: Stop container
        if: always()
        run: docker rm -f atlas-api 2>/dev/null || true

  # Lightweight checks that don't need bun: Docker compose validation + deploy mode defaults.
  config-validation:
    name: Config & Deploy Mode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate docker-compose configs
        run: |
          # env_file in compose references ../../.env — create it so config validation passes
          touch .env
          docker compose -f examples/docker/docker-compose.yml config > /dev/null
          docker compose -f examples/docker/docker-compose.ollama.yml config > /dev/null
          docker compose -f examples/docker/docker-compose.vllm.yml config > /dev/null
          echo "All docker-compose configs are valid"

      - name: Verify templates default to self-hosted
        run: |
          # Self-hosted templates must never set ATLAS_DEPLOY_MODE=saas in env/config files.
          # Source code that reads the env var at runtime is expected and fine.
          if grep -rn 'ATLAS_DEPLOY_MODE[=: ]*saas' \
            --include='*.env*' --include='*.yml' --include='*.yaml' --include='*.json' \
            create-atlas/templates/ examples/; then
            echo "::error::Template config sets ATLAS_DEPLOY_MODE to saas — self-hosted deployments must not default to SaaS mode"
            exit 1
          fi
          # Scaffolder must not write ATLAS_DEPLOY_MODE=saas to generated .env
          if grep -n 'DEPLOY_MODE=saas' create-atlas/index.ts; then
            echo "::error file=create-atlas/index.ts::Scaffolder writes ATLAS_DEPLOY_MODE=saas to generated .env"
            exit 1
          fi
          echo "Deploy mode check passed — all templates default to self-hosted"

  # Umbrella required-check for branch protection.
  #
  # Always runs (`if: always()`) so the check is present on every PR, even
  # when the matrix-skip-name-mismatch (see comment on `changes:` above)
  # would otherwise leave Scaffold (docker)/(vercel) absent from check-runs.
  # Branch protection on `main` requires this single context name and lets
  # the conditional jobs vary freely.
  #
  # Passes iff every dependency completed with `success` or `skipped`. Any
  # failure or cancellation propagates here and blocks the merge.
  deploy-validation-required:
    name: Deploy Validation
    needs: [changes, scaffold-smoke, standalone-build, config-validation, boot-build, boot-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all dependent jobs succeeded or were skipped
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          SCAFFOLD_RESULT: ${{ needs.scaffold-smoke.result }}
          STANDALONE_RESULT: ${{ needs.standalone-build.result }}
          CONFIG_RESULT: ${{ needs.config-validation.result }}
          BOOT_BUILD_RESULT: ${{ needs.boot-build.result }}
          BOOT_SMOKE_RESULT: ${{ needs.boot-smoke.result }}
        run: |
          set -euo pipefail
          fail=0
          # `changes` must succeed — it gates everything else and is never
          # skipped (no `if:` on the job itself).
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::changes job result was '$CHANGES_RESULT' (expected 'success')"
            fail=1
          fi
          # boot-build runs unconditionally — its result must be `success`.
          # A `skipped` here would mean the cheap Dockerfile-shape gate was
          # bypassed, which defeats the point of having an unconditional
          # check at all.
          if [ "$BOOT_BUILD_RESULT" != "success" ]; then
            echo "::error::boot-build job result was '$BOOT_BUILD_RESULT' (expected 'success')"
            fail=1
          fi
          # The conditional jobs may legitimately skip when their gate
          # didn't fire; success or skipped both count as a pass. boot-smoke
          # is path-gated on runtime-relevant changes — if it skipped, the
          # PR didn't touch container/runtime/boot-guard paths and the
          # cheap boot-build gate above is sufficient.
          for pair in "scaffold-smoke=$SCAFFOLD_RESULT" "standalone-build=$STANDALONE_RESULT" "config-validation=$CONFIG_RESULT" "boot-smoke=$BOOT_SMOKE_RESULT"; do
            name=${pair%%=*}
            result=${pair#*=}
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error::$name job result was '$result' (expected 'success' or 'skipped')"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "All deploy-validation gates passed (or properly skipped)."
