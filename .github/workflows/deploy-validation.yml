name: Deploy Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.11"

jobs:
  # Detect whether scaffold-relevant paths changed so the expensive jobs
  # (npm install from the registry + full Next.js / Docker builds) can skip
  # when a PR doesn't touch templates, examples, or the workflow itself.
  # GitHub treats skipped jobs as passed for required-check purposes, so
  # gating here (vs. workflow-level paths:) keeps config-validation running
  # on every PR without tripping branch protection.
  changes:
    name: Detect scaffold-relevant changes
    runs-on: ubuntu-latest
    outputs:
      scaffolds: ${{ steps.filter.outputs.scaffolds }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so $BASE_SHA is reachable from a PR fork point.
          # Trade-off: slightly longer clone for a reliable diff range.
          fetch-depth: 0
      - id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            RANGE="$BASE_SHA...$HEAD_SHA"
          else
            RANGE="HEAD~1...HEAD"
          fi

          # Compute the diff on a separate line so `git` failures fail the step
          # instead of piping an empty result to grep. Fail-safe default: if we
          # can't determine what changed, run the scaffold jobs (better to burn
          # CI minutes than to silently skip critical validation).
          if ! CHANGED=$(git diff --name-only "$RANGE" 2>&1); then
            echo "::warning::git diff $RANGE failed: $CHANGED — defaulting scaffolds=true"
            echo "scaffolds=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Keep the list short and explicit — if a PR touches any of these,
          # the scaffold + standalone jobs run. Otherwise they're skipped.
          if echo "$CHANGED" | grep -qE '^(create-atlas/|examples/|packages/api/src/|packages/web/src/|packages/types/src/|packages/cli/bin/|packages/cli/data/|scripts/(prepare-templates|check-template-drift)\.sh|\.github/workflows/deploy-validation\.yml)'; then
            echo "scaffolds=true" >> "$GITHUB_OUTPUT"
            echo "Scaffold-relevant paths changed — running scaffold jobs"
          else
            echo "scaffolds=false" >> "$GITHUB_OUTPUT"
            echo "No scaffold-relevant paths changed — skipping scaffold jobs"
          fi

  # Scaffold a project via create-atlas, install deps, and build.
  # Validates the full end-to-end scaffolding pipeline for each platform.
  scaffold-smoke:
    name: Scaffold (${{ matrix.platform }})
    needs: changes
    if: needs.changes.outputs.scaffolds == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [docker, vercel]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install create-atlas dependencies
        run: cd create-atlas && bun install --frozen-lockfile

      - name: Run scaffold smoke test
        run: bash create-atlas/smoke-test.sh ${{ matrix.platform }}
        env:
          SKIP_SYNCPACK: "1"

  # Build the nextjs-standalone example from the monorepo workspace.
  # Catches Next.js build failures from API/web source changes.
  standalone-build:
    name: Standalone Example Build
    needs: changes
    if: needs.changes.outputs.scaffolds == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@e3914758a49697077f7bcd190d36582a61667aad # v2 + node24 (pending release)
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK packages
        run: bun run --filter '@useatlas/types' build && bun run --filter '@useatlas/plugin-sdk' build && bun run --filter '@useatlas/sdk' build

      - name: Build widget bundle
        run: bun run --filter '@useatlas/react' build

      - name: Build nextjs-standalone example
        run: bun run --filter '@atlas/nextjs-standalone' build

  # Lightweight checks that don't need bun: Docker compose validation + deploy mode defaults.
  config-validation:
    name: Config & Deploy Mode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate docker-compose configs
        run: |
          # env_file in compose references ../../.env — create it so config validation passes
          touch .env
          docker compose -f examples/docker/docker-compose.yml config > /dev/null
          docker compose -f examples/docker/docker-compose.ollama.yml config > /dev/null
          docker compose -f examples/docker/docker-compose.vllm.yml config > /dev/null
          echo "All docker-compose configs are valid"

      - name: Verify templates default to self-hosted
        run: |
          # Self-hosted templates must never set ATLAS_DEPLOY_MODE=saas in env/config files.
          # Source code that reads the env var at runtime is expected and fine.
          if grep -rn 'ATLAS_DEPLOY_MODE[=: ]*saas' \
            --include='*.env*' --include='*.yml' --include='*.yaml' --include='*.json' \
            create-atlas/templates/ examples/; then
            echo "::error::Template config sets ATLAS_DEPLOY_MODE to saas — self-hosted deployments must not default to SaaS mode"
            exit 1
          fi
          # Scaffolder must not write ATLAS_DEPLOY_MODE=saas to generated .env
          if grep -n 'DEPLOY_MODE=saas' create-atlas/index.ts; then
            echo "::error file=create-atlas/index.ts::Scaffolder writes ATLAS_DEPLOY_MODE=saas to generated .env"
            exit 1
          fi
          echo "Deploy mode check passed — all templates default to self-hosted"
