  - name: results_count_bucket
    sql: |-
      CASE
        WHEN results_count < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY results_count) FROM search_queries) THEN 'Low'
        WHEN results_count < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY results_count) FROM search_queries) THEN 'Medium'
