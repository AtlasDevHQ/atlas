name: FeatureUsage
type: fact_table
table: feature_usage
grain: one row per feature usage record
description: Auto-profiled schema for feature_usage (15,000 rows). Contains 7 columns, linked to organizations, users.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 15000
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 200
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: user_id
    sql: user_id
    type: number
    description: Foreign key to users
    unique_count: 1999
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: feature_name
    sql: feature_name
    type: string
    unique_count: 10
    sample_values:
      - alert_rules
      - api_access
      - asset_inventory
      - compliance_dashboard
      - executive_dashboard
      - incident_manager
      - integrations
      - report_builder
      - threat_intel
      - vulnerability_scanner
  - name: action
    sql: action
    type: string
    unique_count: 6
    sample_values:
      - configure
      - create
      - delete
      - export
      - update
      - view
  - name: metadata
    sql: metadata
    type: string
    unique_count: 0
    null_count: 15000
  - name: created_at
    sql: created_at
    type: date
    unique_count: 15000
    sample_values:
      - Tue Feb 02 2021 12:06:17 GMT-0500 (Eastern Standard Time)
      - Sat Feb 27 2021 18:52:21 GMT-0500 (Eastern Standard Time)
      - Sat Mar 20 2021 01:11:11 GMT-0400 (Eastern Daylight Time)
      - Mon Mar 22 2021 12:44:20 GMT-0400 (Eastern Daylight Time)
      - Sat Apr 10 2021 19:54:35 GMT-0400 (Eastern Daylight Time)
      - Mon Apr 19 2021 00:48:50 GMT-0400 (Eastern Daylight Time)
      - Sat Apr 24 2021 16:21:22 GMT-0400 (Eastern Daylight Time)
      - Sat May 01 2021 11:44:12 GMT-0400 (Eastern Daylight Time)
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: feature_usage_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each feature_usage belongs to one organization
  - target_entity: Users
    relationship: many_to_one
    join_columns:
      from: user_id
      to: id
    description: Each feature_usage belongs to one user
use_cases:
  - Use for segmentation analysis by feature_name, action, metadata
  - Use for time-series analysis using created_at
  - Join with organizations, users for cross-entity analysis
query_patterns:
  - description: FeatureUsage by feature_name
    sql: |-
      SELECT feature_name, COUNT(*) as count
      FROM feature_usage
      GROUP BY feature_name
      ORDER BY count DESC
  - description: FeatureUsage by action
    sql: |-
      SELECT action, COUNT(*) as count
      FROM feature_usage
      GROUP BY action
      ORDER BY count DESC
