name: ReportSchedules
type: fact_table
table: report_schedules
grain: one row per report schedule record
description: Auto-profiled schema for report_schedules (100 rows). Contains 8 columns, linked to reports.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 100
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: report_id
    sql: report_id
    type: number
    description: Foreign key to reports
    unique_count: 90
    sample_values:
      - '17'
      - '22'
      - '35'
      - '37'
      - '47'
      - '59'
      - '61'
      - '62'
  - name: cron_expression
    sql: cron_expression
    type: string
    unique_count: 4
    sample_values:
      - 0 0 1 * *
      - 0 6 1 1,4,7,10 *
      - 0 8 1 * *
      - 0 9 * * 1
  - name: recipients
    sql: recipients
    type: string
    unique_count: 1
    sample_values:
      - security-team@example.com,ciso@example.com
  - name: is_active
    sql: is_active
    type: boolean
    unique_count: 2
    sample_values:
      - 'false'
      - 'true'
  - name: last_run
    sql: last_run
    type: date
    unique_count: 100
    sample_values:
      - Sun Feb 01 2026 16:13:06 GMT-0500 (Eastern Standard Time)
      - Mon Feb 02 2026 06:39:21 GMT-0500 (Eastern Standard Time)
      - Mon Feb 02 2026 19:27:07 GMT-0500 (Eastern Standard Time)
      - Mon Feb 02 2026 21:31:33 GMT-0500 (Eastern Standard Time)
      - Mon Feb 02 2026 23:39:55 GMT-0500 (Eastern Standard Time)
      - Tue Feb 03 2026 07:32:05 GMT-0500 (Eastern Standard Time)
      - Wed Feb 04 2026 01:21:45 GMT-0500 (Eastern Standard Time)
      - Wed Feb 04 2026 15:45:30 GMT-0500 (Eastern Standard Time)
  - name: next_run
    sql: next_run
    type: date
    unique_count: 100
    sample_values:
      - Wed Mar 04 2026 01:03:56 GMT-0500 (Eastern Standard Time)
      - Wed Mar 04 2026 02:45:35 GMT-0500 (Eastern Standard Time)
      - Wed Mar 04 2026 05:58:39 GMT-0500 (Eastern Standard Time)
      - Wed Mar 04 2026 07:26:38 GMT-0500 (Eastern Standard Time)
      - Wed Mar 04 2026 12:04:49 GMT-0500 (Eastern Standard Time)
      - Wed Mar 04 2026 15:26:20 GMT-0500 (Eastern Standard Time)
      - Thu Mar 05 2026 06:04:15 GMT-0500 (Eastern Standard Time)
      - Thu Mar 05 2026 23:43:06 GMT-0500 (Eastern Standard Time)
  - name: created_at
    sql: created_at
    type: date
    unique_count: 100
    sample_values:
      - Fri Jan 21 2022 11:40:59 GMT-0500 (Eastern Standard Time)
      - Sat Jan 22 2022 17:37:09 GMT-0500 (Eastern Standard Time)
      - Wed Feb 02 2022 15:07:16 GMT-0500 (Eastern Standard Time)
      - Sat Feb 19 2022 03:38:29 GMT-0500 (Eastern Standard Time)
      - Thu Mar 03 2022 13:53:42 GMT-0500 (Eastern Standard Time)
      - Wed Mar 16 2022 02:39:46 GMT-0400 (Eastern Daylight Time)
      - Fri Apr 08 2022 23:41:40 GMT-0400 (Eastern Daylight Time)
      - Sun Apr 17 2022 12:05:12 GMT-0400 (Eastern Daylight Time)
  - name: last_run_year
    sql: EXTRACT(YEAR FROM last_run)
    type: number
    description: Year extracted from last_run
    virtual: true
  - name: last_run_month
    sql: TO_CHAR(last_run, 'YYYY-MM')
    type: string
    description: Year-month extracted from last_run
    virtual: true
  - name: next_run_year
    sql: EXTRACT(YEAR FROM next_run)
    type: number
    description: Year extracted from next_run
    virtual: true
  - name: next_run_month
    sql: TO_CHAR(next_run, 'YYYY-MM')
    type: string
    description: Year-month extracted from next_run
    virtual: true
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: report_schedule_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Reports
    relationship: many_to_one
    join_columns:
      from: report_id
      to: id
    description: Each report_schedule belongs to one report
use_cases:
  - Use for segmentation analysis by cron_expression, recipients
  - Use for time-series analysis using last_run, next_run, created_at
  - Join with reports for cross-entity analysis
query_patterns:
  - description: ReportSchedules by cron_expression
    sql: |-
      SELECT cron_expression, COUNT(*) as count
      FROM report_schedules
      GROUP BY cron_expression
      ORDER BY count DESC
  - description: ReportSchedules by recipients
    sql: |-
      SELECT recipients, COUNT(*) as count
      FROM report_schedules
      GROUP BY recipients
      ORDER BY count DESC
