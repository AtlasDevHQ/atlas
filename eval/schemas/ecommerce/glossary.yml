    status: ambiguous
    note: >-
      segment_name on customer_segment_assignments has case-inconsistent values. Use LOWER(segment_name) when grouping
      or filtering.
    guidance: 'Always wrap in LOWER() for reliable aggregation: GROUP BY LOWER(segment_name)'
