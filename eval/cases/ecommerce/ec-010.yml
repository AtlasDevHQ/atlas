id: "ec-010"
question: "Which promotions generated the most revenue and what was their ROI?"
schema: ecommerce
difficulty: complex
category: cte
tags: [promotions, promotion_usages, orders, roi]
gold_sql: |
  WITH promo_stats AS (
    SELECT
      pr.id AS promo_id,
      pr.code,
      pr.discount_type,
      pr.discount_value,
      COUNT(pu.id) AS times_used,
      SUM(pu.discount_cents) / 100.0 AS total_discount_given,
      SUM(o.total_cents) / 100.0 AS total_order_revenue
    FROM promotions pr
    JOIN promotion_usages pu ON pu.promotion_id = pr.id
    JOIN orders o ON pu.order_id = o.id
    WHERE o.status NOT IN ('cancelled', 'refunded')
    GROUP BY pr.id, pr.code, pr.discount_type, pr.discount_value
  )
  SELECT
    code,
    discount_type,
    discount_value,
    times_used,
    total_discount_given,
    total_order_revenue,
    ROUND((total_order_revenue - total_discount_given) / NULLIF(total_discount_given, 0), 2) AS roi_ratio
  FROM promo_stats
  ORDER BY total_order_revenue DESC
expected_rows: null
notes: "Tests CTE with multi-table JOIN and ROI calculation for promotion effectiveness"
