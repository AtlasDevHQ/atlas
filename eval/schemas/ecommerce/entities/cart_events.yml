  - name: quantity_bucket
    sql: |-
      CASE
        WHEN quantity < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY quantity) FROM cart_events) THEN 'Low'
        WHEN quantity < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY quantity) FROM cart_events) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: quantity bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: cart_event_count
    sql: id
    type: count_distinct
  - name: total_quantity
    sql: quantity
    type: sum
    description: Sum of quantity
  - name: avg_quantity
    sql: quantity
    type: avg
    description: Average quantity
joins:
  - target_entity: Customers
    relationship: many_to_one
    join_columns:
      from: customer_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name customer_id
    description: Each cart_event likely belongs to one customer
  - target_entity: Products
    relationship: many_to_one
    join_columns:
      from: product_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name product_id
    description: Each cart_event likely belongs to one product
use_cases:
  - Use for segmentation analysis by event_type
  - Use for aggregation and trends on quantity
  - Use for time-series analysis using created_at
  - Join with customers, products for cross-entity analysis
query_patterns:
  - description: CartEvents by event_type
    sql: |-
      SELECT event_type, COUNT(*) as count
      FROM cart_events
      GROUP BY event_type
      ORDER BY count DESC
  - description: Total quantity by event_type
    sql: |-
      SELECT event_type, SUM(quantity) as total_quantity, COUNT(*) as count
      FROM cart_events
      GROUP BY event_type
      ORDER BY total_quantity DESC
