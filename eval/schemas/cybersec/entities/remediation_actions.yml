name: RemediationActions
type: fact_table
table: remediation_actions
grain: one row per remediation action record
description: >-
  Auto-profiled schema for remediation_actions (8,000 rows). Contains 9 columns, linked to users,
  vulnerability_instances.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 8000
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: vulnerability_instance_id
    sql: vulnerability_instance_id
    type: number
    description: Foreign key to vulnerability_instances
    unique_count: 7236
    sample_values:
      - '16'
      - '20'
      - '34'
      - '35'
      - '39'
      - '42'
      - '47'
      - '48'
  - name: assigned_to
    sql: assigned_to
    type: number
    description: Foreign key to users
    unique_count: 1970
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: status
    sql: status
    type: string
    unique_count: 4
    sample_values:
      - completed
      - deferred
      - in_progress
      - open
  - name: priority
    sql: priority
    type: string
    unique_count: 4
    sample_values:
      - critical
      - high
      - low
      - medium
  - name: due_date
    sql: due_date
    type: date
    unique_count: 91
    sample_values:
