metrics:
  - id: daily_sales_summary_count
    label: Total DailySalesSummary
    description: Count of distinct daily_sales_summary records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM daily_sales_summary
    aggregation: count_distinct
  - id: total_total_orders
    label: Total total orders
    description: Sum of total_orders across all daily_sales_summary.
    type: atomic
    source:
      entity: DailySalesSummary
      measure: total_total_orders
    sql: |-
      SELECT SUM(total_orders) as total_total_orders
      FROM daily_sales_summary
    aggregation: sum
    objective: maximize
  - id: avg_total_orders
    label: Average total orders
    description: Average total_orders per daily_sales_summary.
    type: atomic
    sql: |-
      SELECT AVG(total_orders) as avg_total_orders
      FROM daily_sales_summary
    aggregation: avg
