name: IndicatorsOfCompromise
type: fact_table
table: indicators_of_compromise
grain: one row per indicators of compromise record
description: >-
  Auto-profiled schema for indicators_of_compromise (2,000 rows). Contains 9 columns, linked to threat_actors,
  threat_feeds.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 2000
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: threat_feed_id
    sql: threat_feed_id
    type: number
    description: Foreign key to threat_feeds
    unique_count: 10
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: ioc_type
    sql: ioc_type
    type: string
    unique_count: 5
    sample_values:
      - domain
      - email
      - hash
      - ip
      - url
  - name: value
    sql: value
    type: string
    unique_count: 1987
    sample_values:
      - 00570ea4b7b229e1079701403945f36e
      - 01a59738cc7e87eee5dc63eb3eab82a7
      - 023d8a310ebf711a2450444db8b5bc35
      - 02b9bc2538f909a3c6ce0d4d3a9113b2
      - 02f93a32026a835b9b6b6c599aa1bdcb
      - 030c98eb1bd5cfb7146f43b5bd0e3dc2
      - 038d5888d550008cfa2fad26b545f382
      - 044bf3ced0b77680b368fb24b2bf6592
  - name: confidence
    sql: confidence
    type: number
    unique_count: 100
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: threat_actor_id
    sql: threat_actor_id
    type: number
    description: Foreign key to threat_actors
    unique_count: 50
    null_count: 1391
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: first_seen
    sql: first_seen
    type: date
    unique_count: 2000
    sample_values:
      - Fri Feb 28 2020 07:20:07 GMT-0500 (Eastern Standard Time)
      - Sat Mar 14 2020 22:05:57 GMT-0400 (Eastern Daylight Time)
      - Wed May 27 2020 05:09:21 GMT-0400 (Eastern Daylight Time)
      - Thu Jun 18 2020 06:55:37 GMT-0400 (Eastern Daylight Time)
      - Sat Jul 04 2020 06:56:19 GMT-0400 (Eastern Daylight Time)
      - Sat Jul 25 2020 18:11:18 GMT-0400 (Eastern Daylight Time)
      - Wed Aug 05 2020 01:10:59 GMT-0400 (Eastern Daylight Time)
      - Fri Aug 07 2020 23:53:23 GMT-0400 (Eastern Daylight Time)
  - name: last_seen
    sql: last_seen
    type: date
    unique_count: 2000
    sample_values:
      - Thu Jun 25 2020 19:01:11 GMT-0400 (Eastern Daylight Time)
      - Tue Jun 30 2020 04:38:04 GMT-0400 (Eastern Daylight Time)
      - Thu Aug 13 2020 03:05:53 GMT-0400 (Eastern Daylight Time)
      - Thu Aug 20 2020 02:27:54 GMT-0400 (Eastern Daylight Time)
      - Mon Aug 31 2020 11:23:42 GMT-0400 (Eastern Daylight Time)
      - Tue Oct 13 2020 11:40:23 GMT-0400 (Eastern Daylight Time)
      - Thu Oct 22 2020 00:39:25 GMT-0400 (Eastern Daylight Time)
      - Fri Oct 23 2020 05:00:40 GMT-0400 (Eastern Daylight Time)
  - name: created_at
    sql: created_at
    type: date
    unique_count: 2000
    sample_values:
      - Fri Feb 28 2020 07:20:07 GMT-0500 (Eastern Standard Time)
      - Sat Mar 14 2020 22:05:57 GMT-0400 (Eastern Daylight Time)
      - Wed May 27 2020 05:09:21 GMT-0400 (Eastern Daylight Time)
      - Thu Jun 18 2020 06:55:37 GMT-0400 (Eastern Daylight Time)
      - Sat Jul 04 2020 06:56:19 GMT-0400 (Eastern Daylight Time)
      - Sat Jul 25 2020 18:11:18 GMT-0400 (Eastern Daylight Time)
      - Wed Aug 05 2020 01:10:59 GMT-0400 (Eastern Daylight Time)
      - Fri Aug 07 2020 23:53:23 GMT-0400 (Eastern Daylight Time)
  - name: confidence_bucket
    sql: |-
      CASE
        WHEN confidence < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY confidence) FROM indicators_of_compromise) THEN 'Low'
        WHEN confidence < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY confidence) FROM indicators_of_compromise) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: confidence bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: first_seen_year
    sql: EXTRACT(YEAR FROM first_seen)
    type: number
    description: Year extracted from first_seen
    virtual: true
  - name: first_seen_month
    sql: TO_CHAR(first_seen, 'YYYY-MM')
    type: string
    description: Year-month extracted from first_seen
    virtual: true
  - name: last_seen_year
    sql: EXTRACT(YEAR FROM last_seen)
    type: number
    description: Year extracted from last_seen
    virtual: true
  - name: last_seen_month
    sql: TO_CHAR(last_seen, 'YYYY-MM')
    type: string
    description: Year-month extracted from last_seen
    virtual: true
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: indicators_of_compromise_count
    sql: id
    type: count_distinct
  - name: total_confidence
    sql: confidence
    type: sum
    description: Sum of confidence
  - name: avg_confidence
    sql: confidence
    type: avg
    description: Average confidence
joins:
  - target_entity: ThreatActors
    relationship: many_to_one
    join_columns:
      from: threat_actor_id
      to: id
    description: Each indicators_of_compromise belongs to one threat_actor
  - target_entity: ThreatFeeds
    relationship: many_to_one
    join_columns:
      from: threat_feed_id
      to: id
    description: Each indicators_of_compromise belongs to one threat_feed
use_cases:
  - Use for segmentation analysis by ioc_type
  - Use for aggregation and trends on confidence
  - Use for time-series analysis using first_seen, last_seen, created_at
  - Join with threat_actors, threat_feeds for cross-entity analysis
query_patterns:
  - description: IndicatorsOfCompromise by ioc_type
    sql: |-
      SELECT ioc_type, COUNT(*) as count
      FROM indicators_of_compromise
      GROUP BY ioc_type
      ORDER BY count DESC
  - description: Total confidence by ioc_type
    sql: |-
      SELECT ioc_type, SUM(confidence) as total_confidence, COUNT(*) as count
      FROM indicators_of_compromise
      GROUP BY ioc_type
      ORDER BY total_confidence DESC
