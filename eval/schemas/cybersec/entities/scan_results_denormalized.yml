use_cases:
  - 'WARNING: This is a denormalized/materialized table. Data may be stale or duplicate other tables'
  - Use for segmentation analysis by scan_type, asset_type, severity, status
  - Use for aggregation and trends on cvss_score, risk_level
  - Use for time-series analysis using scan_started_at, found_at
  - Join with scans, assets, organizations, vulnerabilities for cross-entity analysis
query_patterns:
  - description: ScanResultsDenormalized by scan_type
    sql: |-
      SELECT scan_type, COUNT(*) as count
      FROM scan_results_denormalized
      GROUP BY scan_type
      ORDER BY count DESC
  - description: ScanResultsDenormalized by asset_type
    sql: |-
      SELECT asset_type, COUNT(*) as count
      FROM scan_results_denormalized
      GROUP BY asset_type
      ORDER BY count DESC
  - description: Total cvss_score by scan_type
    sql: |-
      SELECT scan_type, SUM(cvss_score) as total_cvss_score, COUNT(*) as count
      FROM scan_results_denormalized
      GROUP BY scan_type
      ORDER BY total_cvss_score DESC
profiler_notes:
  - 'Possibly denormalized/materialized table: name matches reporting pattern. Data may duplicate other tables'
