id: "cs-020"
question: "What is the scan success rate by organization over the last quarter?"
schema: cybersec
difficulty: medium
category: join
tags: [scans, organizations, success-rate]
gold_sql: |
  SELECT
    o.name AS organization,
    COUNT(*) AS total_scans,
    COUNT(*) FILTER (WHERE s.status = 'completed') AS completed_scans,
    ROUND(COUNT(*) FILTER (WHERE s.status = 'completed')::numeric / COUNT(*) * 100, 1) AS success_rate_pct
  FROM scans s
  JOIN organizations o ON s.org_id = o.id
  WHERE s.started_at >= NOW() - INTERVAL '3 months'
  GROUP BY o.name
  ORDER BY success_rate_pct DESC
expected_rows: null
notes: "Tests FILTER with ratio calculation for operational metrics"
