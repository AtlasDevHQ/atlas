    sql: id
    type: count_distinct
joins:
  - target_entity: Customers
    relationship: many_to_one
    join_columns:
      from: customer_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name customer_id
    description: Each utm_tracking likely belongs to one customer
  - target_entity: Orders
    relationship: many_to_one
    join_columns:
      from: order_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name order_id
    description: Each utm_tracking likely belongs to one order
use_cases:
  - Use for segmentation analysis by utm_source, utm_medium, utm_campaign, utm_content, landing_page
  - Use for time-series analysis using created_at
  - Join with customers, orders for cross-entity analysis
query_patterns:
  - description: UtmTracking by utm_source
    sql: |-
      SELECT utm_source, COUNT(*) as count
      FROM utm_tracking
      GROUP BY utm_source
      ORDER BY count DESC
  - description: UtmTracking by utm_medium
    sql: |-
      SELECT utm_medium, COUNT(*) as count
      FROM utm_tracking
      GROUP BY utm_medium
      ORDER BY count DESC
