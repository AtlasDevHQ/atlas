    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 3000
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 200
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: subscription_id
    sql: subscription_id
    type: number
    description: Foreign key to subscriptions
    unique_count: 250
    sample_values:
