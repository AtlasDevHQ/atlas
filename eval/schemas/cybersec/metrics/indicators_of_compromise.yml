metrics:
  - id: indicators_of_compromise_count
    label: Total IndicatorsOfCompromise
    description: Count of distinct indicators_of_compromise records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM indicators_of_compromise
    aggregation: count_distinct
  - id: total_confidence
    label: Total confidence
    description: Sum of confidence across all indicators_of_compromise.
    type: atomic
    source:
      entity: IndicatorsOfCompromise
      measure: total_confidence
    sql: |-
      SELECT SUM(confidence) as total_confidence
      FROM indicators_of_compromise
    aggregation: sum
    objective: maximize
  - id: avg_confidence
    label: Average confidence
    description: Average confidence per indicators_of_compromise.
    type: atomic
    sql: |-
      SELECT AVG(confidence) as avg_confidence
      FROM indicators_of_compromise
    aggregation: avg
  - id: confidence_by_ioc_type
    label: confidence by ioc_type
    description: confidence broken down by ioc_type.
    type: atomic
    sql: |-
      SELECT ioc_type, SUM(confidence) as total_confidence, AVG(confidence) as avg_confidence, COUNT(*) as count
      FROM indicators_of_compromise
      GROUP BY ioc_type
      ORDER BY total_confidence DESC
