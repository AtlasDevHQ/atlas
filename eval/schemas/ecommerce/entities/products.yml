      - Tue Mar 03 2026 13:37:39 GMT-0500 (Eastern Standard Time)
  - name: price_bucket
    sql: |-
      CASE
        WHEN price < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY price) FROM products) THEN 'Low'
        WHEN price < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY price) FROM products) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: price bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: price_cents_bucket
    sql: |-
      CASE
        WHEN price_cents < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY price_cents) FROM products) THEN 'Low'
        WHEN price_cents < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY price_cents) FROM products) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: price cents bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
  - name: updated_at_year
    sql: EXTRACT(YEAR FROM updated_at)
    type: number
    description: Year extracted from updated_at
    virtual: true
  - name: updated_at_month
    sql: TO_CHAR(updated_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from updated_at
    virtual: true
measures:
  - name: product_count
    sql: id
    type: count_distinct
  - name: total_price
    sql: price
    type: sum
    description: Sum of price
  - name: avg_price
    sql: price
    type: avg
    description: Average price
  - name: total_price_cents
    sql: price_cents
    type: sum
    description: Sum of price cents
  - name: avg_price_cents
    sql: price_cents
    type: avg
    description: Average price cents
joins:
  - target_entity: Categories
    relationship: many_to_one
    join_columns:
      from: category_id
      to: id
    description: Each product belongs to one category
  - target_entity: Sellers
    relationship: many_to_one
    join_columns:
      from: seller_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name seller_id
    description: Each product likely belongs to one seller
use_cases:
  - Use for segmentation analysis by status
  - Use for aggregation and trends on price, price_cents
  - Use for time-series analysis using created_at, updated_at
  - Join with categories, sellers for cross-entity analysis
  - >-
    Avoid for row-level
    cart_events/product_images/product_performance_cache/product_reviews/product_tags/product_variants queries — use
    those entities directly
query_patterns:
  - description: Products by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM products
      GROUP BY status
      ORDER BY count DESC
  - description: Total price by status
    sql: |-
      SELECT status, SUM(price) as total_price, COUNT(*) as count
      FROM products
      GROUP BY status
      ORDER BY total_price DESC
