  - Join with customers for cross-entity analysis
query_patterns:
  - description: PageViews by referrer
    sql: |-
      SELECT referrer, COUNT(*) as count
      FROM page_views
      GROUP BY referrer
      ORDER BY count DESC
  - description: PageViews by device_type
    sql: |-
      SELECT device_type, COUNT(*) as count
      FROM page_views
      GROUP BY device_type
      ORDER BY count DESC
