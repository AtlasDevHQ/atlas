name: ReturnItems
type: fact_table
table: return_items
grain: one row per return item record
description: Auto-profiled schema for return_items (4,500 rows). Contains 5 columns, linked to returns, order_items.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 4500
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: return_id
    sql: return_id
    type: number
    description: Foreign key to returns
    unique_count: 2320
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '7'
      - '9'
      - '10'
      - '11'
  - name: order_item_id
    sql: order_item_id
    type: number
    unique_count: 4327
    sample_values:
      - '3'
      - '19'
      - '21'
      - '26'
      - '53'
      - '91'
      - '95'
      - '107'
    profiler_notes:
      - Likely FK to order_items.id (inferred from column name, no constraint exists)
  - name: quantity
    sql: quantity
    type: number
    unique_count: 1
    sample_values:
      - '1'
  - name: condition
    sql: condition
    type: string
    unique_count: 4
    sample_values:
      - damaged
      - defective
      - opened
      - unopened
  - name: quantity_bucket
    sql: |-
      CASE
        WHEN quantity < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY quantity) FROM return_items) THEN 'Low'
        WHEN quantity < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY quantity) FROM return_items) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: quantity bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
measures:
  - name: return_item_count
    sql: id
    type: count_distinct
  - name: total_quantity
    sql: quantity
    type: sum
    description: Sum of quantity
  - name: avg_quantity
    sql: quantity
    type: avg
    description: Average quantity
joins:
  - target_entity: Returns
    relationship: many_to_one
    join_columns:
      from: return_id
      to: id
    description: Each return_item belongs to one return
  - target_entity: OrderItems
    relationship: many_to_one
    join_columns:
      from: order_item_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name order_item_id
    description: Each return_item likely belongs to one order_item
use_cases:
  - Use for segmentation analysis by condition
  - Use for aggregation and trends on quantity
  - Join with returns, order_items for cross-entity analysis
query_patterns:
  - description: ReturnItems by condition
    sql: |-
      SELECT condition, COUNT(*) as count
      FROM return_items
      GROUP BY condition
      ORDER BY count DESC
  - description: Total quantity by condition
    sql: |-
      SELECT condition, SUM(quantity) as total_quantity, COUNT(*) as count
      FROM return_items
      GROUP BY condition
      ORDER BY total_quantity DESC
