measures:
  - name: order_count
    sql: id
    type: count_distinct
  - name: total_subtotal_cents
    sql: subtotal_cents
    type: sum
    description: Sum of subtotal cents
  - name: avg_subtotal_cents
    sql: subtotal_cents
    type: avg
    description: Average subtotal cents
  - name: total_shipping_cost
    sql: shipping_cost
    type: sum
    description: Sum of shipping cost
  - name: avg_shipping_cost
    sql: shipping_cost
    type: avg
    description: Average shipping cost
  - name: total_tax_cents
    sql: tax_cents
    type: sum
    description: Sum of tax cents
  - name: avg_tax_cents
    sql: tax_cents
    type: avg
    description: Average tax cents
  - name: total_total_cents
    sql: total_cents
    type: sum
    description: Sum of total cents
  - name: avg_total_cents
    sql: total_cents
    type: avg
    description: Average total cents
joins:
  - target_entity: Customers
    relationship: many_to_one
    join_columns:
      from: customer_id
      to: id
    description: Each order belongs to one customer
  - target_entity: Promotions
    relationship: many_to_one
    join_columns:
      from: promotion_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name promotion_id
    description: Each order likely belongs to one promotion
use_cases:
  - Use for segmentation analysis by status
  - Use for aggregation and trends on subtotal_cents, shipping_cost, tax_cents, total_cents
  - Use for time-series analysis using created_at, updated_at
  - Join with customers, promotions for cross-entity analysis
  - >-
    Avoid for row-level
    gift_card_transactions/loyalty_transactions/order_events/order_items/orders_denormalized/payments/promotion_usages/returns/shipments/utm_tracking
    queries — use those entities directly
query_patterns:
  - description: Orders by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM orders
      GROUP BY status
      ORDER BY count DESC
  - description: Total subtotal_cents by status
    sql: |-
      SELECT status, SUM(subtotal_cents) as total_subtotal_cents, COUNT(*) as count
      FROM orders
      GROUP BY status
      ORDER BY total_subtotal_cents DESC
