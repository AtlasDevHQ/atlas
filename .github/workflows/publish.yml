name: Publish @useatlas packages

on:
  push:
    tags:
      - 'create-v*'
      - 'create-plugin-v*'
      - 'sdk-v*'
      - 'plugin-sdk-v*'
      # Plugins — datasource
      - 'clickhouse-v*'
      - 'snowflake-v*'
      - 'duckdb-v*'
      - 'mysql-v*'
      - 'salesforce-v*'
      # Plugins — sandbox
      - 'e2b-v*'
      - 'daytona-v*'
      - 'nsjail-v*'
      - 'sidecar-v*'
      - 'vercel-sandbox-v*'
      # Plugins — interaction
      - 'slack-v*'
      # mcp-v* excluded — @useatlas/mcp depends on unpublished @atlas/mcp
      # Plugins — action
      - 'email-v*'
      - 'jira-v*'
      # Plugins — context
      - 'yaml-context-v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile

      - name: Publish @useatlas/create
        if: startsWith(github.ref, 'refs/tags/create-v')
        run: cd create-atlas && npm publish --access public

      - name: Publish @useatlas/create-plugin
        if: startsWith(github.ref, 'refs/tags/create-plugin-v')
        run: cd create-atlas-plugin && npm publish --access public

      - name: Build, test, and publish @useatlas/sdk
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        run: cd packages/sdk && bun run build && bun run test && npm publish --access public

      - name: Build, test, and publish @useatlas/plugin-sdk
        if: startsWith(github.ref, 'refs/tags/plugin-sdk-v')
        run: cd packages/plugin-sdk && bun run build && bun run test && npm publish --access public

      # Plugins — tests run from workspace root so bun resolves workspace:* deps
      # Datasource
      - name: Test and publish @useatlas/clickhouse
        if: startsWith(github.ref, 'refs/tags/clickhouse-v')
        run: bun test plugins/clickhouse && cd plugins/clickhouse && npm publish --access public

      - name: Test and publish @useatlas/snowflake
        if: startsWith(github.ref, 'refs/tags/snowflake-v')
        run: bun test plugins/snowflake && cd plugins/snowflake && npm publish --access public

      - name: Test and publish @useatlas/duckdb
        if: startsWith(github.ref, 'refs/tags/duckdb-v')
        run: bun test plugins/duckdb && cd plugins/duckdb && npm publish --access public

      - name: Test and publish @useatlas/mysql
        if: startsWith(github.ref, 'refs/tags/mysql-v')
        run: bun test plugins/mysql && cd plugins/mysql && npm publish --access public

      - name: Test and publish @useatlas/salesforce
        if: startsWith(github.ref, 'refs/tags/salesforce-v')
        run: bun test plugins/salesforce && cd plugins/salesforce && npm publish --access public

      # Sandbox
      - name: Test and publish @useatlas/e2b
        if: startsWith(github.ref, 'refs/tags/e2b-v')
        run: bun test plugins/e2b && cd plugins/e2b && npm publish --access public

      - name: Test and publish @useatlas/daytona
        if: startsWith(github.ref, 'refs/tags/daytona-v')
        run: bun test plugins/daytona && cd plugins/daytona && npm publish --access public

      - name: Test and publish @useatlas/nsjail
        if: startsWith(github.ref, 'refs/tags/nsjail-v')
        run: bun test plugins/nsjail && cd plugins/nsjail && npm publish --access public

      - name: Test and publish @useatlas/sidecar
        if: startsWith(github.ref, 'refs/tags/sidecar-v')
        run: bun test plugins/sidecar && cd plugins/sidecar && npm publish --access public

      - name: Test and publish @useatlas/vercel-sandbox
        if: startsWith(github.ref, 'refs/tags/vercel-sandbox-v')
        run: bun test plugins/vercel-sandbox && cd plugins/vercel-sandbox && npm publish --access public

      # Interaction
      - name: Test and publish @useatlas/slack
        if: startsWith(github.ref, 'refs/tags/slack-v')
        run: bun test plugins/slack && cd plugins/slack && npm publish --access public

      # @useatlas/mcp excluded — depends on unpublished @atlas/mcp (see #128)

      # Action
      - name: Test and publish @useatlas/email
        if: startsWith(github.ref, 'refs/tags/email-v')
        run: bun test plugins/email && cd plugins/email && npm publish --access public

      - name: Test and publish @useatlas/jira
        if: startsWith(github.ref, 'refs/tags/jira-v')
        run: bun test plugins/jira && cd plugins/jira && npm publish --access public

      # Context
      - name: Test and publish @useatlas/yaml-context
        if: startsWith(github.ref, 'refs/tags/yaml-context-v')
        run: bun test plugins/yaml-context && cd plugins/yaml-context && npm publish --access public
