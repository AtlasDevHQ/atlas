      - '{"ip":"10.0.0.130"}'
      - '{"ip":"10.0.0.136"}'
      - '{"ip":"10.0.0.211"}'
      - '{"ip":"10.0.0.26"}'
      - '{"ip":"10.0.0.59"}'
      - '{"ip":"10.0.0.79"}'
      - '{"ip":"10.0.0.98"}'
  - name: ip_address
    sql: ip_address
    type: string
    unique_count: 9311
    sample_values:
      - 10.0.0.101
      - 10.0.0.106
      - 10.0.0.112
      - 10.0.0.117
      - 10.0.0.124
      - 10.0.0.125
      - 10.0.0.126
      - 10.0.0.131
  - name: created_at
    sql: created_at
    type: date
    unique_count: 10000
    sample_values:
      - Wed Apr 08 2020 01:38:12 GMT-0400 (Eastern Daylight Time)
      - Wed Jun 03 2020 15:06:04 GMT-0400 (Eastern Daylight Time)
      - Mon Jun 29 2020 04:39:43 GMT-0400 (Eastern Daylight Time)
      - Wed Jul 15 2020 05:30:45 GMT-0400 (Eastern Daylight Time)
      - Tue Aug 11 2020 12:00:54 GMT-0400 (Eastern Daylight Time)
      - Thu Aug 13 2020 11:27:19 GMT-0400 (Eastern Daylight Time)
      - Sun Aug 30 2020 07:23:22 GMT-0400 (Eastern Daylight Time)
      - Mon Sep 14 2020 12:18:05 GMT-0400 (Eastern Daylight Time)
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: admin_audit_log_count
    sql: id
    type: count_distinct
joins:
  - target_entity: AdminUsers
    relationship: many_to_one
    join_columns:
      from: admin_user_id
      to: id
    description: Each admin_audit_log belongs to one admin_user
use_cases:
  - Use for segmentation analysis by action, resource_type
  - Use for time-series analysis using created_at
  - Join with admin_users for cross-entity analysis
query_patterns:
  - description: AdminAuditLog by action
    sql: |-
      SELECT action, COUNT(*) as count
      FROM admin_audit_log
      GROUP BY action
      ORDER BY count DESC
  - description: AdminAuditLog by resource_type
    sql: |-
      SELECT resource_type, COUNT(*) as count
      FROM admin_audit_log
      GROUP BY resource_type
      ORDER BY count DESC
