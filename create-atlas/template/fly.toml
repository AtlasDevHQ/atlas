# Deploy Atlas on Fly.io
#
# Quick start:
#   fly launch --no-deploy
#   fly secrets set DATABASE_URL="postgresql://..." ANTHROPIC_API_KEY="sk-ant-..."
#   fly deploy
#
# Attach Fly Postgres instead of an external DB (name is a suggestion):
#   fly postgres create --name %PROJECT_NAME%-db
#   fly postgres attach %PROJECT_NAME%-db

app = "%PROJECT_NAME%"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  HOSTNAME = "0.0.0.0"
  ATLAS_PROVIDER = "anthropic"
  # Secrets (set via `fly secrets set`):
  #   DATABASE_URL
  #   ANTHROPIC_API_KEY (or OPENAI_API_KEY, etc.)

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[http_service.concurrency]
  type = "requests"
  hard_limit = 250
  soft_limit = 200

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
