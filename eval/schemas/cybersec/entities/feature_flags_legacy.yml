  - name: rollout_percentage_bucket
    sql: |-
      CASE
        WHEN rollout_percentage < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY rollout_percentage) FROM feature_flags_legacy) THEN 'Low'
        WHEN rollout_percentage < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY rollout_percentage) FROM feature_flags_legacy) THEN 'Medium'
