id: "cs-003"
question: "How many active organizations are there per industry?"
schema: cybersec
difficulty: simple
category: aggregation
tags: [organizations, industry, count]
gold_sql: |
  SELECT industry, COUNT(*) AS org_count
  FROM organizations
  WHERE is_active = true
  GROUP BY industry
  ORDER BY org_count DESC
expected_rows: null
notes: "Basic GROUP BY with boolean filter"
