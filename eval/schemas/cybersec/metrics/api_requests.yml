metrics:
  - id: api_requests_count
    label: Total ApiRequests
    description: Count of distinct api_requests records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM api_requests
    aggregation: count_distinct
  - id: total_status_code
    label: Total status code
    description: Sum of status_code across all api_requests.
    type: atomic
    source:
      entity: ApiRequests
      measure: total_status_code
    sql: |-
      SELECT SUM(status_code) as total_status_code
      FROM api_requests
    aggregation: sum
    objective: maximize
  - id: avg_status_code
    label: Average status code
    description: Average status_code per api_request.
    type: atomic
    sql: |-
      SELECT AVG(status_code) as avg_status_code
      FROM api_requests
    aggregation: avg
  - id: status_code_by_method
    label: status code by method
    description: status_code broken down by method.
    type: atomic
    sql: |-
      SELECT method, SUM(status_code) as total_status_code, AVG(status_code) as avg_status_code, COUNT(*) as count
      FROM api_requests
      GROUP BY method
      ORDER BY total_status_code DESC
  - id: total_response_time_ms
    label: Total response time ms
    description: Sum of response_time_ms across all api_requests.
    type: atomic
    source:
      entity: ApiRequests
      measure: total_response_time_ms
    sql: |-
      SELECT SUM(response_time_ms) as total_response_time_ms
      FROM api_requests
    aggregation: sum
    objective: maximize
  - id: avg_response_time_ms
    label: Average response time ms
    description: Average response_time_ms per api_request.
    type: atomic
    sql: |-
      SELECT AVG(response_time_ms) as avg_response_time_ms
      FROM api_requests
    aggregation: avg
  - id: response_time_ms_by_method
    label: response time ms by method
    description: response_time_ms broken down by method.
    type: atomic
    sql: >-
      SELECT method, SUM(response_time_ms) as total_response_time_ms, AVG(response_time_ms) as avg_response_time_ms,
      COUNT(*) as count

      FROM api_requests

      GROUP BY method

      ORDER BY total_response_time_ms DESC
