  - Join with customers for cross-entity analysis
query_patterns:
  - description: CustomerAddresses by label
    sql: |-
      SELECT label, COUNT(*) as count
      FROM customer_addresses
      GROUP BY label
      ORDER BY count DESC
  - description: CustomerAddresses by state
    sql: |-
      SELECT state, COUNT(*) as count
      FROM customer_addresses
      GROUP BY state
      ORDER BY count DESC
