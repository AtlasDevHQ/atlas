  - name: subtotal_cents_bucket
    sql: |-
      CASE
        WHEN subtotal_cents < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY subtotal_cents) FROM orders) THEN 'Low'
        WHEN subtotal_cents < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY subtotal_cents) FROM orders) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: subtotal cents bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: shipping_cost_bucket
