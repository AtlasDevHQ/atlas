  - name: value_bucket
    sql: |-
      CASE
        WHEN value < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY value) FROM promotions) THEN 'Low'
        WHEN value < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY value) FROM promotions) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: value bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: min_order_cents_bucket
    sql: |-
      CASE
        WHEN min_order_cents < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY min_order_cents) FROM promotions) THEN 'Low'
        WHEN min_order_cents < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY min_order_cents) FROM promotions) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: min order cents bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: max_uses_bucket
    sql: |-
      CASE
