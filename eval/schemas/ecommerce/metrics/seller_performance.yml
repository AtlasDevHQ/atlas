metrics:
  - id: seller_performance_count
    label: Total SellerPerformance
    description: Count of distinct seller_performance records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM seller_performance
    aggregation: count_distinct
  - id: total_total_orders
    label: Total total orders
    description: Sum of total_orders across all seller_performance.
    type: atomic
    source:
      entity: SellerPerformance
      measure: total_total_orders
    sql: |-
      SELECT SUM(total_orders) as total_total_orders
      FROM seller_performance
    aggregation: sum
    objective: maximize
  - id: avg_total_orders
    label: Average total orders
    description: Average total_orders per seller_performance.
    type: atomic
    sql: |-
      SELECT AVG(total_orders) as avg_total_orders
      FROM seller_performance
    aggregation: avg
  - id: total_total_revenue_cents
