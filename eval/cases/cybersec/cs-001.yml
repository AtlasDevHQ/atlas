id: "cs-001"
question: "How many critical vulnerabilities are currently open?"
schema: cybersec
difficulty: simple
category: filter
tags: [vulnerabilities, vulnerability_instances, count, critical]
gold_sql: |
  SELECT COUNT(*) AS open_critical_vulns
  FROM vulnerability_instances vi
  JOIN vulnerabilities v ON vi.vulnerability_id = v.id
  WHERE v.severity = 'critical' AND vi.status = 'open'
expected_rows: 1
notes: "Tests basic filtering with a JOIN between vulnerabilities and their instances"
