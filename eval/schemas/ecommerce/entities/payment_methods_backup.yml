use_cases:
  - 'WARNING: This table appears to be abandoned/legacy. Verify with the user before querying'
  - Use for segmentation analysis by card_type
  - Use for aggregation and trends on exp_month, exp_year
  - Use for time-series analysis using created_date
query_patterns:
  - description: PaymentMethodsBackup by card_type
    sql: |-
      SELECT card_type, COUNT(*) as count
      FROM payment_methods_backup
      GROUP BY card_type
      ORDER BY count DESC
  - description: Total exp_month by card_type
    sql: |-
      SELECT card_type, SUM(exp_month) as total_exp_month, COUNT(*) as count
      FROM payment_methods_backup
      GROUP BY card_type
      ORDER BY total_exp_month DESC
