measures:
  - name: order_event_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Orders
    relationship: many_to_one
    join_columns:
      from: order_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name order_id
    description: Each order_event likely belongs to one order
use_cases:
  - Use for segmentation analysis by event_type, description
  - Use for time-series analysis using created_at
  - Join with orders for cross-entity analysis
query_patterns:
  - description: OrderEvents by event_type
    sql: |-
      SELECT event_type, COUNT(*) as count
      FROM order_events
      GROUP BY event_type
      ORDER BY count DESC
  - description: OrderEvents by description
    sql: |-
      SELECT description, COUNT(*) as count
      FROM order_events
      GROUP BY description
      ORDER BY count DESC
