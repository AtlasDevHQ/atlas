name: ScanConfigurations
type: fact_table
table: scan_configurations
grain: one row per scan configuration record
description: Auto-profiled schema for scan_configurations (100 rows). Contains 8 columns, linked to organizations.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 100
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 79
    sample_values:
      - '5'
      - '6'
      - '8'
      - '9'
      - '11'
      - '12'
      - '13'
      - '14'
  - name: name
    sql: name
    type: string
    unique_count: 100
    sample_values:
      - Compliance Scan - Config 100
      - Compliance Scan - Config 15
      - Compliance Scan - Config 19
      - Compliance Scan - Config 22
      - Compliance Scan - Config 26
      - Compliance Scan - Config 28
      - Compliance Scan - Config 3
      - Compliance Scan - Config 32
  - name: scan_type
    sql: scan_type
    type: string
    unique_count: 4
    sample_values:
      - compliance
      - full
      - quick
      - targeted
  - name: target_spec
    sql: target_spec
    type: string
    unique_count: 87
    sample_values:
      - 192.168.100.0/24
      - 192.168.105.0/24
      - 192.168.106.0/24
      - 192.168.109.0/24
      - 192.168.11.0/24
      - 192.168.111.0/24
      - 192.168.113.0/24
      - 192.168.114.0/24
  - name: schedule
    sql: schedule
    type: string
    unique_count: 4
    sample_values:
      - 0 */6 * * *
      - 0 0 1 * *
      - 0 2 * * *
      - 0 3 * * 0
  - name: is_active
    sql: is_active
    type: boolean
    unique_count: 2
    sample_values:
      - 'false'
      - 'true'
  - name: created_at
    sql: created_at
    type: date
    unique_count: 100
    sample_values:
      - Wed Jan 22 2020 22:26:55 GMT-0500 (Eastern Standard Time)
      - Sun Feb 16 2020 12:09:40 GMT-0500 (Eastern Standard Time)
      - Sun Feb 23 2020 23:12:06 GMT-0500 (Eastern Standard Time)
      - Mon Mar 02 2020 15:29:54 GMT-0500 (Eastern Standard Time)
      - Fri Mar 06 2020 20:31:03 GMT-0500 (Eastern Standard Time)
      - Sun Mar 15 2020 10:06:17 GMT-0400 (Eastern Daylight Time)
      - Sun Mar 29 2020 19:21:03 GMT-0400 (Eastern Daylight Time)
      - Wed Apr 15 2020 04:36:22 GMT-0400 (Eastern Daylight Time)
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: scan_configuration_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each scan_configuration belongs to one organization
use_cases:
  - Use for segmentation analysis by scan_type, schedule
  - Use for time-series analysis using created_at
  - Join with organizations for cross-entity analysis
  - Avoid for row-level scans queries — use those entities directly
query_patterns:
  - description: ScanConfigurations by scan_type
    sql: |-
      SELECT scan_type, COUNT(*) as count
      FROM scan_configurations
      GROUP BY scan_type
      ORDER BY count DESC
  - description: ScanConfigurations by schedule
    sql: |-
      SELECT schedule, COUNT(*) as count
      FROM scan_configurations
      GROUP BY schedule
      ORDER BY count DESC
