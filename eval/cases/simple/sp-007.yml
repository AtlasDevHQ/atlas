id: "sp-007"
question: "Show the seniority distribution across all departments"
schema: simple
difficulty: medium
category: aggregation
tags: [people, seniority, department, crosstab]
gold_sql: |
  SELECT
    department,
    COUNT(*) FILTER (WHERE seniority = 'Junior') AS junior,
    COUNT(*) FILTER (WHERE seniority = 'Mid') AS mid,
    COUNT(*) FILTER (WHERE seniority = 'Senior') AS senior,
    COUNT(*) FILTER (WHERE seniority = 'Executive') AS executive,
    COUNT(*) AS total
  FROM people
  GROUP BY department
  ORDER BY total DESC
expected_rows: 6
notes: "Tests pivot-style aggregation using FILTER clauses"
