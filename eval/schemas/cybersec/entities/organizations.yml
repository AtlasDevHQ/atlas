measures:
  - name: organization_count
    sql: id
    type: count_distinct
use_cases:
  - Use for segmentation analysis by size_tier
  - Use for time-series analysis using created_at, updated_at
  - >-
    Avoid for row-level
    alert_rules/alerts/api_keys/asset_groups/assets/audit_log/compliance_assessments/daily_scan_stats/dashboards/executive_dashboard_cache/feature_usage/incidents/integrations/invitations/invoices/monthly_vulnerability_summary/notifications/organization_health_scores/organization_settings/payment_methods/reports/scan_configurations/scan_results_denormalized/scans/subscriptions/teams/users/vulnerability_exceptions
    queries — use those entities directly
query_patterns:
  - description: Organizations by size_tier
    sql: |-
      SELECT size_tier, COUNT(*) as count
      FROM organizations
      GROUP BY size_tier
      ORDER BY count DESC
