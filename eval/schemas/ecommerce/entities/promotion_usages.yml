      - '2000'
      - '2500'
      - '3000'
      - '5000'
  - name: created_at
    sql: created_at
    type: date
    unique_count: 8000
    sample_values:
      - Mon Jun 22 2020 09:11:28 GMT-0400 (Eastern Daylight Time)
      - Wed Jun 24 2020 01:05:01 GMT-0400 (Eastern Daylight Time)
      - Fri Jun 26 2020 11:55:37 GMT-0400 (Eastern Daylight Time)
      - Wed Jul 01 2020 14:21:30 GMT-0400 (Eastern Daylight Time)
      - Thu Jul 16 2020 19:35:13 GMT-0400 (Eastern Daylight Time)
      - Sun Jul 19 2020 09:03:09 GMT-0400 (Eastern Daylight Time)
