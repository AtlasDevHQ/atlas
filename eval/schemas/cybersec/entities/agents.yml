measures:
  - name: agent_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Assets
    relationship: many_to_one
    join_columns:
      from: asset_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name asset_id
    description: Each agent likely belongs to one asset
use_cases:
  - Use for segmentation analysis by agent_version, status
  - Use for time-series analysis using last_heartbeat, installed_at, created_at
  - Join with assets for cross-entity analysis
  - Avoid for row-level agent_heartbeats queries — use those entities directly
query_patterns:
  - description: Agents by agent_version
    sql: |-
      SELECT agent_version, COUNT(*) as count
      FROM agents
      GROUP BY agent_version
      ORDER BY count DESC
  - description: Agents by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM agents
      GROUP BY status
      ORDER BY count DESC
