version: '1.0'
entities:
  - name: Accounts
    file: entities/accounts.yml
    grain: one row per account record
    description: accounts (80 rows, 7 columns)
    use_for:
      - Segmentation by plan, status
      - Aggregation on monthly_value
      - Cross-entity analysis via companies
    common_questions:
      - How many accounts by plan?
      - How many accounts by status?
      - What is the average monthly_value across accounts?
      - How are accounts distributed across companies?
  - name: AdminAuditLog
    file: entities/admin_audit_log.yml
    grain: one row per admin audit log record
    description: admin_audit_log (10,000 rows, 8 columns)
    use_for:
      - Segmentation by action, resource_type
      - Cross-entity analysis via admin_users
    common_questions:
      - How many admin_audit_log by action?
      - How many admin_audit_log by resource_type?
      - How are admin_audit_log distributed across admin_users?
