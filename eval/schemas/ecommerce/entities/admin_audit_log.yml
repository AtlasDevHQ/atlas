name: AdminAuditLog
type: fact_table
table: admin_audit_log
grain: one row per admin audit log record
description: Auto-profiled schema for admin_audit_log (10,000 rows). Contains 8 columns, linked to admin_users.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 10000
    sample_values:
      - '1'
