metrics:
  - id: product_performance_cache_count
    label: Total ProductPerformanceCache
    description: Count of distinct product_performance_cache records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM product_performance_cache
    aggregation: count_distinct
  - id: total_total_sold
    label: Total total sold
    description: Sum of total_sold across all product_performance_cache.
    type: atomic
    source:
      entity: ProductPerformanceCache
      measure: total_total_sold
    sql: |-
      SELECT SUM(total_sold) as total_total_sold
      FROM product_performance_cache
    aggregation: sum
    objective: maximize
  - id: avg_total_sold
    label: Average total sold
    description: Average total_sold per product_performance_cache.
    type: atomic
    sql: |-
      SELECT AVG(total_sold) as avg_total_sold
      FROM product_performance_cache
    aggregation: avg
