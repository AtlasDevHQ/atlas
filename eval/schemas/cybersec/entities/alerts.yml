measures:
  - name: alert_count
    sql: id
    type: count_distinct
joins:
  - target_entity: AlertRules
    relationship: many_to_one
    join_columns:
      from: alert_rule_id
      to: id
    description: Each alert belongs to one alert_rule
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each alert belongs to one organization
  - target_entity: Incidents
    relationship: many_to_one
    join_columns:
      from: incident_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name incident_id
    description: Each alert likely belongs to one incident
use_cases:
  - Use for segmentation analysis by severity, title, status, source
  - Use for time-series analysis using created_at, acknowledged_at
  - Join with alert_rules, organizations, incidents for cross-entity analysis
  - Avoid for row-level alert_acknowledgments queries — use those entities directly
query_patterns:
  - description: Alerts by severity
    sql: |-
      SELECT severity, COUNT(*) as count
      FROM alerts
      GROUP BY severity
      ORDER BY count DESC
  - description: Alerts by title
    sql: |-
      SELECT title, COUNT(*) as count
      FROM alerts
      GROUP BY title
      ORDER BY count DESC
