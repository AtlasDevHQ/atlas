name: Notifications
type: fact_table
table: notifications
grain: one row per notification record
description: Auto-profiled schema for notifications (5,000 rows). Contains 8 columns, linked to organizations, users.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 5000
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: user_id
    sql: user_id
    type: number
    description: Foreign key to users
    unique_count: 1839
    sample_values:
      - '1'
      - '2'
      - '3'
      - '5'
      - '6'
      - '7'
      - '8'
      - '9'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 200
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: type
    sql: type
    type: string
    unique_count: 7
    sample_values:
      - alert
      - billing
      - compliance
      - incident
      - report_ready
      - scan_complete
      - system
  - name: title
    sql: title
    type: string
    unique_count: 10
    sample_values:
      - Agent offline
      - Compliance assessment due
      - Incident assigned to you
      - Invoice generated
      - New critical alert
      - New vulnerability detected
      - Password expiring soon
      - Scan completed
      - System maintenance scheduled
      - Weekly report ready
  - name: message
    sql: message
    type: string
    unique_count: 1
    sample_values:
      - Please review and take appropriate action.
  - name: is_read
    sql: is_read
    type: boolean
    unique_count: 2
    sample_values:
      - 'false'
      - 'true'
  - name: created_at
    sql: created_at
    type: date
    unique_count: 5000
    sample_values:
      - Sun Aug 29 2021 05:07:18 GMT-0400 (Eastern Daylight Time)
      - Fri Oct 01 2021 08:51:10 GMT-0400 (Eastern Daylight Time)
      - Fri Oct 01 2021 15:14:29 GMT-0400 (Eastern Daylight Time)
      - Mon Oct 18 2021 08:58:45 GMT-0400 (Eastern Daylight Time)
      - Sun Oct 31 2021 12:12:02 GMT-0400 (Eastern Daylight Time)
      - Fri Nov 12 2021 05:54:52 GMT-0500 (Eastern Standard Time)
      - Mon Nov 15 2021 16:44:17 GMT-0500 (Eastern Standard Time)
      - Tue Nov 30 2021 17:25:57 GMT-0500 (Eastern Standard Time)
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: notification_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each notification belongs to one organization
  - target_entity: Users
    relationship: many_to_one
    join_columns:
      from: user_id
      to: id
    description: Each notification belongs to one user
use_cases:
  - Use for segmentation analysis by type, title, message
  - Use for time-series analysis using created_at
  - Join with organizations, users for cross-entity analysis
query_patterns:
  - description: Notifications by type
    sql: |-
      SELECT type, COUNT(*) as count
      FROM notifications
      GROUP BY type
      ORDER BY count DESC
  - description: Notifications by title
    sql: |-
      SELECT title, COUNT(*) as count
      FROM notifications
      GROUP BY title
      ORDER BY count DESC
