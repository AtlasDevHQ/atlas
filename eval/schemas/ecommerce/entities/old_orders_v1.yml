  - name: order_total_bucket
    sql: |-
      CASE
        WHEN order_total < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY order_total) FROM old_orders_v1) THEN 'Low'
        WHEN order_total < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY order_total) FROM old_orders_v1) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: order total bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
