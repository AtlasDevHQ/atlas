id: "cs-004"
question: "Which organizations have the most unresolved incidents?"
schema: cybersec
difficulty: simple
category: join
tags: [incidents, organizations, unresolved]
gold_sql: |
  SELECT
    o.name AS organization,
    COUNT(*) AS open_incidents
  FROM incidents i
  JOIN organizations o ON i.org_id = o.id
  WHERE i.status NOT IN ('resolved', 'closed')
  GROUP BY o.name
  ORDER BY open_incidents DESC
expected_rows: null
notes: "Tests JOIN with NOT IN filter and GROUP BY"
