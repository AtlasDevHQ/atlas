name: ComplianceAssessments
type: fact_table
table: compliance_assessments
grain: one row per compliance assessment record
description: >-
  Auto-profiled schema for compliance_assessments (600 rows). Contains 8 columns, linked to compliance_frameworks,
  organizations.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 600
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 192
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: framework_id
    sql: framework_id
    type: number
    description: Foreign key to compliance_frameworks
    unique_count: 5
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
  - name: status
    sql: status
    type: string
    unique_count: 3
    sample_values:
      - completed
      - in_progress
      - scheduled
  - name: started_at
    sql: started_at
    type: date
    unique_count: 600
    sample_values:
      - Mon Aug 24 2020 05:02:29 GMT-0400 (Eastern Daylight Time)
      - Sun Oct 04 2020 17:57:20 GMT-0400 (Eastern Daylight Time)
      - Sun Nov 15 2020 21:57:52 GMT-0500 (Eastern Standard Time)
      - Sun Dec 06 2020 06:24:52 GMT-0500 (Eastern Standard Time)
      - Sun Dec 06 2020 10:54:33 GMT-0500 (Eastern Standard Time)
      - Thu Dec 10 2020 06:22:23 GMT-0500 (Eastern Standard Time)
      - Wed Dec 23 2020 04:41:15 GMT-0500 (Eastern Standard Time)
      - Thu Dec 31 2020 00:25:15 GMT-0500 (Eastern Standard Time)
  - name: completed_at
    sql: completed_at
    type: date
    unique_count: 451
    null_count: 149
    sample_values:
      - Sun Aug 30 2020 09:18:26 GMT-0400 (Eastern Daylight Time)
      - Wed Oct 14 2020 08:08:33 GMT-0400 (Eastern Daylight Time)
      - Wed Nov 18 2020 03:45:44 GMT-0500 (Eastern Standard Time)
      - Sat Dec 12 2020 17:31:29 GMT-0500 (Eastern Standard Time)
      - Sat Dec 19 2020 16:42:14 GMT-0500 (Eastern Standard Time)
      - Sat Dec 19 2020 23:55:42 GMT-0500 (Eastern Standard Time)
      - Sun Jan 03 2021 23:50:12 GMT-0500 (Eastern Standard Time)
      - Mon Jan 11 2021 13:44:51 GMT-0500 (Eastern Standard Time)
  - name: score
    sql: score
    type: number
    unique_count: 289
    null_count: 145
    sample_values:
      - '50.2'
      - '50.3'
      - '50.7'
      - '50.8'
      - '50.9'
      - '51'
      - '51.1'
      - '51.8'
  - name: created_at
    sql: created_at
    type: date
    unique_count: 600
    sample_values:
      - Mon Aug 24 2020 05:02:29 GMT-0400 (Eastern Daylight Time)
      - Sun Oct 04 2020 17:57:20 GMT-0400 (Eastern Daylight Time)
      - Sun Nov 15 2020 21:57:52 GMT-0500 (Eastern Standard Time)
      - Sun Dec 06 2020 06:24:52 GMT-0500 (Eastern Standard Time)
      - Sun Dec 06 2020 10:54:33 GMT-0500 (Eastern Standard Time)
      - Thu Dec 10 2020 06:22:23 GMT-0500 (Eastern Standard Time)
      - Wed Dec 23 2020 04:41:15 GMT-0500 (Eastern Standard Time)
      - Thu Dec 31 2020 00:25:15 GMT-0500 (Eastern Standard Time)
  - name: started_at_year
    sql: EXTRACT(YEAR FROM started_at)
    type: number
    description: Year extracted from started_at
    virtual: true
  - name: started_at_month
    sql: TO_CHAR(started_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from started_at
    virtual: true
  - name: completed_at_year
    sql: EXTRACT(YEAR FROM completed_at)
    type: number
    description: Year extracted from completed_at
    virtual: true
  - name: completed_at_month
    sql: TO_CHAR(completed_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from completed_at
    virtual: true
  - name: score_bucket
    sql: |-
      CASE
        WHEN score < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY score) FROM compliance_assessments) THEN 'Low'
        WHEN score < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY score) FROM compliance_assessments) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: score bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: compliance_assessment_count
    sql: id
    type: count_distinct
  - name: total_score
    sql: score
    type: sum
    description: Sum of score
  - name: avg_score
    sql: score
    type: avg
    description: Average score
joins:
  - target_entity: ComplianceFrameworks
    relationship: many_to_one
    join_columns:
      from: framework_id
      to: id
    description: Each compliance_assessment belongs to one compliance_framework
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each compliance_assessment belongs to one organization
use_cases:
  - Use for segmentation analysis by status
  - Use for aggregation and trends on score
  - Use for time-series analysis using started_at, completed_at, created_at
  - Join with compliance_frameworks, organizations for cross-entity analysis
  - Avoid for row-level compliance_findings queries — use those entities directly
query_patterns:
  - description: ComplianceAssessments by status
    sql: |-
      SELECT status, COUNT(*) as count
      FROM compliance_assessments
      GROUP BY status
      ORDER BY count DESC
  - description: Total score by status
    sql: |-
      SELECT status, SUM(score) as total_score, COUNT(*) as count
      FROM compliance_assessments
      GROUP BY status
      ORDER BY total_score DESC
