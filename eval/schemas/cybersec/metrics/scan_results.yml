metrics:
  - id: scan_results_count
    label: Total ScanResults
    description: Count of distinct scan_results records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM scan_results
    aggregation: count_distinct
  - id: total_risk_level
    label: Total risk level
    description: Sum of risk_level across all scan_results.
    type: atomic
    source:
      entity: ScanResults
      measure: total_risk_level
    sql: |-
      SELECT SUM(risk_level) as total_risk_level
      FROM scan_results
    aggregation: sum
    objective: maximize
  - id: avg_risk_level
    label: Average risk level
    description: Average risk_level per scan_result.
    type: atomic
    sql: |-
      SELECT AVG(risk_level) as avg_risk_level
      FROM scan_results
    aggregation: avg
  - id: risk_level_by_status
    label: risk level by status
    description: risk_level broken down by status.
    type: atomic
    sql: |-
      SELECT status, SUM(risk_level) as total_risk_level, AVG(risk_level) as avg_risk_level, COUNT(*) as count
      FROM scan_results
      GROUP BY status
      ORDER BY total_risk_level DESC
