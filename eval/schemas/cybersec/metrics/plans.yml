metrics:
  - id: plans_count
    label: Total Plans
    description: Count of distinct plans records.
    type: atomic
    sql: |-
      SELECT COUNT(DISTINCT id) as count
      FROM plans
    aggregation: count_distinct
  - id: total_price_cents
    label: Total price cents
    description: Sum of price_cents across all plans.
    type: atomic
    source:
      entity: Plans
      measure: total_price_cents
    sql: |-
      SELECT SUM(price_cents) as total_price_cents
      FROM plans
    aggregation: sum
    objective: maximize
  - id: avg_price_cents
    label: Average price cents
    description: Average price_cents per plan.
    type: atomic
    sql: |-
      SELECT AVG(price_cents) as avg_price_cents
      FROM plans
    aggregation: avg
  - id: total_max_assets
    label: Total max assets
    description: Sum of max_assets across all plans.
    type: atomic
    source:
      entity: Plans
      measure: total_max_assets
    sql: |-
      SELECT SUM(max_assets) as total_max_assets
      FROM plans
    aggregation: sum
    objective: maximize
  - id: avg_max_assets
    label: Average max assets
    description: Average max_assets per plan.
    type: atomic
    sql: |-
      SELECT AVG(max_assets) as avg_max_assets
      FROM plans
    aggregation: avg
  - id: total_max_users
    label: Total max users
    description: Sum of max_users across all plans.
    type: atomic
    source:
      entity: Plans
      measure: total_max_users
    sql: |-
      SELECT SUM(max_users) as total_max_users
      FROM plans
    aggregation: sum
    objective: maximize
  - id: avg_max_users
    label: Average max users
    description: Average max_users per plan.
    type: atomic
    sql: |-
      SELECT AVG(max_users) as avg_max_users
      FROM plans
    aggregation: avg
