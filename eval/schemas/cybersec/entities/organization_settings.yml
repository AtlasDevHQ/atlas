name: OrganizationSettings
type: fact_table
table: organization_settings
grain: one row per organization setting record
description: Auto-profiled schema for organization_settings (200 rows). Contains 10 columns, linked to organizations.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 200
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: organization_id
    sql: organization_id
    type: number
    description: Foreign key to organizations
    unique_count: 200
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: notification_email
    sql: notification_email
    type: string
    unique_count: 200
    sample_values:
      - security@aegiscorp.com
      - security@aegisdigital.com
      - security@aegisdynamics.com
      - security@aegisgroup.com
      - security@aegisindustries.com
      - security@aegislabs.com
      - security@aegisnetworks.com
      - security@aegissolutions.com
  - name: scan_frequency
    sql: scan_frequency
    type: string
    unique_count: 3
    sample_values:
      - daily
      - monthly
      - weekly
  - name: retention_days
    sql: retention_days
    type: number
    unique_count: 5
    sample_values:
      - '30'
      - '60'
      - '90'
      - '180'
      - '365'
  - name: sso_enabled
    sql: sso_enabled
    type: boolean
    unique_count: 2
    sample_values:
      - 'false'
      - 'true'
  - name: mfa_required
    sql: mfa_required
    type: boolean
    unique_count: 2
    sample_values:
      - 'false'
      - 'true'
  - name: settings_json
    sql: settings_json
    type: string
    unique_count: 1
    sample_values:
      - '{"timezone":"UTC","language":"en"}'
  - name: created_at
    sql: created_at
    type: date
    unique_count: 1
    sample_values:
      - Tue Mar 03 2026 13:38:31 GMT-0500 (Eastern Standard Time)
  - name: updated_at
    sql: updated_at
    type: date
    unique_count: 1
    sample_values:
      - Tue Mar 03 2026 13:38:31 GMT-0500 (Eastern Standard Time)
  - name: retention_days_bucket
    sql: |-
      CASE
        WHEN retention_days < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY retention_days) FROM organization_settings) THEN 'Low'
        WHEN retention_days < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY retention_days) FROM organization_settings) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: retention days bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
  - name: updated_at_year
    sql: EXTRACT(YEAR FROM updated_at)
    type: number
    description: Year extracted from updated_at
    virtual: true
  - name: updated_at_month
    sql: TO_CHAR(updated_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from updated_at
    virtual: true
measures:
  - name: organization_setting_count
    sql: id
    type: count_distinct
  - name: total_retention_days
    sql: retention_days
    type: sum
    description: Sum of retention days
  - name: avg_retention_days
    sql: retention_days
    type: avg
    description: Average retention days
joins:
  - target_entity: Organizations
    relationship: many_to_one
    join_columns:
      from: organization_id
      to: id
    description: Each organization_setting belongs to one organization
use_cases:
  - Use for segmentation analysis by scan_frequency, settings_json
  - Use for aggregation and trends on retention_days
  - Use for time-series analysis using created_at, updated_at
  - Join with organizations for cross-entity analysis
query_patterns:
  - description: OrganizationSettings by scan_frequency
    sql: |-
      SELECT scan_frequency, COUNT(*) as count
      FROM organization_settings
      GROUP BY scan_frequency
      ORDER BY count DESC
  - description: OrganizationSettings by settings_json
    sql: |-
      SELECT settings_json, COUNT(*) as count
      FROM organization_settings
      GROUP BY settings_json
      ORDER BY count DESC
  - description: Total retention_days by scan_frequency
    sql: |-
      SELECT scan_frequency, SUM(retention_days) as total_retention_days, COUNT(*) as count
      FROM organization_settings
      GROUP BY scan_frequency
      ORDER BY total_retention_days DESC
