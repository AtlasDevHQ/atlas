id: "cs-022"
question: "Rank organizations by a composite security score based on compliance, vulnerability, and incident metrics"
schema: cybersec
difficulty: complex
category: cte
tags: [organizations, compliance, vulnerabilities, incidents, composite-score, ranking]
gold_sql: |
  WITH compliance_scores AS (
    SELECT
      org_id,
      ROUND(AVG(score)::numeric, 1) AS avg_compliance_score
    FROM compliance_assessments
    WHERE status = 'completed'
    GROUP BY org_id
  ),
  vuln_counts AS (
    SELECT
      a.org_id,
      COUNT(*) FILTER (WHERE vi.status = 'open' AND v.severity IN ('critical', 'high')) AS high_sev_open_vulns
    FROM vulnerability_instances vi
    JOIN assets a ON vi.asset_id = a.id
    JOIN vulnerabilities v ON vi.vulnerability_id = v.id
    GROUP BY a.org_id
  ),
  incident_counts AS (
    SELECT
      org_id,
      COUNT(*) FILTER (WHERE status NOT IN ('resolved', 'closed')) AS open_incidents
    FROM incidents
    GROUP BY org_id
  )
  SELECT
    o.name AS organization,
    COALESCE(cs.avg_compliance_score, 0) AS compliance_score,
    COALESCE(vc.high_sev_open_vulns, 0) AS open_high_vulns,
    COALESCE(ic.open_incidents, 0) AS open_incidents,
    RANK() OVER (ORDER BY COALESCE(cs.avg_compliance_score, 0) DESC, COALESCE(vc.high_sev_open_vulns, 0) ASC, COALESCE(ic.open_incidents, 0) ASC) AS security_rank
  FROM organizations o
  LEFT JOIN compliance_scores cs ON cs.org_id = o.id
  LEFT JOIN vuln_counts vc ON vc.org_id = o.id
  LEFT JOIN incident_counts ic ON ic.org_id = o.id
  WHERE o.is_active = true
  ORDER BY security_rank
expected_rows: null
notes: "Tests multi-CTE pattern with LEFT JOINs and COALESCE for composite ranking across security domains"
