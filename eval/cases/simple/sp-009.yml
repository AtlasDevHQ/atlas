id: "sp-009"
question: "Rank companies by total account value and show their cumulative share of revenue"
schema: simple
difficulty: complex
category: window
tags: [companies, accounts, ranking, cumulative]
gold_sql: |
  WITH company_revenue AS (
    SELECT
      c.name AS company_name,
      c.industry,
      SUM(a.monthly_value) AS total_monthly_value
    FROM companies c
    JOIN accounts a ON c.id = a.company_id
    WHERE a.status = 'Active'
    GROUP BY c.name, c.industry
  )
  SELECT
    company_name,
    industry,
    total_monthly_value,
    RANK() OVER (ORDER BY total_monthly_value DESC) AS revenue_rank,
    ROUND(
      SUM(total_monthly_value) OVER (ORDER BY total_monthly_value DESC)
      / SUM(total_monthly_value) OVER () * 100, 1
    ) AS cumulative_pct
  FROM company_revenue
  ORDER BY revenue_rank
expected_rows: null
notes: "Tests CTE with window functions for ranking and cumulative distribution"
