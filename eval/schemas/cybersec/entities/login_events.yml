name: LoginEvents
type: fact_table
table: login_events
grain: one row per login event record
description: Auto-profiled schema for login_events (10,000 rows). Contains 7 columns, linked to users.
dimensions:
  - name: id
    sql: id
    type: number
    description: Primary key
    primary_key: true
    unique_count: 10000
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: user_id
    sql: user_id
    type: number
    description: Foreign key to users
    unique_count: 1982
    sample_values:
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
  - name: ip_address
    sql: ip_address
    type: string
    unique_count: 10000
    sample_values:
      - 1.102.140.217
      - 1.112.42.227
      - 1.128.222.116
      - 1.132.137.183
      - 1.133.156.59
      - 1.14.19.129
      - 1.140.136.73
      - 1.144.223.220
  - name: user_agent
    sql: user_agent
    type: string
    unique_count: 6
    sample_values:
      - Mozilla/5.0 (Macintosh; Intel Mac OS X) Safari/17
      - Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120
      - Mozilla/5.0 (X11; Linux x86_64) Firefox/121
      - Mozilla/5.0 (iPhone; CPU iPhone OS 17) Mobile
      - curl/8.4.0
      - python-requests/2.31
  - name: success
    sql: success
    type: boolean
    unique_count: 2
    sample_values:
      - 'false'
      - 'true'
  - name: failure_reason
    sql: failure_reason
    type: string
    unique_count: 4
    null_count: 9193
    sample_values:
      - account_locked
      - expired_session
      - invalid_password
      - mfa_failed
  - name: created_at
    sql: created_at
    type: date
    unique_count: 10000
    sample_values:
      - Sun Mar 28 2021 12:35:14 GMT-0400 (Eastern Daylight Time)
      - Sat Apr 10 2021 03:03:16 GMT-0400 (Eastern Daylight Time)
      - Mon Apr 26 2021 20:16:55 GMT-0400 (Eastern Daylight Time)
      - Sun May 23 2021 09:45:42 GMT-0400 (Eastern Daylight Time)
      - Sun May 23 2021 11:44:28 GMT-0400 (Eastern Daylight Time)
      - Fri May 28 2021 15:43:29 GMT-0400 (Eastern Daylight Time)
      - Fri Jun 11 2021 00:31:22 GMT-0400 (Eastern Daylight Time)
      - Tue Jun 22 2021 08:08:35 GMT-0400 (Eastern Daylight Time)
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: login_event_count
    sql: id
    type: count_distinct
joins:
  - target_entity: Users
    relationship: many_to_one
    join_columns:
      from: user_id
      to: id
    description: Each login_event belongs to one user
use_cases:
  - Use for segmentation analysis by user_agent, failure_reason
  - Use for time-series analysis using created_at
  - Join with users for cross-entity analysis
query_patterns:
  - description: LoginEvents by user_agent
    sql: |-
      SELECT user_agent, COUNT(*) as count
      FROM login_events
      GROUP BY user_agent
      ORDER BY count DESC
  - description: LoginEvents by failure_reason
    sql: |-
      SELECT failure_reason, COUNT(*) as count
      FROM login_events
      GROUP BY failure_reason
      ORDER BY count DESC
