id: "cs-009"
question: "What is the compliance score distribution across organizations and frameworks?"
schema: cybersec
difficulty: medium
category: join
tags: [compliance_assessments, compliance_frameworks, organizations, score]
gold_sql: |
  SELECT
    o.name AS organization,
    cf.name AS framework,
    ca.score,
    ca.status,
    ca.assessed_at
  FROM compliance_assessments ca
  JOIN organizations o ON ca.org_id = o.id
  JOIN compliance_frameworks cf ON ca.framework_id = cf.id
  ORDER BY o.name, cf.name
expected_rows: null
notes: "Tests multi-table JOIN across compliance domain"
