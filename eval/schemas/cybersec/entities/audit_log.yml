  - Join with organizations, users for cross-entity analysis
query_patterns:
  - description: AuditLog by action
    sql: |-
      SELECT action, COUNT(*) as count
      FROM audit_log
      GROUP BY action
      ORDER BY count DESC
  - description: AuditLog by resource_type
    sql: |-
      SELECT resource_type, COUNT(*) as count
      FROM audit_log
      GROUP BY resource_type
      ORDER BY count DESC
