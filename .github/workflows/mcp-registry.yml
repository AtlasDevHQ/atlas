name: MCP Registry publish

# Publish plugins/mcp/server.json to https://registry.modelcontextprotocol.io
# whenever a mcp-v* tag ships. Auth is GitHub OIDC — the registry validates that
# the workflow runs in a repo whose owner matches the io.github.<owner>/<name>
# namespace declared in server.json.
on:
  push:
    tags:
      - 'mcp-v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install mcp-publisher
        # Pinned version + SHA256 verification (#3342 L-10): this job holds
        # OIDC publish rights, so a mutable `latest` download with no checksum
        # was a supply-chain foothold. Bumping the tool = update MCP_PUBLISHER_VERSION
        # and MCP_PUBLISHER_SHA256 together (sha256sum of the release tarball).
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          set -euo pipefail
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum --check --strict
          tar xzf mcp-publisher.tar.gz mcp-publisher
          rm mcp-publisher.tar.gz
          sudo mv mcp-publisher /usr/local/bin/

      - name: Wait for npm to surface the new version
        working-directory: plugins/mcp
        run: |
          version=$(node -p "require('./package.json').version")
          for i in $(seq 1 30); do
            if npm view "@useatlas/mcp@${version}" version >/dev/null 2>&1; then
              echo "npm has @useatlas/mcp@${version}"
              exit 0
            fi
            echo "Waiting for npm to surface @useatlas/mcp@${version} (attempt $i/30)..."
            sleep 10
          done
          echo "Timed out waiting for npm" >&2
          exit 1

      - name: Validate server.json
        working-directory: plugins/mcp
        run: mcp-publisher validate

      - name: Login (GitHub OIDC)
        working-directory: plugins/mcp
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        working-directory: plugins/mcp
        run: mcp-publisher publish
