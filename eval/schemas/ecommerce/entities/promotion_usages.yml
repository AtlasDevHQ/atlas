      - Thu Jul 23 2020 14:06:53 GMT-0400 (Eastern Daylight Time)
  - name: discount_cents_bucket
    sql: |-
      CASE
        WHEN discount_cents < (SELECT PERCENTILE_CONT(0.33) WITHIN GROUP (ORDER BY discount_cents) FROM promotion_usages) THEN 'Low'
        WHEN discount_cents < (SELECT PERCENTILE_CONT(0.66) WITHIN GROUP (ORDER BY discount_cents) FROM promotion_usages) THEN 'Medium'
        ELSE 'High'
      END
    type: string
    description: discount cents bucketed into Low/Medium/High terciles
    virtual: true
    sample_values:
      - Low
      - Medium
      - High
  - name: created_at_year
    sql: EXTRACT(YEAR FROM created_at)
    type: number
    description: Year extracted from created_at
    virtual: true
  - name: created_at_month
    sql: TO_CHAR(created_at, 'YYYY-MM')
    type: string
    description: Year-month extracted from created_at
    virtual: true
measures:
  - name: promotion_usage_count
    sql: id
    type: count_distinct
  - name: total_discount_cents
    sql: discount_cents
    type: sum
    description: Sum of discount cents
  - name: avg_discount_cents
    sql: discount_cents
    type: avg
    description: Average discount cents
joins:
  - target_entity: Customers
    relationship: many_to_one
    join_columns:
      from: customer_id
      to: id
    description: Each promotion_usage belongs to one customer
  - target_entity: Promotions
    relationship: many_to_one
    join_columns:
      from: promotion_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name promotion_id
    description: Each promotion_usage likely belongs to one promotion
  - target_entity: Orders
    relationship: many_to_one
    join_columns:
      from: order_id
      to: id
    inferred: true
    note: No FK constraint exists — inferred from column name order_id
    description: Each promotion_usage likely belongs to one order
use_cases:
  - Use for aggregation and trends on discount_cents
  - Use for time-series analysis using created_at
  - Join with customers, promotions, orders for cross-entity analysis
